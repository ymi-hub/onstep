<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TODAY 도장 스탬프 프리뷰</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F0EFEB; font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px 24px; }
  h2 { font-size: 13px; font-weight: 700; letter-spacing: .14em; color: #9A9490; text-transform: uppercase; margin-bottom: 20px; }

  /* ─── 카드 시뮬레이터 ─── */
  .card-wrap {
    width: 340px;
    margin: 0 auto 48px;
    background: #fff;
    border: 1px solid #000;
  }
  .card-image {
    width: 100%;
    height: 400px;
    background: #E8E6E2;
    position: relative;
    overflow: visible;          /* 스탬프가 바깥으로 삐져나오게 */
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-image .placeholder {
    font-size: 80px;
    opacity: .15;
  }
  .card-body {
    padding: 14px 18px 16px;
    border-top: 1px solid #000;
  }
  .card-body .title { font-size: 18px; font-weight: 600; }
  .card-body .tpo   { font-size: 14px; color: #6B6B6B; margin-top: 4px; }
  .btn-row {
    display: flex;
    border-top: 1px solid #000;
  }
  .btn-row button {
    flex: 1;
    padding: 12px 0;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-today { background: #0C0C0A; color: #C5FF00; border-right: 1px solid #000 !important; }
  .btn-edit  { background: #F3F3F1; color: #0C0C0A; }

  /* ─────────────────────────────────────────
     도장 스타일 변형 3가지
  ───────────────────────────────────────── */

  /* 공통 기반 */
  .stamp {
    position: absolute;
    bottom: -18px;
    right: 16px;
    transform: rotate(-9deg);
    z-index: 10;
  }

  /* ── 버전 A — 블랙 잉크 (브랜드 컬러) ── */
  .stamp-a {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 3px solid #0C0C0A;
    background: rgba(255,255,255,.78);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    box-shadow: inset 0 0 0 6px rgba(12,12,10,.08);
    /* 도장 노이즈 느낌 */
    filter: contrast(1.1);
  }
  .stamp-a .ring-text {
    font-size: 8px;
    font-weight: 900;
    letter-spacing: .32em;
    color: #0C0C0A;
    text-transform: uppercase;
    margin-top: -2px;
  }
  .stamp-a img {
    width: 36px;
    height: 36px;
    object-fit: contain;
    filter: grayscale(1) contrast(1.4);
    opacity: .85;
    margin-bottom: 1px;
  }
  /* 점선 이중 테두리 느낌 */
  .stamp-a::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px dashed rgba(12,12,10,.3);
    pointer-events: none;
  }

  /* ── 버전 B — 라임+블랙 (ON스텝 포인트) ── */
  .stamp-b {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 3.5px solid #C5FF00;
    background: #0C0C0A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    box-shadow: 0 0 0 2px #0C0C0A, 0 0 0 4px #C5FF00;
  }
  .stamp-b .ring-text {
    font-size: 8px;
    font-weight: 900;
    letter-spacing: .3em;
    color: #C5FF00;
    text-transform: uppercase;
  }
  .stamp-b img {
    width: 34px;
    height: 34px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: .9;
    margin-bottom: 2px;
  }

  /* ── 버전 C — 빈티지 레드 스탬프 ── */
  .stamp-c {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 3px solid rgba(190,30,30,.75);
    background: rgba(255,255,255,.7);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    mix-blend-mode: multiply;
  }
  .stamp-c .ring-text {
    font-size: 8px;
    font-weight: 900;
    letter-spacing: .32em;
    color: rgba(190,30,30,.85);
    text-transform: uppercase;
    margin-top: -2px;
  }
  .stamp-c img {
    width: 34px;
    height: 34px;
    object-fit: contain;
    filter: sepia(1) saturate(8) hue-rotate(-20deg) contrast(1.2);
    opacity: .8;
    margin-bottom: 1px;
  }
  .stamp-c::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px solid rgba(190,30,30,.3);
    pointer-events: none;
  }

  /* 레이블 */
  .version-label {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    color: #9A9490;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<h2>TODAY 도장 스탬프 — 3가지 시안</h2>

<!-- ── 버전 A ── -->
<p class="version-label">A — 블랙 잉크 (브랜드 컬러 / 추천)</p>
<div class="card-wrap">
  <div class="card-image">
    <span class="placeholder">💄</span>
    <div class="stamp stamp-a">
      <img src="../frontend/public/logo.png" alt="logo">
      <div class="ring-text">TODAY</div>
    </div>
  </div>
  <div class="card-body">
    <div class="title">서머 글로우 메이크업</div>
    <div class="tpo">daily · office</div>
  </div>
  <div class="btn-row">
    <button class="btn-today">Today ON</button>
    <button class="btn-edit">편집</button>
  </div>
</div>

<!-- ── 버전 B ── -->
<p class="version-label">B — 라임 + 블랙 (포인트 컬러)</p>
<div class="card-wrap">
  <div class="card-image">
    <span class="placeholder">👗</span>
    <div class="stamp stamp-b">
      <img src="../frontend/public/logo.png" alt="logo">
      <div class="ring-text">TODAY</div>
    </div>
  </div>
  <div class="card-body">
    <div class="title">캐주얼 스트리트 룩</div>
    <div class="tpo">weekend · casual</div>
  </div>
  <div class="btn-row">
    <button class="btn-today">Today ON</button>
    <button class="btn-edit">편집</button>
  </div>
</div>

<!-- ── 버전 C ── -->
<p class="version-label">C — 빈티지 레드 잉크</p>
<div class="card-wrap">
  <div class="card-image">
    <span class="placeholder">💄</span>
    <div class="stamp stamp-c">
      <img src="../frontend/public/logo.png" alt="logo">
      <div class="ring-text">TODAY</div>
    </div>
  </div>
  <div class="card-body">
    <div class="title">봄 워밍 룩</div>
    <div class="tpo">spring · outdoor</div>
  </div>
  <div class="btn-row">
    <button class="btn-today">Today ON</button>
    <button class="btn-edit">편집</button>
  </div>
</div>

<p style="text-align:center; font-size:11px; color:#BCBAB6; margin-top:8px; letter-spacing:.04em;">
  스탬프는 카드 이미지 우하단, rotate(-9deg), z-index: 10 으로 이미지 경계에 걸쳐 배치
</p>

</body>
</html>
