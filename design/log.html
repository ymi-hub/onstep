<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>OnStep · Log</title>
<link rel="icon" type="image/png" href="logo-v2.png">
<link rel="apple-touch-icon" href="logo-v2.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OnStep">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAFAF8">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<link rel="stylesheet" href="shared.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Nanum+Pen+Script:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  /* log.html 전용 — 공통 토큰은 shared.css에서 공급 */
  --bg:#FAFAF8;
  --card:#FFFFFF; --silver:#E4E4E7; --border-card:#E4E4E7;
  --ink:#0C0C0A; --sub:#4A4846; --mist:#9A9490;
  --lime:#C5FF00; --lime-fg:#0C0C0A;
  --border:rgba(12,12,10,.07); --border-md:rgba(12,12,10,.14);
  --surface:#F4F4F0;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-full:9999px;
  --log-title-size:60px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#E8E6E0;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px 16px 48px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
.phone{width:390px;height:888px;background:var(--bg);border-radius:48px;box-shadow:0 0 0 1px rgba(255,255,255,.6) inset,0 40px 100px rgba(0,0,0,.22);overflow:hidden;position:relative;transform:translate(0,0);display:flex;flex-direction:column;}
.notch{height:44px;flex-shrink:0;background:var(--bg);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;}
.notch-bar{width:126px;height:5px;background:var(--ink);border-radius:3px;opacity:.1;}
.scroll{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;background:var(--bg);overscroll-behavior:contain;}
.scroll::-webkit-scrollbar{display:none;}

/* AppBar */
.appbar{padding:0 16px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(250,250,248,.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);}
.appbar-menu{width:22px;display:flex;flex-direction:column;gap:5px;cursor:pointer;}
.appbar-menu span{height:1.5px;background:var(--ink);border-radius:2px;display:block;}
.appbar-menu span:nth-child(2){width:68%;}
.appbar-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:15px;font-weight:700;letter-spacing:.01em;color:var(--ink);display:flex;align-items:center;gap:8px;}
.appbar-logo{width:24px;height:24px;border-radius:var(--r-sm);object-fit:cover;filter:grayscale(100%);}
#auth-avatar{width:32px;height:32px;border-radius:var(--r-full);background:var(--surface);border:1.5px solid var(--border-md);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Page header */
.page-header{padding:32px 24px 0;}
.page-title-big{font-size:var(--log-title-size);font-weight:900;letter-spacing:-4.5px;line-height:.88;color:var(--ink);}
.page-sub{font-family:'Nanum Pen Script',cursive;font-size:13px;color:var(--mist);margin-top:10px;padding-bottom:16px;border-bottom:1px solid var(--border);}

/* Category tab bar */
.cat-tab-bar{height:46px;display:flex;gap:0;align-items:stretch;position:sticky;top:64px;z-index:9;background:rgba(250,250,248,.96);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0 24px;}
.cat-tab{flex:1;border:none;background:none;font-size:13px;font-weight:800;letter-spacing:.04em;color:var(--mist);cursor:pointer;border-bottom:2px solid transparent;padding:0;transition:all .18s;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;}
.cat-tab.active{color:var(--ink);border-bottom-color:var(--ink);}

/* Main */
.main{padding:0 24px;}
.section-row{display:flex;align-items:baseline;justify-content:space-between;padding:28px 0 16px;}
.section-label{font-family:'Nanum Pen Script',cursive;font-size:14px;color:var(--mist);}
.section-title{font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--ink);}
.section-count{font-size:12px;font-weight:700;color:var(--mist);}

/* Library 1-col list */
.muse-grid{display:flex;flex-direction:column;gap:10px;padding-bottom:8px;}
.muse-more-btn{margin:4px 0 8px;padding:14px;text-align:center;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--mist);background:var(--card);border:1px solid var(--border-card);border-radius:var(--r-lg);cursor:pointer;transition:background .15s;}
.muse-more-btn:active{background:var(--surface);}
/* Library card — full-width image */
.lib-card{background:var(--card);border:1px solid var(--border-card);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:transform .15s;}
.lib-card:active{transform:scale(.98);}
.lib-card-hero{width:100%;height:220px;background:var(--surface);background-size:auto 100%;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;font-size:44px;color:var(--mist);flex-shrink:0;}
.lib-card-body{padding:13px 14px 11px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.lib-card-info{flex:1;min-width:0;}
.lib-card-name{font-size:14px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.lib-card-desc{font-size:12px;color:var(--sub);line-height:1.4;margin-bottom:5px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.lib-card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.lib-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:var(--r-full);}
.lib-badge.auto{background:var(--lime);color:var(--lime-fg);}
.lib-badge.cnt{background:rgba(0,0,0,.08);color:var(--sub);}
.lib-badge.date{background:var(--surface);color:var(--sub);}
.lib-sched-btn{flex-shrink:0;height:32px;padding:0 10px;background:var(--ink);color:#fff;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;transition:opacity .15s;}
.lib-sched-btn.done{background:var(--lime);color:var(--lime-fg);}
.lib-sched-btn:active{opacity:.7;}
/* Product strip — 3.5 visible, h-scroll, image+name */
.lib-card-prods{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:12px 14px 14px;border-top:1px solid var(--border);}
.lib-card-prods::-webkit-scrollbar{display:none;}
.lib-card-prod{flex-shrink:0;width:80px;display:flex;flex-direction:column;align-items:center;gap:5px;}
.lib-prod-img{width:64px;height:64px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--border-card);background-size:100% auto;background-position:top center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.lib-prod-name{font-size:12px;font-weight:600;color:var(--sub);text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;width:100%;}

/* Empty */
.empty-box{padding:48px 24px;text-align:center;border:1.5px dashed var(--border-md);border-radius:var(--r-lg);background:var(--surface);}
.empty-icon{font-size:32px;opacity:.25;margin-bottom:12px;}
.empty-title{font-size:14px;font-weight:700;color:var(--mist);margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--mist);line-height:1.6;}

/* Library sub-filter pills */
.lib-filter-row{display:flex;gap:6px;padding:16px 0 4px;}
.lib-filter-pill{height:28px;padding:0 14px;border-radius:var(--r-full);border:1.5px solid var(--border-card);background:transparent;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--mist);cursor:pointer;transition:all .15s;}
.lib-filter-pill.active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* Archive list */
.archive-list{display:flex;flex-direction:column;gap:12px;padding:20px 0 24px;}
.archive-card{display:flex;gap:12px;background:var(--card);border:1px solid var(--border-card);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:transform .15s;}
.archive-card:active{transform:scale(.98);}
.archive-thumb{width:80px;height:88px;flex-shrink:0;background:var(--surface);background-size:100% auto;background-position:top center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.3;}
.archive-thumb.has-img{opacity:1;}
.archive-info{flex:1;min-width:0;padding:12px 12px 12px 0;}
.archive-date{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--mist);margin-bottom:3px;}
.archive-note{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:5px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.archive-theme{font-size:12px;color:var(--sub);margin-bottom:6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.archive-flow-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;letter-spacing:.06em;background:var(--ink);color:#fff;padding:2px 7px;border-radius:var(--r-full);}
.archive-empty{padding:48px 0;text-align:center;}
.archive-empty-icon{font-size:28px;opacity:.2;margin-bottom:12px;}
.archive-empty-title{font-size:13px;font-weight:700;color:var(--mist);margin-bottom:6px;}
.archive-empty-sub{font-size:12px;color:var(--mist);line-height:1.6;}

/* FAB */
.fab{position:absolute;bottom:80px;right:18px;width:48px;height:48px;background:var(--ink);border-radius:var(--r-full);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.28);z-index:20;transition:transform .15s;}
.fab:active{transform:scale(.92);}

/* Bottom nav */
.bottom-nav{background:var(--bg);display:flex;border-top:1px solid rgba(0,0,0,.06);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;padding:12px 6px 20px;text-decoration:none;border-radius:20px 20px 0 0;}
.nav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:#AAAAAA;}
.nav-label{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#AAAAAA;}
.nav-item.active{background:#0A0A0A;}
.nav-item.active .nav-icon{color:#FFFFFF;}
.nav-item.active .nav-label{color:#FFFFFF;}

/* Detail panel */
.detail-panel{position:absolute;inset:0;z-index:60;background:#fff;transform:translateX(100%);transition:transform .34s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.detail-panel.open{transform:translateX(0);}
/* BOX picker must sit above sheets (z-index:80) */
#bp-panel{z-index:90;}
.detail-appbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0;}
.detail-back{background:none;border:none;font-size:18px;font-weight:700;color:var(--ink);cursor:pointer;padding:0;}
.detail-edit-btn{background:none;border:1.5px solid var(--border-card);border-radius:var(--r-sm);font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--ink);cursor:pointer;padding:5px 12px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;}
.detail-appbar-label{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mist);}
.detail-body{flex:1;overflow-y:auto;scrollbar-width:none;overscroll-behavior:contain;}
.detail-body::-webkit-scrollbar{display:none;}
.detail-hero{width:100%;height:256px;background:var(--surface);background-size:auto 100%;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;}
.detail-content{padding:20px 20px 8px;}
.detail-tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.detail-tag{height:22px;padding:0 10px;background:var(--surface);border-radius:var(--r-full);font-size:11px;font-weight:700;color:var(--sub);display:inline-flex;align-items:center;}
.detail-title{font-size:22px;font-weight:800;color:var(--ink);line-height:1.15;letter-spacing:-.6px;margin-bottom:8px;}
.detail-meta{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mist);margin-bottom:14px;}
.detail-scheduled-pill{display:inline-flex;align-items:center;gap:6px;background:var(--lime);padding:6px 14px;border-radius:var(--r-full);font-size:12px;font-weight:700;color:var(--lime-fg);margin-bottom:14px;}
.detail-ref{font-size:12px;color:var(--mist);text-decoration:underline;text-underline-offset:2px;margin-bottom:14px;display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.detail-prods-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mist);margin-bottom:8px;}
.detail-prods-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:8px;padding-bottom:2px;}
.detail-prods-row::-webkit-scrollbar{display:none;}
.detail-prod{flex-shrink:0;height:28px;padding:0 6px 0 12px;background:var(--surface);border:1px solid var(--border-card);border-radius:var(--r-full);font-size:12px;font-weight:600;color:var(--ink);display:inline-flex;align-items:center;gap:4px;}
.detail-prod-rm{background:none;border:none;width:18px;height:18px;border-radius:var(--r-full);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--mist);padding:0;line-height:1;flex-shrink:0;}
.detail-prod-rm:hover{background:var(--border-card);color:var(--ink);}
.detail-actions{display:flex;gap:8px;padding:12px 20px 16px;border-top:1px solid var(--border);flex-shrink:0;background:#fff;}
.detail-del-btn{height:50px;padding:0 14px;background:none;border:1.5px solid #FCA5A5;color:#DC2626;font-size:12px;font-weight:700;cursor:pointer;border-radius:var(--r-md);flex-shrink:0;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;}
.detail-main-btn{flex:1;height:50px;background:var(--ink);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;border-radius:var(--r-md);font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;transition:opacity .2s;}
.detail-main-btn.lime{background:var(--lime);color:var(--lime-fg);}
.detail-main-btn:active{opacity:.8;}

/* Sheets */
.sheet{position:absolute;inset:0;z-index:80;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .24s;}
.sheet.open{opacity:1;pointer-events:all;}
.sheet-inner{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 20px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto;scrollbar-width:none;overscroll-behavior:contain;}
.sheet-inner::-webkit-scrollbar{display:none;}
.sheet.open .sheet-inner{transform:translateY(0);}
.sheet-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.4px;color:var(--ink);margin-bottom:4px;}
.sheet-sub{font-size:12px;color:var(--mist);margin-bottom:20px;line-height:1.5;}
.field-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mist);margin-bottom:6px;}
.field-in{width:100%;border:1.5px solid var(--border-card);border-radius:var(--r-md);padding:11px 14px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;color:var(--ink);outline:none;margin-bottom:16px;background:#fff;}
.field-in:focus{border-color:var(--ink);}
textarea.field-in{resize:none;height:72px;line-height:1.6;}
.sheet-btns{display:flex;gap:8px;}
.sh-cancel{flex:1;height:52px;background:var(--surface-low);border:1.5px solid var(--border-card);border-radius:var(--r-md);font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;}
.sh-cancel:active{opacity:.8;}
.sh-confirm{flex:2;height:52px;background:var(--ink);border:none;border-radius:var(--r-md);font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;}
.sh-confirm:active{opacity:.8;}
.sh-confirm.lime{background:var(--lime);color:var(--lime-fg);}

/* Schedule to Setup — 이력 & 자동화 */
.sched-log-section{background:var(--surface);border-radius:var(--r-md);padding:12px 14px;margin-bottom:16px;}
.sched-log-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mist);margin-bottom:8px;}
.sched-log-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.sched-log-chip{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:4px 9px;background:var(--card);border:1px solid var(--border-card);border-radius:var(--r-full);color:var(--ink);}
.sched-log-more{color:var(--mist);background:transparent;border-color:var(--border-card);}
.sched-progress-wrap{height:4px;background:var(--border-card);border-radius:2px;margin-bottom:6px;overflow:hidden;}
.sched-progress-bar{height:100%;border-radius:2px;transition:width .5s;}
.sched-progress-lbl{font-size:11px;font-weight:600;color:var(--mist);}
.sched-progress-lbl.reached{color:#2D7A00;font-weight:700;}
.sched-auto-card{border:1.5px solid var(--lime);border-radius:var(--r-md);padding:14px;margin-bottom:16px;background:rgba(198,244,50,.08);}
.sched-auto-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.sched-auto-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.sched-auto-desc{font-size:12px;color:var(--mist);line-height:1.4;}
.sched-auto-toggle{padding:6px 14px;border-radius:var(--r-full);border:1.5px solid var(--border-card);background:var(--surface-low);font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--mist);cursor:pointer;flex-shrink:0;transition:all .2s;}
.sched-auto-toggle.on{background:var(--lime);border-color:var(--lime);color:var(--lime-fg);}
/* Muse card — 등록 횟수 배지 */
.muse-img{position:relative;}
.muse-count-badge{position:absolute;top:8px;right:8px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:3px 8px;border-radius:var(--r-full);letter-spacing:.04em;pointer-events:none;}
.muse-count-badge.auto{background:var(--lime);color:var(--lime-fg);}
.muse-count-badge.count{background:rgba(0,0,0,.55);color:#fff;}

/* Image picker */
.img-pick{width:100%;height:116px;background:var(--surface);border:1.5px dashed var(--border-card);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:16px;position:relative;background-size:auto 100%;background-position:center;background-repeat:no-repeat;}
.img-pick-ph{display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none;}
.img-pick-icon-wrap{width:32px;height:32px;background:var(--border-card);border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;}
.img-pick-text{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mist);}
.img-rm-btn{position:absolute;top:8px;right:8px;width:26px;height:26px;background:rgba(0,0,0,.55);border:none;border-radius:var(--r-full);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}

/* TPO chips */
.tpo-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.tpo-chip{height:30px;padding:0 14px;border-radius:var(--r-full);font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border-card);color:var(--mist);background:transparent;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;transition:all .14s;}
.tpo-chip.on{border-color:var(--ink);color:var(--ink);background:var(--surface);}

/* Schedule type toggle */
.type-row{display:flex;gap:8px;margin-bottom:20px;}
.type-btn{flex:1;height:44px;border-radius:var(--r-md);font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border-card);color:var(--mist);background:transparent;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;transition:all .14s;}
.type-btn.on{border-color:var(--ink);color:var(--ink);background:var(--surface);}
.type-btn-sub{font-size:11px;font-weight:400;opacity:.55;}
.avatar-icon-default{opacity:.5;}

.hidden{display:none;}

/* BOX product picker */
.bp-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.bp-item:active{background:var(--surface);}
.bp-item.selected{background:rgba(198,244,50,.12);}
.bp-item-check{width:20px;height:20px;border-radius:var(--r-full);border:1.5px solid var(--border-md);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .14s;}
.bp-item.selected .bp-item-check{background:var(--lime);border-color:var(--lime);color:var(--lime-fg);}
.bp-item-info{flex:1;min-width:0;}
.bp-item-name{font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.bp-item-brand{font-size:11px;color:var(--mist);margin-top:2px;}
.bp-item-domain{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--mist);background:var(--surface);padding:2px 8px;border-radius:var(--r-full);flex-shrink:0;}
.bp-more-btn{padding:14px 16px;text-align:center;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--mist);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.bp-more-btn:active{background:var(--surface);}
.bp-search-wrap{padding:12px 16px;border-bottom:1px solid var(--border);}
.bp-search-input{width:100%;border:1.5px solid var(--border-card);border-radius:var(--r-md);padding:9px 14px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;color:var(--ink);outline:none;background:#fff;}
.bp-search-input:focus{border-color:var(--ink);}
/* BOX picker domain + subcat tabs */
.bp-domain-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.bp-dtab{flex:1;padding:10px 0;border:none;background:none;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mist);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;}
.bp-dtab.active{color:var(--ink);border-bottom-color:var(--lime);}
.bp-subcat-row{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.bp-subcat-row::-webkit-scrollbar{display:none;}
.bp-scat{padding:4px 11px;border-radius:9999px;border:1.5px solid var(--border);background:transparent;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);cursor:pointer;transition:all .18s;white-space:nowrap;}
.bp-scat.active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* Muse product chips */
.muse-prods-btn{margin-top:10px;width:100%;height:32px;background:var(--surface);border:1.5px dashed var(--border-card);border-radius:var(--r-sm);font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;}

/* Archive panel list */
.archive-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.archive-item:active{background:var(--surface);}
.archive-item.selected{background:rgba(198,244,50,.1);}
.archive-cb{width:22px;height:22px;border-radius:var(--r-full);border:1.5px solid var(--border-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;transition:all .14s;}
.archive-item.selected .archive-cb{background:var(--lime);border-color:var(--lime);color:var(--lime-fg);}
.archive-thumb{width:44px;height:44px;border-radius:var(--r-sm);background:var(--surface-low);background-size:100% auto;background-position:top center;background-repeat:no-repeat;flex-shrink:0;}
.archive-info{flex:1;min-width:0;}
.archive-date{font-size:12px;font-weight:700;letter-spacing:.07em;color:var(--mist);margin-bottom:2px;}
.archive-note{font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.archive-prods{font-size:11px;color:var(--mist);margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.archive-apply-btn{flex-shrink:0;height:28px;padding:0 10px;background:var(--surface);border:1px solid var(--border-card);border-radius:var(--r-sm);font-size:11px;font-weight:700;color:var(--ink);cursor:pointer;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;}
.archive-group-year{padding:16px 20px 4px;font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--mist);background:var(--bg);border-bottom:1px solid var(--border);}
.archive-group-month{padding:8px 20px 6px;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--mist);background:var(--surface);display:flex;justify-content:space-between;align-items:center;}
.archive-month-count{font-size:11px;font-weight:600;color:var(--border-md);}
.archive-edit-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--border);background:#fff;flex-shrink:0;}
.archive-edit-bar.hidden{display:none;}
.archive-sel-label{font-size:13px;font-weight:700;color:var(--ink);}
.archive-del-btn{height:40px;padding:0 20px;background:#DC2626;color:#fff;border:none;border-radius:var(--r-md);font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;}
.archive-del-btn:disabled{background:var(--border-md);cursor:not-allowed;}

/* Tag editor */
.edit-tags-selected{display:flex;flex-wrap:wrap;gap:7px;min-height:32px;align-items:center;margin-bottom:12px;}
.edit-tag-chip{display:inline-flex;align-items:center;gap:3px;height:30px;padding:0 6px 0 12px;border-radius:var(--r-full);font-size:12px;font-weight:700;background:var(--ink);color:#fff;}
.edit-tag-chip-x{background:none;border:none;color:rgba(255,255,255,.55);cursor:pointer;font-size:16px;padding:0 3px;line-height:1;display:flex;align-items:center;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;}
.edit-tag-chip-x:hover{color:#fff;}
.edit-tags-quick{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.edit-tag-input-row{display:flex;gap:8px;}
.edit-tag-add-btn{height:44px;padding:0 16px;background:var(--ink);color:#fff;border:none;border-radius:var(--r-md);font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;flex-shrink:0;white-space:nowrap;}

/* Toast */
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 20px;font-size:12px;letter-spacing:.04em;border-radius:var(--r-full);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(pointer:coarse),(max-width:430px){
  body{background:var(--bg);padding:0;align-items:stretch;height:100dvh;overflow:hidden;}
  .phone{width:100%;border-radius:0;box-shadow:none;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
  .notch{flex-shrink:0;height:calc(env(safe-area-inset-top,0px) + 10px);padding-top:env(safe-area-inset-top,0px);padding-bottom:0}
  .notch-bar{display:none}
  .scroll{flex:1;min-height:0;overflow-y:auto;height:auto;}
  .app-nav{flex-shrink:0;background:var(--bg);}
  .bottom-nav{border-top:1px solid rgba(0,0,0,.06);}
  .nav-item{padding-bottom:calc(env(safe-area-inset-bottom,0px) + 14px);}
  .fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 76px);right:18px;}
}

.scene-manage-ov{position:absolute;inset:0;z-index:90;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.scene-manage-ov.open{opacity:1;pointer-events:auto;}

.scene-manage-ov.open .scene-manage-sheet{transform:translateY(0);}
.scene-manage-hd{display:flex;align-items:center;gap:0;padding:20px 20px 12px;flex-shrink:0;}

.scene-manage-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:0 20px;overscroll-behavior:contain;}

.scene-manage-list{}
.scene-manage-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #E5E7EB;}
.scene-manage-row-label{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;font-weight:500;color:var(--ink);}
.scene-manage-row-actions{display:flex;gap:4px;}
.scene-manage-action{width:28px;height:28px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9CA3AF;border-radius:6px;}
.scene-manage-action:active{background:#F0F0EE;}
.scene-manage-add-link{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--ink);background:none;border:none;cursor:pointer;text-align:left;padding:14px 0 4px;display:flex;align-items:center;gap:6px;}
.scene-manage-footer{padding:12px 20px 36px;flex-shrink:0;background:#fff;border-top:1px solid #F0F0EE;}
.scene-manage-apply{width:100%;height:48px;background:var(--ink);color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;}
.scene-new-card{margin-top:8px;padding:16px;border:1px solid #E5E7EB;border-radius:12px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
.scene-new-inp{width:100%;border:none;border-bottom:1px solid #C5C6CA;padding:8px 0;font-size:16px;color:var(--ink);outline:none;background:transparent;}
.scene-new-inp::placeholder{color:#C5C6CA;}
.scene-new-confirm{width:100%;height:44px;background:var(--ink);color:#fff;border:none;cursor:pointer;border-radius:2px;font-size:14px;font-weight:600;letter-spacing:.04em;}
.scene-new-cancel{width:100%;height:40px;background:transparent;color:var(--ink);border:1px solid #C5C6CA;cursor:pointer;border-radius:2px;font-size:14px;font-weight:600;}
@media(pointer:coarse),(max-width:430px){input,textarea,select{font-size:16px!important}button{min-height:44px}}

.detail-edit-btn,.detail-del-btn,.detail-main-btn,.lib-sched-btn,
.lib-filter-pill,.tpo-chip,.type-btn,.cat-tab{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif}

<div class="phone">
  <div class="notch"><div class="notch-bar"></div></div>
  <div class="scroll">

    <div class="appbar">
      <div class="appbar-menu"><span></span><span></span><span></span></div>

      </div>
    </div>

    <div class="page-header">
      <div class="page-title-big">LOG</div>
      <div class="page-sub">오늘 본 무드가 내일의 내 모습이 된다</div>
    </div>

    <!-- Section A: Main Tabs -->
    <div class="cat-tab-bar">
      <button class="cat-tab active" id="tab-library" onclick="setMainTab('library')">Library</button>
      <button class="cat-tab" id="tab-archive" onclick="setMainTab('archive')">Archive</button>

  <div class="app-nav"></div>

  <!-- FAB -->

    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

    <div class="detail-actions" id="detail-actions"></div>
  </div>
  <input type="file" id="edit-img-input" accept="image/*" class="hidden" onchange="handleEditImg(this)">

  <!-- Add/Edit Content sheet -->

    <div class="sheet-inner">

      <button type="button" class="detail-main-btn lime" onclick="confirmBoxPick()">선택 완료 (<span id="bp-sel-count">0</span>)</button>

  <div class="toast" id="toast"></div>
</div><!-- /phone -->

  if(_unsubExtra){ _unsubExtra(); _unsubExtra=null; }
  if(_unsubBox){ _unsubBox(); _unsubBox=null; }
  if(!user){
    _boxAssetsCache=null;
    ALL_SCENES=[..._DEFAULT_SCENES];
  }
  if(user){
    loadFromCloud(user.uid);
    _unsubBox=fbDb.collection('users').doc(user.uid).collection('box').doc('data')
      .onSnapshot(snap=>{
        if(!snap.exists) return;
        const d=snap.data();
        if(d.assets){
          const localAssets=JSON.parse(localStorage.getItem('onstep_box_assets')||'[]');
          const merged=d.assets.map(ca=>{const la=localAssets.find(a=>a.id===ca.id);return{...ca,imgData:la?.imgData||null,storageImgData:la?.storageImgData||null};});
          localStorage.setItem('onstep_box_assets', JSON.stringify(merged));
          _boxAssetsCache = merged; // 캐시도 즉시 갱신
        }
        if(d.locations){
          const localLocs=JSON.parse(localStorage.getItem('onstep_box_locations')||'[]');
          localStorage.setItem('onstep_box_locations', JSON.stringify(d.locations.map(cl=>{const ll=localLocs.find(l=>(l.key||l.id)===(cl.key||cl.id));return{...cl,imgData:ll?.imgData||null};})));
        }
        renderContent(); // 라이브러리 카드의 제품 이미지 즉시 갱신
      }, e=>console.warn('box onSnapshot:',e));
    _unsubExtra=fbDb.collection('users').doc(user.uid).collection('extra').doc('data')
      .onSnapshot(snap=>{
        if(!snap.exists) return;
        const d=snap.data();
        const _mi=(key,arr)=>{const loc=JSON.parse(localStorage.getItem(key)||'[]');return arr.map(ct=>{const lc=loc.find(t=>t.id===ct.id);return{...ct,baselineImg:lc?.baselineImg||null};});};
        if(d.makeupContents) localStorage.setItem('onstep_makeup_contents', JSON.stringify(_mi('onstep_makeup_contents',d.makeupContents)));
        else if(d.makeupThemes) localStorage.setItem('onstep_makeup_contents', JSON.stringify(d.makeupThemes?.themes||[]));
        if(d.lookContents)   localStorage.setItem('onstep_look_contents',   JSON.stringify(_mi('onstep_look_contents',d.lookContents)));
        else if(d.lookThemes) localStorage.setItem('onstep_look_contents',  JSON.stringify(d.lookThemes));
        if(d.careThemes)     localStorage.setItem('onstep_care_themes',     JSON.stringify(_mi('onstep_care_themes',d.careThemes)));
        if(d.looks) {
          const ll=JSON.parse(localStorage.getItem('onstep_looks')||'[]');
          localStorage.setItem('onstep_looks', JSON.stringify(d.looks.map(cl=>{
            const loc=ll.find(l=>l.date===cl.date);
            return {...cl, mainPhoto:loc?.mainPhoto||null};
          })));
        }
        if(d.makeupLogs) {
          const ll=JSON.parse(localStorage.getItem('onstep_makeup_logs')||'[]');
          localStorage.setItem('onstep_makeup_logs', JSON.stringify(d.makeupLogs.map(cl=>{
            const lc=ll.find(l=>l.date===cl.date);
            return{...cl,mainPhoto:lc?.mainPhoto||null};
          })));
        }
        if(d.portfolio)      localStorage.setItem('onstep_planned_portfolio',JSON.stringify(d.portfolio));
        if(d.logScenes && Array.isArray(d.logScenes)){
          ALL_SCENES=d.logScenes;
          localStorage.setItem(_SCENE_KEY,JSON.stringify(d.logScenes));
        }
        renderAll();
      }, e=>console.warn('onSnapshot:',e));
  }
});

async function loadFromCloud(uid){
  try{
    const [snap, boxSnap] = await Promise.all([
      fbDb.collection('users').doc(uid).collection('extra').doc('data').get(),
      fbDb.collection('users').doc(uid).collection('box').doc('data').get()
    ]);
    if(snap.exists){
      const d=snap.data();
      const _mi=(key,arr)=>{const loc=JSON.parse(localStorage.getItem(key)||'[]');return arr.map(ct=>{const lc=loc.find(t=>t.id===ct.id);return{...ct,baselineImg:lc?.baselineImg||null};});};
      if(d.makeupContents) localStorage.setItem('onstep_makeup_contents', JSON.stringify(_mi('onstep_makeup_contents',d.makeupContents)));
      else if(d.makeupThemes) localStorage.setItem('onstep_makeup_contents', JSON.stringify(d.makeupThemes?.themes||[]));
      if(d.lookContents)   localStorage.setItem('onstep_look_contents',   JSON.stringify(_mi('onstep_look_contents',d.lookContents)));
      else if(d.lookThemes) localStorage.setItem('onstep_look_contents',  JSON.stringify(d.lookThemes));
      if(d.careThemes)     localStorage.setItem('onstep_care_themes',     JSON.stringify(_mi('onstep_care_themes',d.careThemes)));
      if(d.looks) {
        const ll=JSON.parse(localStorage.getItem('onstep_looks')||'[]');
        localStorage.setItem('onstep_looks', JSON.stringify(d.looks.map(cl=>{
          const loc=ll.find(l=>l.date===cl.date);
          return {...cl, mainPhoto:loc?.mainPhoto||null};
        })));
      }
      if(d.makeupLogs) {
        const ll=JSON.parse(localStorage.getItem('onstep_makeup_logs')||'[]');
        localStorage.setItem('onstep_makeup_logs', JSON.stringify(d.makeupLogs.map(cl=>{
          const lc=ll.find(l=>l.date===cl.date);
          return{...cl,mainPhoto:lc?.mainPhoto||null};
        })));
      }
      if(d.portfolio)      localStorage.setItem('onstep_planned_portfolio',JSON.stringify(d.portfolio));
      if(d.logScenes && Array.isArray(d.logScenes)){
        ALL_SCENES=d.logScenes;
        localStorage.setItem(_SCENE_KEY,JSON.stringify(d.logScenes));
      }
    }
    if(boxSnap.exists){
      const b=boxSnap.data();
      if(b.assets){
        const localAssets=JSON.parse(localStorage.getItem('onstep_box_assets')||'[]');
        const merged=b.assets.map(ca=>{const la=localAssets.find(a=>a.id===ca.id);return{...ca,imgData:la?.imgData||null,storageImgData:la?.storageImgData||null};});
        localStorage.setItem('onstep_box_assets', JSON.stringify(merged));
      }
      if(b.locations){
        const localLocs=JSON.parse(localStorage.getItem('onstep_box_locations')||'[]');
        localStorage.setItem('onstep_box_locations', JSON.stringify(b.locations.map(cl=>{const ll=localLocs.find(l=>(l.key||l.id)===(cl.key||cl.id));return{...cl,imgData:ll?.imgData||null};})));
      }
    }
    renderAll();
  }catch(e){ console.warn('loadFromCloud:',e); }
}

async function saveToCloud(){
  const nowTs = Date.now();
  localStorage.setItem('_onstep_extra_local_ts', (nowTs + 30000).toString());
  if(typeof _broadcastState==='function'){
    _broadcastState('extra');
    _broadcastState('looks');
    _broadcastState('makeupLogs');
  }
  if(!currentUser){ localStorage.setItem('_onstep_extra_local_ts', nowTs.toString()); return; }
  try{
    const uid        = currentUser.uid;
    const care       =JSON.parse(localStorage.getItem('onstep_care_themes')       ||'[]');
    const makeup     =JSON.parse(localStorage.getItem('onstep_makeup_contents')   ||'[]');
    const looks      =JSON.parse(localStorage.getItem('onstep_look_contents')     ||'[]');
    const looksLog   =JSON.parse(localStorage.getItem('onstep_looks')             ||'[]');
    const makeupLogs =JSON.parse(localStorage.getItem('onstep_makeup_logs')       ||'[]');
    const portfolio  =JSON.parse(localStorage.getItem('onstep_planned_portfolio') ||'[]');
    const _uploadThemes=(arr,prefix)=>Promise.all(arr.map(async t=>{
      if(t.baselineImg){
        const {url,hash}=await ensureImgUrl(uid,t.baselineImg,t.storageUrl||null,t.storageHash||'',`${prefix}/${t.id}.jpg`);
        t.storageUrl=url; t.storageHash=hash;
      }
      return{...t,baselineImg:null};
    }));
    const _uploadLogs=(arr,prefix)=>Promise.all(arr.map(async l=>{
      if(l.mainPhoto){
        const {url,hash}=await ensureImgUrl(uid,l.mainPhoto,l.storageUrl||null,l.storageHash||'',`${prefix}/${l.date}.jpg`);
        l.storageUrl=url; l.storageHash=hash;
      }
      return{...l,mainPhoto:null};
    }));
    const [careFs,makeupFs,looksFs,looksLogFs,makeupLogsFs]=await Promise.all([
      _uploadThemes(care,'extra/care'),
      _uploadThemes(makeup,'extra/makeup'),
      _uploadThemes(looks,'extra/look'),
      _uploadLogs(looksLog,'extra/looks'),
      _uploadLogs(makeupLogs,'extra/makeuplogs'),
    ]);
    localStorage.setItem('onstep_care_themes',       JSON.stringify(care));
    localStorage.setItem('onstep_makeup_contents',   JSON.stringify(makeup));
    localStorage.setItem('onstep_look_contents',     JSON.stringify(looks));
    localStorage.setItem('onstep_looks',             JSON.stringify(looksLog));
    localStorage.setItem('onstep_makeup_logs',       JSON.stringify(makeupLogs));
    localStorage.setItem('_onstep_extra_local_ts',   nowTs.toString());
    await fbDb.collection('users').doc(uid).collection('extra').doc('data')
      .set({careThemes:careFs,makeupContents:makeupFs,lookContents:looksFs,looks:looksLogFs,makeupLogs:makeupLogsFs,portfolio,
            logScenes:ALL_SCENES,savedAt:new Date(nowTs).toISOString()},{merge:true});
  }catch(e){
    localStorage.setItem('_onstep_extra_local_ts', nowTs.toString());
    console.warn('saveToCloud:',e);
  }
}

function readHistory(){
  const looks=JSON.parse(localStorage.getItem('onstep_looks')||'[]');
  const makeupLogs=JSON.parse(localStorage.getItem('onstep_makeup_logs')||'[]');
  const lk=JSON.parse(localStorage.getItem('onstep_look_contents')||'[]');
  const mk=JSON.parse(localStorage.getItem('onstep_makeup_contents')||'[]');
  const care=JSON.parse(localStorage.getItem('onstep_care_themes')||'[]');
  const lookItems=looks.filter(l=>l.logged||l.mainPhoto).map(l=>{
    const theme=lk.find(t=>t.id===l.lookThemeId)||mk.find(t=>t.id===l.lookThemeId)||care.find(t=>t.id===l.lookThemeId);
    return{id:l.date,date:l.date,note:l.note||(theme?theme.name||'':''),mainPhoto:l.mainPhoto||null,logged:true,products:theme?(theme.products||[]):[],lookThemeId:l.lookThemeId||null,scheduleLog:l.scheduleLog||[],autoEnabled:l.autoEnabled||false,flowMeta:l.flowMeta||null,type:'look'};
  });
  const makeupItems=makeupLogs.filter(l=>l.logged||l.mainPhoto).map(l=>{
    const theme=mk.find(t=>t.id===l.makeupThemeId);
    return{id:'mk_'+l.date,date:l.date,note:l.note||(theme?theme.name||'':''),mainPhoto:l.mainPhoto||null,logged:true,products:theme?(theme.products||[]):[],makeupThemeId:l.makeupThemeId||null,scheduleLog:[],autoEnabled:false,flowMeta:null,type:'makeup'};
  });
  return[...lookItems,...makeupItems].sort((a,b)=>new Date(b.date)-new Date(a.date));
}

let _boxAssetsCache = null;

function _renderContentCard(c){
  const src=c.baselineImg||c.storageUrl;
  const today=new Date().toISOString().slice(0,10);
  const nextDate=(c.scheduledDates||[]).filter(d=>d>=today).sort()[0];
  const schedCount=(c.scheduleLog||[]).length;
  const autoBadge=c.autoEnabled?`<span class="lib-badge auto">⚡ AUTO</span>`:'';
  const cntBadge=!c.autoEnabled&&schedCount>0?`<span class="lib-badge cnt">${schedCount}×</span>`:'';
  const dateBadge=nextDate?`<span class="lib-badge date">📅 ${nextDate.slice(5).replace('-','/')}</span>`:'';
  const assets=_boxAssetsCache||[];
  const prods=(c.products||[]).map(p=>({p,a:assets.find(a=>a.id===p.id)})).filter(({a})=>!!a);
  const prodsStrip=prods.length
    ?`<div class="lib-card-prods">${prods.map(({p,a})=>{
        const imgStyle=(a.imgData||a.storageUrl)?`background-image:url(${a.imgData||a.storageUrl})`:'';
        const icon=!a.imgData?(a.icon||'📦'):'';
        return `<div class="lib-card-prod">
          <div class="lib-prod-img" style="${imgStyle}">${icon}</div>
          <div class="lib-prod-name">${a?.name||p.name||''}</div>
        </div>`;
      }).join('')}</div>`
    :'';
  const heroStyle=src?`background-image:url(${src})`:'';
  return `<div class="lib-card" onclick="openContentDetail(${c.id})">
    <div class="lib-card-hero" style="${heroStyle}">${!src?`${c.emoji||'✦'}`:''}</div>
    <div class="lib-card-body">
      <div class="lib-card-info">
        <div class="lib-card-name">${c.name||'Untitled'}</div>
        ${c.description?`<div class="lib-card-desc">${c.description}</div>`:''}
        <div class="lib-card-meta">${autoBadge}${cntBadge}${dateBadge}</div>
      </div>
      <button type="button" class="lib-sched-btn${nextDate?' done':''}" onclick="event.stopPropagation();openDateSheet(${c.id})">${nextDate?'✓':'+ 일정'}</button>
    </div>
    ${prodsStrip}
  </div>`;
}

function renderContent(){
  const grid=document.getElementById('content-grid');
  const countEl=document.getElementById('content-count');
  if(!grid) return;
  _boxAssetsCache=JSON.parse(localStorage.getItem('onstep_box_assets')||'[]');
  const items=readContents(activeTab).slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
  countEl.textContent=`${items.length} ITEMS`;
  if(!items.length){
    _boxAssetsCache=null;
    grid.innerHTML=`<div class="empty-box">
      <div class="empty-icon">◎</div>
      <div class="empty-title">${activeTab==='makeup'?'메이크업 컬렉션을 만들어보세요':'룩북을 만들어보세요'}</div>
      <div class="empty-sub">+ 버튼으로 인스타 레퍼런스나<br>직접 촬영한 이미지로 컬렉션을 시작하세요</div>
    </div>`;
    return;
  }
  const visible=items.slice(0,_contentLimit);
  const moreBtn=items.length>_contentLimit
    ?`<div class="muse-more-btn" onclick="_contentShowMore()">더 보기 (${items.length-_contentLimit}개 더) ▾</div>`:'';
  grid.innerHTML=visible.map(_renderContentCard).join('')+moreBtn;
  _boxAssetsCache=null;
}

  document.getElementById('detail-body').innerHTML=`
    <div class="detail-hero" style="${heroStyle}">${!src?`<span style="font-size:48px;opacity:.2">${c.emoji||'✦'}</span>`:''}</div>

      ${prodsHtml?`<div class="detail-prods-row">${prodsHtml}</div>`:''}
      <button type="button" class="muse-prods-btn" onclick="openBoxPicker(${id})">+ BOX에서 불러오기</button>

function openContentEdit(id){ openAddSheet(id); }

function removeContentProd(contentId, prodId){

  const items=readContents(cat);

  if(idx===-1) return;

function toggleContentAuto(id){

  const idx=items.findIndex(x=>x.id==id);

// ── Add / Edit Content ────────────────────────────────────────────
let _addState={editId:null,imgData:null,tpo:[],products:[],dates:[]};

function openAddSheet(editId=null){
  const cat=detailKind&&detailKind!=='HISTORY'?detailKind:activeTab;
  _addState={editId,imgData:null,tpo:[],products:[],dates:[],cat};
  document.getElementById('add-sheet-title').textContent=editId?'컨텐츠 편집':'컨텐츠 추가';
  document.getElementById('add-emoji').value='';
  document.getElementById('add-name').value='';
  document.getElementById('add-desc').value='';
  document.getElementById('add-source-url').value='';
  document.getElementById('add-img-pick').style.backgroundImage='';
  document.getElementById('add-img-ph').classList.remove('hidden');
  document.getElementById('add-img-rm').classList.add('hidden');
  document.getElementById('add-img-input').value='';
  document.getElementById('add-tpo-sec').style.display=cat==='lookbook'?'':'none';
  document.getElementById('add-prods-chips').innerHTML='';
  document.getElementById('add-prods-btn').textContent='+ BOX에서 불러오기';

  if(editId){
    const c=readContents(cat).find(x=>x.id==editId);
    if(c){
      _addState.imgData=c.baselineImg||null;
      _addState.tpo=[...(c.tpo||[])];
      _addState.products=[...(c.products||[])];
      _addState.dates=[...(c.scheduledDates||[])];
      document.getElementById('add-emoji').value=c.emoji||'';
      document.getElementById('add-name').value=c.name||'';
      document.getElementById('add-desc').value=c.description||'';
      document.getElementById('add-source-url').value=c.sourceUrl||'';
      if(c.baselineImg||c.storageUrl){
        document.getElementById('add-img-pick').style.backgroundImage=`url(${c.baselineImg||c.storageUrl})`;
        document.getElementById('add-img-ph').classList.add('hidden');
        document.getElementById('add-img-rm').classList.remove('hidden');
      }
      _renderAddProdsChips();
    }
  }
  _renderAddTpo();
  document.getElementById('add-sheet').classList.add('open');
  setTimeout(()=>document.getElementById('add-name').focus(),350);
}
function closeAddSheet(){document.getElementById('add-sheet').classList.remove('open');}

function _renderAddTpo(){
  const wrap=document.getElementById('add-tpo-row');if(!wrap)return;
  const opts=['Daily','Work','Date','Party','Sport','Casual','Formal','Travel'];
  wrap.innerHTML=opts.map(t=>`<button type="button" class="tpo-chip${_addState.tpo.includes(t)?' on':''}" onclick="toggleAddTpo('${t}')">${t}</button>`).join('');
}
function toggleAddTpo(t){
  const i=_addState.tpo.indexOf(t);
  if(i===-1)_addState.tpo.push(t);else _addState.tpo.splice(i,1);
  _renderAddTpo();
}
function _renderAddProdsChips(){
  const wrap=document.getElementById('add-prods-chips');if(!wrap)return;
  wrap.innerHTML=_addState.products.map(p=>`<div class="detail-prod">${p.name}${p.brand?` · ${p.brand}`:''}</div>`).join('');
  const btn=document.getElementById('add-prods-btn');
  if(btn)btn.textContent=_addState.products.length?`+ 제품 변경 (${_addState.products.length}개)`:'+ BOX에서 불러오기';
}
function _applyAddImg(compressed){
  _addState.imgData=compressed;
  document.getElementById('add-img-pick').style.backgroundImage=`url(${compressed})`;
  document.getElementById('add-img-ph').classList.add('hidden');
  document.getElementById('add-img-rm').classList.remove('hidden');
}
function triggerAddImg(){showImgPickSheet(_applyAddImg,600,0.68);}
function handleAddImg(input){
  const file=input.files[0];if(!file)return;
  _compressFile(file,600,0.68,_applyAddImg);
}
function removeAddImg(e){
  e.stopPropagation();_addState.imgData=null;
  document.getElementById('add-img-pick').style.backgroundImage='';
  document.getElementById('add-img-ph').classList.remove('hidden');
  document.getElementById('add-img-rm').classList.add('hidden');
}
function saveContent(){
  const name=document.getElementById('add-name').value.trim();
  const emoji=document.getElementById('add-emoji').value.trim()||'✦';
  const desc=document.getElementById('add-desc').value.trim();
  const sourceUrl=document.getElementById('add-source-url').value.trim();
  if(!name&&!_addState.imgData){showToast('이름 또는 이미지를 입력하세요');return;}
  const cat=_addState.cat||activeTab;
  const items=readContents(cat);
  const obj={
    id:_addState.editId||Date.now(),
    category:cat==='makeup'?'makeup':'lookbook',
    name,emoji,description:desc,
    baselineImg:_addState.imgData||null,sourceUrl,
    products:_addState.products,
    tpo:cat==='lookbook'?_addState.tpo:[],
    scheduledDates:_addState.dates,
    scheduleLog:[],autoEnabled:false,
    updatedAt:new Date().toISOString()
  };
  if(_addState.editId){
    const idx=items.findIndex(x=>x.id==_addState.editId);
    if(idx!==-1){obj.scheduleLog=items[idx].scheduleLog||[];obj.autoEnabled=items[idx].autoEnabled||false;items[idx]=obj;}
    else items.push(obj);
  }else{items.unshift(obj);}
  try{writeContents(cat,items);}catch(e){showToast('저장 실패: 저장공간 부족');return;}
  saveToCloud();
  closeAddSheet();
  renderContent();
  if(_addState.editId) openContentDetail(_addState.editId);
  showToast(`✓ "${name}" ${_addState.editId?'수정됨':'추가됨'}`);
}

// ── Date Registration ─────────────────────────────────────────────
let _dateContentId=null;

function openDateSheet(id){
  _dateContentId=id;
  const cat=detailKind&&detailKind!=='HISTORY'?detailKind:activeTab;
  const c=readContents(cat).find(x=>x.id==id);
  _renderDateHistory(c);
  document.getElementById('date-input').value=new Date().toISOString().slice(0,10);
  document.getElementById('date-sheet').classList.add('open');
}
function closeDateSheet(){document.getElementById('date-sheet').classList.remove('open');_dateContentId=null;}

function _renderDateHistory(c){
  const wrap=document.getElementById('date-history-wrap');if(!wrap)return;
  const log=(c?.scheduleLog)||[];
  if(!log.length){wrap.innerHTML='';return;}
  const count=log.length;
  const pct=Math.min(count/SCHED_THRESHOLD*100,100);
  const reached=count>=SCHED_THRESHOLD;
  const shown=log.slice(-4);
  const chips=shown.map(e=>`<span class="sched-log-chip">${e.date.slice(5).replace('-','/')}</span>`).join('');
  const more=count>4?`<span class="sched-log-chip sched-log-more">+${count-4}</span>`:'';
  wrap.innerHTML=`<div class="sched-log-section">
    <div class="sched-log-label">등록 이력 · ${count}회</div>
    <div class="sched-log-chips">${chips}${more}</div>
    <div class="sched-progress-wrap"><div class="sched-progress-bar" style="width:${pct}%;background:${reached?'var(--lime)':'var(--ink)'}"></div></div>
    <div class="sched-progress-lbl${reached?' reached':''}">${reached?'✓ 자동화 달성! Today 자동 노출 가능':`${count}/${SCHED_THRESHOLD}회 · 달성 시 Today 자동 노출`}</div>
  </div>`;
}

function confirmDate(){
  const date=document.getElementById('date-input').value;
  if(!date){showToast('날짜를 선택하세요');return;}
  const cat=detailKind&&detailKind!=='HISTORY'?detailKind:activeTab;
  const items=readContents(cat);
  const idx=items.findIndex(x=>x.id==_dateContentId);
  if(idx===-1){showToast('항목을 찾을 수 없습니다');closeDateSheet();return;}
  if(!items[idx].scheduledDates)items[idx].scheduledDates=[];
  if(!items[idx].scheduledDates.includes(date))items[idx].scheduledDates.push(date);
  if(!items[idx].scheduleLog)items[idx].scheduleLog=[];
  if(!items[idx].scheduleLog.find(e=>e.date===date))items[idx].scheduleLog.push({date});
  try{writeContents(cat,items);}catch(e){showToast('저장 실패');return;}
  saveToCloud();closeDateSheet();closeDetail();renderContent();
  const d=new Date(date+'T00:00:00');
  showToast(`📅 ${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 일정 등록됨`);
}

// ── Apply to Future ──────────────────────────────────────────────
let applyId=null;

function openApplySheet(id){
  applyId=id;
  document.getElementById('apply-date').value='';
  const h=readHistory().find(i=>i.id===id)||null;
  _renderApplyHistory(h);
  document.getElementById('apply-sheet').classList.add('open');
}
function closeApplySheet(){ document.getElementById('apply-sheet').classList.remove('open'); applyId=null; }

function _renderApplyHistory(h){
  const wrap=document.getElementById('apply-history-wrap');
  if(!wrap) return;
  const log=(h?.scheduleLog)||[];
  if(!log.length){ wrap.innerHTML=''; return; }
  const count=log.length;
  const pct=Math.min(count/SCHED_THRESHOLD*100,100);
  const reached=count>=SCHED_THRESHOLD;
  const autoEnabled=h?.autoEnabled||false;
  const shown=log.slice(-4);
  const chips=shown.map(e=>{
    const d=new Date(e.date+'T00:00:00');
    return `<span class="sched-log-chip">${d.getMonth()+1}/${d.getDate()}</span>`;
  }).join('');
  const more=count>4?`<span class="sched-log-chip sched-log-more">+${count-4}</span>`:'';
  const barColor=reached?'var(--lime)':'var(--ink)';
  const lbl=reached?'✓ 자동화 달성! Today 자동 노출 가능':`${count}/${SCHED_THRESHOLD}회 · 달성 시 Today 자동 노출`;
  const autoCard=reached?`<div class="sched-auto-card">
    <div class="sched-auto-row">
      <div>
        <div class="sched-auto-title">⚡ Today 자동 노출</div>
        <div class="sched-auto-desc">이 룩이 카테고리 패턴 기반으로 Today에 자동 표시됩니다</div>
      </div>
      <button type="button" class="sched-auto-toggle${autoEnabled?' on':''}" onclick="toggleApplyAuto('${h.id}')">${autoEnabled?'ON':'OFF'}</button>
    </div>
  </div>`:'';
  wrap.innerHTML=`<div class="sched-log-section">
    <div class="sched-log-label">예약 이력 · ${count}회</div>
    <div class="sched-log-chips">${chips}${more}</div>
    <div class="sched-progress-wrap"><div class="sched-progress-bar" style="width:${pct}%;background:${barColor}"></div></div>
    <div class="sched-progress-lbl${reached?' reached':''}">${lbl}</div>
  </div>${autoCard}`;
}

function toggleApplyAuto(histId){
  const looks=JSON.parse(localStorage.getItem('onstep_looks')||'[]');
  const idx=looks.findIndex(l=>l.date===histId);
  if(idx===-1) return;
  looks[idx].autoEnabled=!looks[idx].autoEnabled;
  localStorage.setItem('onstep_looks',JSON.stringify(looks));
  saveToCloud();
  const h=readHistory().find(i=>i.id===histId)||null;
  _renderApplyHistory(h);
  showToast(looks[idx].autoEnabled?'⚡ 자동 노출 활성화됨':'자동 노출 해제됨');
}

function confirmApply(){
  const date=document.getElementById('apply-date').value;
  if(!date){ showToast('날짜를 선택하세요'); return; }
  const h=readHistory().find(i=>i.id===applyId);
  if(!h){ showToast('항목을 찾을 수 없습니다'); return; }
  if(h.lookThemeId){
    const lk=JSON.parse(localStorage.getItem('onstep_look_contents')||'[]');
    const idx=lk.findIndex(t=>t.id===h.lookThemeId);
    if(idx!==-1){
      const dates=lk[idx].scheduledDates||[];
      if(!dates.includes(date)) lk[idx].scheduledDates=[...dates,date].sort();
      localStorage.setItem('onstep_look_contents',JSON.stringify(lk));
    }
  }
  const daily=JSON.parse(localStorage.getItem('onstep_looks')||'[]');
  if(!daily.find(l=>l.date===date)){
    daily.push({date,mainPhoto:h.mainPhoto||null,note:h.note,logged:false,lookThemeId:h.lookThemeId||null,scheduleLog:[]});
  }
  const srcIdx=daily.findIndex(l=>l.date===applyId);
  if(srcIdx!==-1){
    if(!daily[srcIdx].scheduleLog) daily[srcIdx].scheduleLog=[];
    if(!daily[srcIdx].scheduleLog.find(e=>e.date===date)) daily[srcIdx].scheduleLog.push({date});
  }
  localStorage.setItem('onstep_looks',JSON.stringify(daily));
  saveToCloud();
  closeApplySheet();
  closeDetail();
  const d=new Date(date);
  showToast(`📅 "${h.note}" → ${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 예약됨`);
}

// ── History Delete ───────────────────────────────────────────────
function deleteHistoryRecord(id){
  if(id.startsWith('mk_')){
    const date=id.slice(3);
    localStorage.setItem('onstep_makeup_logs',JSON.stringify(JSON.parse(localStorage.getItem('onstep_makeup_logs')||'[]').filter(l=>l.date!==date)));
    localStorage.removeItem(`onstep_motd_done_${date}`);
  }else{
    const date=id;
    localStorage.setItem('onstep_looks',JSON.stringify(JSON.parse(localStorage.getItem('onstep_looks')||'[]').filter(l=>l.date!==date)));
    const lk=JSON.parse(localStorage.getItem('onstep_look_contents')||'[]');
    lk.forEach(t=>{if(t.scheduledDates)t.scheduledDates=t.scheduledDates.filter(d=>d!==date);});
    localStorage.setItem('onstep_look_contents',JSON.stringify(lk));
    const mk=JSON.parse(localStorage.getItem('onstep_makeup_contents')||'[]');
    mk.forEach(t=>{if(t.scheduledDates)t.scheduledDates=t.scheduledDates.filter(d=>d!==date);});
    localStorage.setItem('onstep_makeup_contents',JSON.stringify(mk));
    localStorage.removeItem(`onstep_motd_done_${date}`);
  }
  saveToCloud();
}

function confirmDeleteHistory(date){
  if(!confirm(`${date} 기록을 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
  deleteHistoryRecord(date);
  closeDetail();
  renderAll();
  if(document.getElementById('archive-panel').classList.contains('open')) renderArchive();
  showToast('기록 삭제됨');
}

// ── Archive ───────────────────────────────────────────────────────
let archiveEditMode=false;
let archiveSel=new Set();

function openArchive(){
  archiveEditMode=false;
  archiveSel=new Set();
  document.getElementById('archive-search').value='';
  document.getElementById('archive-edit-btn').textContent='편집';
  document.getElementById('archive-edit-bar').classList.add('hidden');
  renderArchive();
  document.getElementById('archive-panel').classList.add('open');
}
function closeArchive(){
  document.getElementById('archive-panel').classList.remove('open');
  archiveEditMode=false; archiveSel=new Set();
}

function toggleArchiveEdit(){
  archiveEditMode=!archiveEditMode;
  archiveSel=new Set();
  document.getElementById('archive-edit-btn').textContent=archiveEditMode?'완료':'편집';
  document.getElementById('archive-edit-bar').classList.toggle('hidden',!archiveEditMode);
  _updateArchiveEditBar();
  renderArchive();
}

function _updateArchiveEditBar(){
  const n=archiveSel.size;
  document.getElementById('archive-sel-label').textContent=`${n}개 선택`;
  const btn=document.getElementById('archive-del-btn');
  btn.disabled=n===0;
}

function archiveItemClick(id){
  if(archiveEditMode){
    if(archiveSel.has(id)) archiveSel.delete(id); else archiveSel.add(id);
    _updateArchiveEditBar();
    const el=document.querySelector(`.archive-item[data-id="${id}"]`);
    if(el){
      el.classList.toggle('selected',archiveSel.has(id));
      const cb=el.querySelector('.archive-cb');
      if(cb) cb.textContent=archiveSel.has(id)?'✓':'';
    }
  }else{
    const h=readHistory().find(i=>i.id===id);
    if(h) openHistoryDetail(h.id);
  }
}

function deleteSelected(){
  if(!archiveSel.size) return;
  const n=archiveSel.size;
  if(!confirm(`선택한 ${n}건을 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
  archiveSel.forEach(date=>deleteHistoryRecord(date));
  archiveSel=new Set();
  _updateArchiveEditBar();
  renderAll();
  renderArchive();
  showToast(`${n}건 삭제됨`);
}

function renderArchive(){
  const list=document.getElementById('archive-list');
  if(!list) return;
  const q=(document.getElementById('archive-search').value||'').toLowerCase();
  const all=readHistory();
  const filtered=q
    ?all.filter(h=>h.date.includes(q)||(h.note||'').toLowerCase().includes(q))
    :all;
  if(!filtered.length){
    list.innerHTML=`<div style="padding:48px 24px;text-align:center;color:var(--mist);font-size:12px;font-weight:600">${q?'검색 결과 없음':'기록이 없습니다'}</div>`;
    return;
  }
  // 연도 → 월 그룹핑
  const groups={};
  filtered.forEach(h=>{
    const [y,m]=h.date.split('-');
    const yk=y; const mk=`${y}-${m}`;
    if(!groups[yk]) groups[yk]={};
    if(!groups[yk][mk]) groups[yk][mk]=[];
    groups[yk][mk].push(h);
  });
  const html=Object.keys(groups).sort((a,b)=>b-a).map(y=>{
    const monthsHtml=Object.keys(groups[y]).sort((a,b)=>b.localeCompare(a)).map(mk=>{
      const mo=parseInt(mk.split('-')[1]);
      const items=groups[y][mk];
      const rowsHtml=items.map(h=>{
        const src=h.mainPhoto||h.storageUrl;
        const thumbStyle=src?`background-image:url(${src})`:`background:${h._bg||'#f0f0f2'}`;
        const prods=(h.products||[]).slice(0,2).map(p=>p.name||'').filter(Boolean).join(' · ');
        const sel=archiveSel.has(h.id);
        const cbHtml=archiveEditMode?`<div class="archive-cb">${sel?'✓':''}</div>`:'';
        const applyHtml=archiveEditMode||h.type==='makeup'?'':
          `<button type="button" class="archive-apply-btn" onclick="event.stopPropagation();openApplySheet('${h.id}')">Apply →</button>`;
        const typeTag=h.type==='makeup'?`<span style="font-size:11px;font-weight:700;letter-spacing:.05em;color:#9CA3AF">💄 MAKEUP</span>`:'';
        return `<div class="archive-item${sel?' selected':''}" data-id="${h.id}" onclick="archiveItemClick('${h.id}')">
          ${cbHtml}
          <div class="archive-thumb" style="${thumbStyle}"></div>
          <div class="archive-info">
            <div class="archive-date">${h.date} ${typeTag}</div>
            <div class="archive-note">${h.note||'Untitled'}</div>
            ${prods?`<div class="archive-prods">${prods}</div>`:''}
          </div>
          ${applyHtml}
        </div>`;
      }).join('');
      return `<div class="archive-group-month">${mo}월<span class="archive-month-count">${items.length}건</span></div>${rowsHtml}`;
    }).join('');
    return `<div class="archive-group-year">${y}</div>${monthsHtml}`;
  }).join('');
  list.innerHTML=html;
}

// ── BOX Product Picker ───────────────────────────────────────────
let _bpContentId=null, bpSelected=new Set();
let _bpPickerExpanded=false;
let _bpDomain='beauty', _bpSubcat='all';

const BP_BEAUTY_CATS={skincare:['toner','serum','cream','essence','suncare','mask','cleansing','eye','lip_care','etc'],makeup:['base','lip','eye','cheek','brow','etc']};
const BP_FASHION_CATS=['top','bottom','outer','shoes','bag','acc'];
const BP_ACC_CATS=['jewelry','watch','belt','sunglasses','hat','other'];

function setBpDomain(d){
  _bpDomain=d; _bpSubcat='all';
  ['beauty','fashion','acc'].forEach(x=>document.getElementById('bpd-'+x)?.classList.toggle('active',x===d));
  _renderBpSubcats();
  renderBoxPicker();
}
function setBpSubcat(s){
  _bpSubcat=s;
  document.querySelectorAll('#bp-subcat-row .bp-scat').forEach(b=>b.classList.toggle('active',b.dataset.key===s));
  renderBoxPicker();
}
function _renderBpSubcats(){
  const row=document.getElementById('bp-subcat-row');
  if(!row) return;
  if(_bpDomain==='beauty'){
    const cats=[{key:'all',label:'전체'},{key:'skincare',label:'Skincare'},{key:'makeup',label:'Makeup'}];
    row.innerHTML=cats.map(c=>`<button class="bp-scat${_bpSubcat===c.key?' active':''}" data-key="${c.key}" onclick="setBpSubcat('${c.key}')">${c.label}</button>`).join('');
  } else if(_bpDomain==='fashion'){
    const cats=[{key:'all',label:'전체'},...BP_FASHION_CATS.map(k=>({key:k,label:k.toUpperCase()}))];
    row.innerHTML=cats.map(c=>`<button class="bp-scat${_bpSubcat===c.key?' active':''}" data-key="${c.key}" onclick="setBpSubcat('${c.key}')">${c.label}</button>`).join('');
  } else {
    const cats=[{key:'all',label:'전체'},...BP_ACC_CATS.map(k=>({key:k,label:k.toUpperCase()}))];
    row.innerHTML=cats.map(c=>`<button class="bp-scat${_bpSubcat===c.key?' active':''}" data-key="${c.key}" onclick="setBpSubcat('${c.key}')">${c.label}</button>`).join('');
  }
}

function openBoxPickerForAdd(){
  _bpContentId=null;
  _bpPickerExpanded=false;
  _bpDomain='beauty'; _bpSubcat='all';
  bpSelected=new Set(_addState.products.map(p=>p.id));
  document.getElementById('bp-search').value='';
  ['beauty','fashion','acc'].forEach(x=>document.getElementById('bpd-'+x)?.classList.toggle('active',x==='beauty'));
  _renderBpSubcats();
  renderBoxPicker();
  document.getElementById('bp-panel').classList.add('open');
}
function openBoxPicker(contentId){
  _bpContentId=contentId;
  _bpPickerExpanded=false;
  _bpDomain='beauty'; _bpSubcat='all';
  const cat=detailKind||activeTab;
  const c=readContents(cat).find(x=>x.id==contentId);
  bpSelected=new Set((c?.products||[]).map(p=>p.id));
  document.getElementById('bp-search').value='';
  ['beauty','fashion','acc'].forEach(x=>document.getElementById('bpd-'+x)?.classList.toggle('active',x==='beauty'));
  _renderBpSubcats();
  renderBoxPicker();
  document.getElementById('bp-panel').classList.add('open');
}
function closeBoxPicker(){
  document.getElementById('bp-panel').classList.remove('open');
  _bpContentId=null;
}
function _bpPickerShowMore(){
  _bpPickerExpanded=true;
  renderBoxPicker();
}
function renderBoxPicker(){
  const q=(document.getElementById('bp-search').value||'').toLowerCase();
  const assets=JSON.parse(localStorage.getItem('onstep_box_assets')||'[]');
  const domainLabel={beauty:'뷰티',fashion:'패션',acc:'악세서리'};
  let filtered=assets.filter(a=>a.domain===_bpDomain);
  if(_bpDomain==='beauty'&&_bpSubcat!=='all') filtered=filtered.filter(a=>a.type===_bpSubcat);
  if(_bpDomain!=='beauty'&&_bpSubcat!=='all') filtered=filtered.filter(a=>a.catKey===_bpSubcat);
  if(q) filtered=filtered.filter(a=>(a.name||'').toLowerCase().includes(q)||(a.brand||'').toLowerCase().includes(q));
  filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
  const showAll=_bpPickerExpanded||!!q;
  const visible=showAll?filtered:filtered.slice(0,12);
  const rows=visible.map(a=>`
    <div class="bp-item${bpSelected.has(a.id)?' selected':''}" onclick="toggleBoxAsset(${a.id})">
      <div class="bp-item-check">${bpSelected.has(a.id)?'✓':''}</div>
      <div class="bp-item-info">
        <div class="bp-item-name">${a.name||'알 수 없음'}</div>
        <div class="bp-item-brand">${a.brand||'—'}</div>
      </div>
      <div class="bp-item-domain">${a.type||domainLabel[a.domain]||a.domain||''}</div>
    </div>`).join('');
  const moreBtn=(!showAll&&filtered.length>12)
    ?`<div class="bp-more-btn" onclick="_bpPickerShowMore()">더 보기 (${filtered.length-12}개 더) ▾</div>`
    :'';
  document.getElementById('bp-list').innerHTML=filtered.length
    ?(rows+moreBtn)
    :`<div style="padding:48px 24px;text-align:center;color:var(--mist);font-size:12px;font-weight:600">BOX에 등록된 ${domainLabel[_bpDomain]||''} 제품이 없습니다</div>`;
  document.getElementById('bp-sel-count').textContent=bpSelected.size;
}
function toggleBoxAsset(id){
  if(bpSelected.has(id)) bpSelected.delete(id); else bpSelected.add(id);
  renderBoxPicker();
}
function confirmBoxPick(){
  const assets=JSON.parse(localStorage.getItem('onstep_box_assets')||'[]');
  const picked=assets.filter(a=>bpSelected.has(a.id)).map(a=>({id:a.id,name:a.name,brand:a.brand||null}));
  if(_bpContentId===null){
    _addState.products=picked;
    _renderAddProdsChips();
    closeBoxPicker();
  }else{
    const cat=detailKind||activeTab;
    const items=readContents(cat);
    const idx=items.findIndex(x=>x.id==_bpContentId);
    if(idx===-1){closeBoxPicker();return;}
    items[idx].products=picked;
    writeContents(cat,items);
    saveToCloud();
    const savedId=_bpContentId;
    closeBoxPicker();
    renderContent();
    openContentDetail(savedId);
  }
  showToast(`✓ ${picked.length}개 제품 연결됨`);
}

// ── Utilities ────────────────────────────────────────────────────
function handleSheetBg(e,id){
  if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

// ── Init ─────────────────────────────────────────────────────────
renderAll();

(function _migrateV2(){
  if(localStorage.getItem('_onstep_migrated_v2'))return;
  const mk=[],lk=[];
  try{JSON.parse(localStorage.getItem('onstep_muse_items')||'[]').forEach(m=>{
    const isL=m.schedule_type==='OOTD'||(m.category_tags||[]).some(t=>['look','fashion','ootd','outfit'].includes((t||'').toLowerCase()));
    (isL?lk:mk).push({id:m.id,category:isL?'lookbook':'makeup',name:m.note||'',emoji:'✦',description:'',baselineImg:m.image_data||null,sourceUrl:m.image_url||'',products:m.products||[],tpo:[],scheduledDates:m.scheduled_date?[m.scheduled_date]:[],scheduleLog:m.scheduleLog||[],autoEnabled:m.autoEnabled||false,updatedAt:new Date().toISOString()});
  });}catch(e){}
  try{(JSON.parse(localStorage.getItem('onstep_makeup_themes')||'{"themes":[]}').themes||[]).forEach(t=>{
    if(!mk.find(c=>c.id===t.id))mk.push({id:t.id,category:'makeup',name:t.name||'',emoji:t.emoji||'✦',description:t.description||'',baselineImg:t.baselineImg||null,sourceUrl:'',products:t.products||[],tpo:[],scheduledDates:t.scheduledDates||[],scheduleLog:[],autoEnabled:false,updatedAt:t.updatedAt||new Date().toISOString()});
  });}catch(e){}
  try{JSON.parse(localStorage.getItem('onstep_look_themes')||'[]').forEach(t=>{
    if(!lk.find(c=>c.id===t.id))lk.push({id:t.id,category:'lookbook',name:t.name||'',emoji:t.emoji||'✦',description:t.description||'',baselineImg:t.baselineImg||null,sourceUrl:'',products:t.products||t.items||[],tpo:t.tpo||[],scheduledDates:t.scheduledDates||[],scheduleLog:[],autoEnabled:false,updatedAt:t.updatedAt||new Date().toISOString()});
  });}catch(e){}
  try{
    if(mk.length)localStorage.setItem('onstep_makeup_contents',JSON.stringify(mk));
    if(lk.length)localStorage.setItem('onstep_look_contents',JSON.stringify(lk));
  }catch(e){}
  localStorage.removeItem('onstep_muse_items');
  localStorage.removeItem('onstep_makeup_themes');
  localStorage.removeItem('onstep_look_themes');
  localStorage.setItem('_onstep_migrated_v2','1');
})();
</script>
