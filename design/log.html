<style>
:root {
  --bg:#FFFFFF; --surface:#F5F5F3; --surface-low:#EFEFED;
  --surface-mid:#E8E8E6; --surface-high:#DDDDD9;
  --ink:#0A0A0A; --sub:#444444; --mist:#999999;
  --lime:#C5FF00; --lime-dark:#A8DB00; --lime-fg:#0A0A0A;
  --border:rgba(10,10,10,.1); --border-md:rgba(10,10,10,.18); --border-light:rgba(10,10,10,.08);
  --shadow:0 2px 16px rgba(0,0,0,.07);
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-full:9999px;
  --green:#2d6a4f; --gutter:16px;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:#EBEBEB; display:flex; justify-content:center; align-items:flex-start;

  font-family:'Inter',sans-serif; color:var(--ink); -webkit-font-smoothing:antialiased;
}
.phone {
  width:390px; background:#FFFFFF; border-radius:48px;
  box-shadow:0 0 0 1px rgba(255,255,255,.6) inset, 0 40px 100px rgba(0,0,0,.22);
  overflow:hidden; position:relative;
}
.notch { height:44px; background:#FFFFFF; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px; }
.notch-bar { width:126px; height:5px; background:var(--ink); border-radius:3px; opacity:.1; }
.scroll { height:844px; overflow-y:auto; scrollbar-width:none; background:#FFFFFF; }
.scroll::-webkit-scrollbar { display:none; }

/* AppBar */
.appbar {
  padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
  background:rgba(255,255,255,.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  position:sticky; top:0; z-index:10; border-bottom:1px solid var(--border);
}
.appbar-menu { width:22px; display:flex; flex-direction:column; gap:5px; cursor:pointer; }
.appbar-menu span { height:1.5px; background:var(--ink); border-radius:2px; display:block; }
.appbar-menu span:nth-child(2) { width:68%; }
.appbar-center {
  font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700;
  letter-spacing:.02em; color:var(--ink);
}
#auth-avatar {
  width:32px; height:32px; border-radius:9999px; background:var(--surface-mid);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; overflow:hidden; border:1.5px solid var(--border);
}

/* Filter bar */
.filter-bar {
  display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid var(--border); padding:10px 16px;
  position:sticky; top:49px; z-index:8;
  background:rgba(255,255,255,.94); backdrop-filter:blur(16px);
}
.filter-bar::-webkit-scrollbar { display:none; }
.filter-chip {
  flex-shrink:0; padding:6px 14px; border-radius:var(--r-full);
  border:1.5px solid var(--border-md);
  font-family:'Inter',sans-serif; font-size:10px; font-weight:700;
  letter-spacing:.06em; text-transform:uppercase; color:var(--mist);
  cursor:pointer; transition:all .18s; white-space:nowrap; background:transparent;
}
.filter-chip.active { color:#FFFFFF; background:var(--ink); border-color:var(--ink); }

/* Issue header */
.issue-hd {
  display:flex; align-items:center; gap:10px;
  padding:20px 16px 12px; border-bottom:1px solid var(--border);
}
.issue-month {
  font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:800;
  letter-spacing:-.01em; color:var(--ink);
}
.issue-num {
  font-family:'Inter',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:.12em; text-transform:uppercase; color:var(--mist);
  background:var(--surface); padding:3px 8px; border-radius:var(--r-full);
}
.issue-count {
  font-family:'Inter',sans-serif; font-size:10px; font-weight:600;
  letter-spacing:.08em; text-transform:uppercase; color:var(--mist); margin-left:auto;
}

/* Cover card */
.cover-card { margin:16px 16px 0; position:relative; border-radius:var(--r-xl); overflow:hidden; cursor:pointer; box-shadow:var(--shadow); border:1px solid var(--border); }
.cover-img {

.cover-body { padding:14px 16px 18px; background:#FFFFFF; }
.cover-type {

}
.cover-title {

}
.cover-meta {
  font-family:'Inter',sans-serif; font-size:10px; font-weight:600;
  letter-spacing:.08em; text-transform:uppercase; color:var(--mist);
}

/* Feature card */
.feature-card {

  box-shadow:var(--shadow); border:1px solid var(--border);
}
.feature-img {

  background-size:cover; background-position:center;

}
.feature-body {
  flex:1; padding:14px 14px 14px 12px; background:#FFFFFF;
  display:flex; flex-direction:column; justify-content:space-between;
}
.feature-type {
  font-family:'Inter',sans-serif; font-size:8px; font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; color:var(--mist); margin-bottom:4px;
}
.feature-title {
  font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:700;
  color:var(--ink); line-height:1.2; flex:1; letter-spacing:-.01em;
}
.feature-desc {

.feature-meta {

}
.feature-thumbs { display:flex; gap:4px; margin-top:8px; }
.feature-thumb {

/* Brief grid */
.brief-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px 16px 0; }
.brief-card { cursor:pointer; border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--shadow); border:1px solid var(--border); background:#FFFFFF; }
.brief-img {

.brief-title {

/* Load more */
.load-more-wrap { padding:20px 16px; text-align:center; }
.load-more-btn {

/* Empty archive */

.empty-archive-sub {

/* Detail panel */
.detail-panel {

.detail-prod-item { text-align:center; }
.detail-prod-img {

.detail-prod-name {

.detail-ok-btn {

.detail-ok-btn:active { opacity:.8; }

/* Bottom nav */
.bottom-nav {
  background:#0A0A0A; border-top:none;
  display:flex; padding:10px 0 20px;
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
  cursor:pointer; padding:4px 0; text-decoration:none;
}
.nav-icon {

.nav-item.active .nav-label { color:var(--lime); }
.nav-item.active .nav-icon { color:var(--lime); }
.nav-item.active .nav-icon::after {

/* Toast */
.toast {

.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media (max-width:430px) {

// ── Firebase ──────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyBdKnyU8t0XrQsT_EhKS2nk9zOKwjxoquk",
  authDomain: "onstep-lifeos.firebaseapp.com",
  projectId: "onstep-lifeos",
  storageBucket: "onstep-lifeos.firebasestorage.app",
  messagingSenderId: "333501649998",
  appId: "1:333501649998:web:4eebd8b84a32ea8a581f1f"
});
const fbAuth = firebase.auth();
let currentUser = null;
firebase.auth().onAuthStateChanged(user => { currentUser = user; updateAuthAvatar(user); });

function updateAuthAvatar(user) {
  const el = document.getElementById('auth-avatar');
  if (!el) return;
  if (user) {
    el.innerHTML = user.photoURL
      ? `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;filter:grayscale(20%)">`
      : `<span style="font-size:11px;color:#fff;font-weight:700">${(user.displayName||user.email||'?')[0].toUpperCase()}</span>`;
    el.style.background = '#1A1C1C'; el.style.borderColor = '#1A1C1C';
  } else {
    el.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="opacity:.5"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/></svg>';
    el.style.background = ''; el.style.borderColor = '';
  }
}

function handleAuthClick() {
  if (currentUser) {
    if (confirm(`${currentUser.displayName || currentUser.email}\n로그아웃할까요?`)) fbAuth.signOut();
  } else {
    fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
      .catch(e => alert('로그인 오류: ' + e.message));
  }
}

  { id:8, type:'routine', title:'P.M. Protocol', emoji:'☽', description:'저녁 보습 루틴. 이중세안 → 에센스 → 나이트크림.', activatedAt:'2026-04-15T22:00:00', baselineImg:null, items:[{name:'클렌징밤',step:'01'},{name:'에센스',step:'03'},{name:'나이트크림',step:'06'}] },
  { id:9, type:'care', title:'Brightening Cycle', emoji:'✦', description:'미백 집중 케어 3주 사이클. 비타민C 세럼 중심 루틴.', activatedAt:'2026-03-30T09:00:00', baselineImg:null, items:[{name:'비타민C 세럼',step:'Vit.C'},{name:'나이아신아마이드',step:'Niacin'},{name:'SPF50+',step:'SPF'}] },
  { id:10, type:'makeup', title:'Date Night Glam', emoji:'◎', description:'저녁 데이트 메이크업. 글로시 스모키 + 레드 립.', activatedAt:'2026-03-22T17:00:00', baselineImg:null, products:[{name:'루미너스 파운데이션',step:'Base'},{name:'스모키 팔레트',step:'Eye'},{name:'레드 립스틱',step:'Lip'}] },
  { id:11, type:'look', title:'Power Suit', emoji:'◈', description:'프레젠테이션 데이 파워 수트. 네이비 블레이저 + 화이트 블라우스.', activatedAt:'2026-03-18T08:00:00', baselineImg:null, items:[{name:'네이비 블레이저',step:'Outer'},{name:'화이트 블라우스',step:'Top'},{name:'슬랙스',step:'Bottom'},{name:'힐',step:'Shoes'}] },
  { id:12, type:'routine', title:'Skin Reset', emoji:'☀', description:'봄맞이 스킨케어 리셋. 각질 제거 + 재정비.', activatedAt:'2026-03-10T09:00:00', baselineImg:null, items:[{name:'AHA 토너',step:'01'},{name:'세럼',step:'03'},{name:'크림',step:'05'}] },
];

// ── Constants ────────────────────────────────────────────────
const TYPE_LABEL = { routine:'루틴케어', care:'집중케어', makeup:'메이크업', look:'룩북' };
const TYPE_ICON  = { routine:'☀', care:'✦', makeup:'◎', look:'◈' };
const MONTHS_PER_LOAD = 2;

let allItems = [];
let filteredItems = [];
let activeFilter = 'all';
let visibleMonths = MONTHS_PER_LOAD;

// ── Data loading ──────────────────────────────────────────────
function loadData() {
  const portfolio = JSON.parse(localStorage.getItem('onstep_planned_portfolio') || '[]');
  const care = JSON.parse(localStorage.getItem('onstep_care_themes') || '[]')
    .map(t => ({...t, type:'care', activatedAt: t.activatedAt || (t.scheduledDates||[])[0] || new Date().toISOString()}));
  const mkpData = JSON.parse(localStorage.getItem('onstep_makeup_themes') || '{"themes":[]}');
  const mkp = (mkpData.themes||[])
    .map(t => ({...t, type:'makeup', activatedAt: t.activatedAt || (t.scheduledDates||[])[0] || new Date().toISOString()}));
  const looks = JSON.parse(localStorage.getItem('onstep_look_themes') || '[]')
    .map(t => ({...t, type:'look', activatedAt: t.activatedAt || (t.scheduledDates||[])[0] || new Date().toISOString()}));

  const portfolioIds = new Set(portfolio.map(p => p.id));
  const extras = [...care, ...mkp, ...looks].filter(t => !portfolioIds.has(t.id));
  const merged = [...portfolio, ...extras];

  allItems = merged.length ? merged : SAMPLE_DATA;
  allItems.sort((a, b) => new Date(b.activatedAt) - new Date(a.activatedAt));
  applyFilter();
}

function applyFilter() {
  filteredItems = activeFilter === 'all'
    ? [...allItems]
    : allItems.filter(i => i.type === activeFilter);
  visibleMonths = MONTHS_PER_LOAD;
  render();
}

function setFilter(type) {
  activeFilter = type;
  document.querySelectorAll('.filter-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.type === type)
  );
  applyFilter();
  updateFilterCounts();
}

function updateFilterCounts() {
  const allEl = document.getElementById('fc-all');
  if (allEl) allEl.textContent = allItems.length;
}

function groupByMonth(items) {
  const groups = {};
  items.forEach(item => {
    const d = new Date(item.activatedAt);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });
  return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
}

function monthLabel(key) {
  const [y, m] = key.split('-');
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return `${months[parseInt(m)-1]} ${y}`;
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('archive-content');
  const lmWrap = document.getElementById('load-more-wrap');

  if (!filteredItems.length) {
    container.innerHTML = `<div class="empty-archive">
      <div class="empty-archive-title">Archive</div>
      <div class="empty-archive-sub">SETUP에서 설계를 완료하면<br>이곳에 기록됩니다</div>
    </div>`;
    lmWrap.style.display = 'none';
    return;
  }

  const groups = groupByMonth(filteredItems);
  const visibleGroups = groups.slice(0, visibleMonths);

  let html = '';
  visibleGroups.forEach(([key, items], idx) => {
    const num = String(groups.length - idx).padStart(2, '0');
    html += renderIssue(key, items, num);
  });
  container.innerHTML = html;

  lmWrap.style.display = groups.length > visibleMonths ? 'block' : 'none';
}

function renderIssue(key, items, num) {
  let html = `<div class="issue-hd">
    <span class="issue-month">${monthLabel(key)}</span>
    <span class="issue-num">Issue ${num}</span>
    <span class="issue-count">${items.length} ITEMS</span>
  </div>`;

  if (items[0]) html += renderCoverCard(items[0]);
  if (items[1]) html += renderFeatureCard(items[1]);

  const briefs = items.slice(2);
  for (let i = 0; i < briefs.length; i += 2) {
    html += `<div class="brief-grid">`;
    html += renderBriefCard(briefs[i]);
    if (briefs[i+1]) html += renderBriefCard(briefs[i+1]);
    else html += `<div class="brief-card"></div>`;
    html += `</div>`;
  }
  return html;
}

function renderCoverCard(item) {
  const imgStyle = item.baselineImg ? `background-image:url(${item.baselineImg})` : `background:var(--surface-mid)`;
  const placeholder = TYPE_ICON[item.type] || '✦';
  const dateStr = new Date(item.activatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
  return `<div class="cover-card" onclick="openDetail(${item.id})">
    <div class="cover-img" style="${imgStyle}">
      ${!item.baselineImg ? `<span style="font-size:40px;opacity:.12">${placeholder}</span>` : ''}
    </div>
    <div class="cover-body">
      <div class="cover-type">${TYPE_LABEL[item.type]||item.type}</div>
      <div class="cover-title">${item.title||item.name||'Untitled'}</div>
      <div class="cover-meta">${dateStr}${item.description ? ` · ${item.description.slice(0,40)}` : ''}</div>
    </div>
  </div>`;
}

function renderFeatureCard(item) {
  const imgStyle = item.baselineImg ? `background-image:url(${item.baselineImg})` : '';
  const placeholder = TYPE_ICON[item.type] || '✦';
  const products = item.products || item.items || [];
  const dateStr = new Date(item.activatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
  const thumbs = products.slice(0,4).map(p => {
    const imgS = p.imgData ? `background-image:url(${p.imgData});background-size:cover` : '';
    return `<div class="feature-thumb" style="${imgS}">${!p.imgData ? (p.step ? p.step[0] : '·') : ''}</div>`;
  }).join('');
  return `<div class="feature-card" onclick="openDetail(${item.id})">
    <div class="feature-img" style="${imgStyle}">
      ${!item.baselineImg ? `<span style="font-size:28px;opacity:.15">${placeholder}</span>` : ''}
    </div>
    <div class="feature-body">
      <div>
        <div class="feature-type">${TYPE_LABEL[item.type]||item.type}</div>
        <div class="feature-title">${item.title||item.name||'Untitled'}</div>
        ${item.description ? `<div class="feature-desc">${item.description}</div>` : ''}
      </div>
      <div>
        ${thumbs ? `<div class="feature-thumbs">${thumbs}</div>` : ''}
        <div class="feature-meta">${dateStr}${products.length ? ` · ${products.length} ITEMS` : ''}</div>
      </div>
    </div>
  </div>`;
}

function renderBriefCard(item) {
  const imgStyle = item.baselineImg ? `background-image:url(${item.baselineImg})` : '';
  const placeholder = TYPE_ICON[item.type] || '✦';
  const dateStr = new Date(item.activatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
  return `<div class="brief-card" onclick="openDetail(${item.id})">
    <div class="brief-img" style="${imgStyle}">
      ${!item.baselineImg ? `<span style="font-size:24px;opacity:.12">${placeholder}</span>` : ''}
    </div>
    <div class="brief-body">
      <div class="brief-type">${TYPE_LABEL[item.type]||item.type}</div>
      <div class="brief-title">${item.title||item.name||'Untitled'}</div>
      <div class="brief-date">${dateStr}</div>
    </div>
  </div>`;
}

function loadMore() {
  visibleMonths += MONTHS_PER_LOAD;
  render();
}

// ── Detail panel ──────────────────────────────────────────────
function openDetail(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  const panel = document.getElementById('detail-panel');
  const products = item.products || item.items || [];
  const dateStr = new Date(item.activatedAt).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});

  const imgStyle = item.baselineImg ? `background-image:url(${item.baselineImg});background-size:cover;font-size:0` : '';
  const prodsHtml = products.length ? `
    <div class="detail-prods-label">ITEMS · ${products.length}</div>
    <div class="detail-prods-grid">${products.slice(0,8).map(p => {
      const imgS = p.imgData ? `background-image:url(${p.imgData});background-size:cover` : '';
      return `<div class="detail-prod-item">
        <div class="detail-prod-img" style="${imgS}">${!p.imgData ? (p.step ? p.step[0] : '·') : ''}</div>
        <div class="detail-prod-name">${p.name||p.step||''}</div>
      </div>`;
    }).join('')}</div>` : '';

  document.getElementById('detail-content-inner').innerHTML = `
    <div class="detail-hero-img" style="${imgStyle}">${!item.baselineImg ? (TYPE_ICON[item.type]||'✦') : ''}</div>
    <div class="detail-content">
      <div class="detail-type">${TYPE_LABEL[item.type]||item.type}</div>
      <div class="detail-title">${item.title||item.name||'Untitled'}</div>
      <div class="detail-date">${dateStr}</div>
      ${item.description ? `<div class="detail-desc">${item.description}</div>` : ''}
      ${prodsHtml}
      <button class="detail-ok-btn" onclick="reactivateItem(${id})">ok → Today에 반영</button>
    </div>`;
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

function reactivateItem(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  const KEY = 'onstep_planned_portfolio';
  const portfolio = JSON.parse(localStorage.getItem(KEY)||'[]');
  portfolio.unshift({...item, id:Date.now(), activatedAt:new Date().toISOString()});
  localStorage.setItem(KEY, JSON.stringify(portfolio));
  closeDetail();
  showToast(`✓ "${item.title||item.name}" — Today에 반영됩니다`);
  loadData();
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Init ──────────────────────────────────────────────────────
loadData();
updateFilterCounts();
</script>
</body>
</html>
