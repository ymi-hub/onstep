<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnStep · Design Preview</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0D0D1A;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
  .logo{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;letter-spacing:8px;margin-bottom:8px;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.5) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo-img{width:96px;height:96px;border-radius:22px;object-fit:cover;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
  .tagline{font-size:11px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-bottom:60px;text-align:center}
  .grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:700px}
  .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px;width:200px;text-decoration:none;color:#fff;transition:all .25s;display:block}
  .card:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);transform:translateY(-4px)}
  .card-icon{font-size:32px;margin-bottom:14px}
  .card-title{font-size:14px;font-weight:600;margin-bottom:6px;letter-spacing:.5px}
  .card-desc{font-size:11px;color:rgba(255,255,255,.4);line-height:1.5}
  .badge{display:inline-block;font-size:9px;padding:3px 8px;border-radius:20px;background:rgba(200,102,110,.2);color:#E94F6B;letter-spacing:1px;margin-top:10px;font-weight:600}
  .footer{margin-top:60px;font-size:11px;color:rgba(255,255,255,.2);letter-spacing:2px}
</style>
</head>
<body>
  <img src="logo.png" alt="OnStep" class="logo-img">
  <div class="logo">ONSTEP</div>
  <div class="tagline">ZERO SETTING · LIFE OS · DESIGN PREVIEW</div>

  <div class="grid">
    <a class="card" href="today.html">
      <div class="card-icon">🌸</div>
      <div class="card-title">Skincare Routine</div>
      <div class="card-desc">아침/저녁 스킨케어 루틴 · 세션 트래커 · Skin Insight</div>
      <div class="badge">SCREEN 1</div>
    </a>

    <a class="card" href="setup.html">
      <div class="card-icon">📋</div>
      <div class="card-title">Care Plan</div>
      <div class="card-desc">케어 플랜 등록 · 제품 20개+ · 수정/삭제 · 루틴 반영</div>
      <div class="badge">SCREEN 2</div>
    </a>

    <a class="card" href="screens.html">
      <div class="card-icon">📱</div>
      <div class="card-title">전체 화면설계</div>
      <div class="card-desc">Flow Guide · 자산관리 · Outfit Planner · ROI 분석 (4테마)</div>
      <div class="badge">ALL SCREENS</div>
    </a>
  </div>

  <div class="footer">github.com/ymi-hub/onstep</div>
</body>
</html>
