<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OnStep · Care Plan</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --navy:#2D3B55; --rose:#C8666E; --rose-lt:#F9EAEA;
    --teal:#4FA8A8; --slate:#8392A5; --smoke:#F5F5F7;
    --white:#fff; --ink:#1A2233; --mist:#C8D0DC; --border:#EAEDF2;
    --green:#4A7C59;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:#E8ECF0;display:flex;justify-content:center;padding:24px 16px 48px;font-family:'DM Sans','Noto Sans KR',sans-serif;min-height:100vh}
  .phone{width:390px;background:var(--smoke);border-radius:48px;box-shadow:0 0 0 1px rgba(255,255,255,.6) inset,0 40px 100px rgba(30,40,60,.25);overflow:hidden}
  .notch{height:44px;background:var(--smoke);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px}
  .notch-bar{width:126px;height:5px;background:var(--ink);border-radius:3px;opacity:.12}
  .scroll{height:844px;overflow-y:auto;scrollbar-width:none}
  .scroll::-webkit-scrollbar{display:none}

  /* 앱바 */
  .appbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px;background:var(--smoke);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
  .back-btn{width:36px;height:36px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border:none;box-shadow:0 2px 8px rgba(30,40,60,.08);text-decoration:none;color:var(--ink)}
  .appbar-title{font-size:13px;font-weight:600;letter-spacing:2.5px;color:var(--ink);display:flex;align-items:center;gap:7px}
  .appbar-logo{width:26px;height:26px;border-radius:6px;object-fit:cover}
  .save-btn{background:var(--rose);border:none;cursor:pointer;font-size:13px;font-weight:600;color:#fff;letter-spacing:1px;padding:8px 16px;border-radius:20px;transition:all .2s}
  .save-btn:hover{background:#b55560}

  /* 프로필 */
  .profile-area{margin:12px 20px 0;border-radius:20px;overflow:hidden;height:160px;background:linear-gradient(145deg,#5BBFBF 0%,#3D9999 50%,#2D7A7A 100%);position:relative;cursor:pointer}
  .profile-face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .profile-face svg{width:140px;height:140px}
  .profile-upload{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.25);gap:8px;transition:opacity .2s}
  .upload-circle{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:20px}
  .upload-label{font-size:11px;color:rgba(255,255,255,.9);letter-spacing:1px;font-weight:500}
  #profile-preview{position:absolute;inset:0;background-size:cover;background-position:center;display:none}

  /* 헤더 */
  .reg-header{padding:16px 20px 0}
  .reg-tag{font-size:9px;letter-spacing:3px;color:var(--rose);font-weight:600;margin-bottom:4px}
  .reg-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--ink);margin-bottom:6px}
  .reg-desc{font-size:12px;color:var(--slate);line-height:1.5}

  /* SESSION / PERIOD */
  .input-row{display:flex;gap:10px;padding:14px 20px 0}
  .input-card{flex:1;background:var(--white);border-radius:14px;padding:14px;box-shadow:0 2px 12px rgba(30,40,60,.05)}
  .input-card-icon{font-size:18px;margin-bottom:6px}
  .input-card-label{font-size:9px;letter-spacing:2px;color:var(--slate);font-weight:600;margin-bottom:4px}
  .input-card-value{font-size:13px;color:var(--mist);border:none;background:none;width:100%;outline:none;font-family:inherit}
  .input-card-value.filled{color:var(--ink);font-weight:500}

  /* 섹션 */
  .care-section{padding:16px 20px 0}
  .care-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .care-section-title{font-size:16px;font-weight:700;color:var(--ink)}
  .care-section-right{display:flex;align-items:center;gap:8px}
  .product-count{font-size:11px;color:var(--slate);background:var(--border);padding:3px 8px;border-radius:10px;font-weight:600}

  /* ── 제품 슬롯 (가로 스크롤, 2줄 그리드) ── */
  .slots-wrapper{position:relative}
  .product-grid{
    display:flex;flex-wrap:wrap;gap:10px;
    max-height:196px;overflow-y:auto;overflow-x:hidden;
    padding:4px 2px 8px;
    scrollbar-width:thin;scrollbar-color:var(--mist) transparent;
  }
  .product-grid::-webkit-scrollbar{width:3px}
  .product-grid::-webkit-scrollbar-thumb{background:var(--mist);border-radius:2px}

  /* 한 줄 = 3개, 2줄 이상이면 스크롤 */
  .slot-add{
    width:88px;height:88px;flex-shrink:0;
    border:2px dashed var(--border);border-radius:16px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:5px;cursor:pointer;transition:all .2s;background:var(--white)
  }
  .slot-add:hover{border-color:var(--rose);background:var(--rose-lt)}
  .slot-add-icon{font-size:20px;color:var(--rose)}
  .slot-add-label{font-size:9px;color:var(--slate);font-weight:500}

  .slot-product{
    width:88px;height:88px;flex-shrink:0;border-radius:16px;
    position:relative;cursor:pointer;background:linear-gradient(145deg,#f0f4ff,#e8edf8);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;border:1.5px solid var(--border);transition:all .2s
  }
  .slot-product:hover{border-color:var(--rose);box-shadow:0 4px 16px rgba(200,102,110,.15)}
  .slot-product.editing{border-color:var(--rose);background:var(--rose-lt)}
  .slot-product-icon{font-size:26px}
  .slot-product-name{font-size:9px;color:var(--slate);font-weight:500;text-align:center;padding:0 4px;line-height:1.3;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slot-product-brand{font-size:8px;color:var(--mist);text-align:center;padding:0 4px}
  .slot-remove{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(200,102,110,.8);color:#fff;border:none;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .2s}
  .slot-product:hover .slot-remove{opacity:1}
  .slot-edit-badge{position:absolute;top:4px;left:4px;width:18px;height:18px;border-radius:50%;background:var(--rose);color:#fff;font-size:9px;display:none;align-items:center;justify-content:center}
  .slot-product.editing .slot-edit-badge{display:flex}

  /* 텍스트에어리어 */
  .care-textarea{width:100%;background:var(--white);border-radius:14px;padding:14px;border:none;outline:none;font-size:13px;color:var(--slate);line-height:1.6;resize:none;font-family:inherit;min-height:72px;box-shadow:0 2px 12px rgba(30,40,60,.05)}
  .care-textarea:focus{box-shadow:0 0 0 2px var(--rose)}
  .care-textarea::placeholder{color:var(--mist)}

  /* Curator Tip */
  .curator-card{margin:16px 20px 24px;background:linear-gradient(135deg,#F9F0F0,#F5EAEA);border-radius:18px;padding:18px;border:1px solid rgba(200,102,110,.1)}
  .curator-label{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:2.5px;color:var(--rose);font-weight:600;margin-bottom:8px}
  .curator-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:8px}
  .curator-textarea{width:100%;background:none;border:none;outline:none;font-size:12px;color:var(--slate);line-height:1.6;resize:none;font-family:inherit;min-height:56px}
  .curator-textarea::placeholder{color:var(--mist)}

  /* 하단 내비 */
  .bottom-nav{background:var(--white);border-top:1px solid var(--border);display:flex;padding:10px 0 20px}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0}
  .nav-icon{font-size:20px}
  .nav-label{font-size:9px;letter-spacing:1px;color:var(--mist);font-weight:500}
  .nav-item.active .nav-label{color:var(--rose)}

  /* ── 제품 추가/수정 모달 ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{width:390px;background:var(--white);border-radius:28px 28px 0 0;padding:24px 24px 32px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .modal-title{font-size:18px;font-weight:700;color:var(--ink)}
  .modal-close{width:32px;height:32px;border-radius:50%;background:var(--smoke);border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

  .form-group{margin-bottom:14px}
  .form-label{font-size:11px;letter-spacing:1px;color:var(--slate);font-weight:500;margin-bottom:6px}
  .form-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
  .form-input:focus{border-color:var(--rose)}

  /* 카테고리 그리드 */
  .category-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .cat-btn{padding:10px 4px;border-radius:12px;border:1.5px solid var(--border);background:var(--white);text-align:center;cursor:pointer;transition:all .2s;font-family:inherit}
  .cat-btn .cat-icon{font-size:20px;display:block;margin-bottom:3px}
  .cat-btn .cat-name{font-size:10px;color:var(--slate);font-weight:500}
  .cat-btn.selected{border-color:var(--rose);background:var(--rose-lt)}
  .cat-btn.selected .cat-name{color:var(--rose)}

  /* 모달 하단 버튼 */
  .modal-btn-row{display:flex;gap:10px;margin-top:16px}
  .modal-del-btn{flex:0 0 auto;padding:13px 18px;background:var(--smoke);color:var(--slate);border:none;border-radius:50px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:none}
  .modal-del-btn.show{display:block}
  .modal-add-btn{flex:1;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:50px;font-size:13px;font-weight:600;letter-spacing:1.5px;cursor:pointer;font-family:inherit;transition:background .2s}
  .modal-add-btn:hover{background:#3D4F6E}

  /* 토스트 */
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;font-weight:600;letter-spacing:1px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* 제품 수 초과 경고 */
  .limit-bar{display:flex;align-items:center;justify-content:space-between;margin:8px 0 0;font-size:11px;color:var(--slate)}
  .limit-bar span{font-weight:600}
  .limit-bar span.warn{color:var(--rose)}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin:4px 0 0;overflow:hidden}
  .progress-fill{height:100%;background:var(--navy);border-radius:2px;transition:width .3s}
  .progress-fill.warn{background:var(--rose)}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"><div class="notch-bar"></div></div>
  <div class="scroll">

    <!-- 앱바 -->
    <div class="appbar">
      <a class="back-btn" href="skincare.html">←</a>
      <div class="appbar-title"><img src="logo.png" alt="OnStep" class="appbar-logo">CARE PLAN</div>
      <button class="save-btn" onclick="savePlan()">저장</button>
    </div>

    <!-- 프로필 -->
    <div class="profile-area" onclick="document.getElementById('profile-input').click()">
      <div class="profile-face">
        <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="66" y="108" width="28" height="30" rx="10" fill="rgba(255,255,255,.25)"/>
          <ellipse cx="80" cy="82" rx="38" ry="44" fill="rgba(255,255,255,.3)"/>
          <ellipse cx="67" cy="76" rx="5" ry="6" fill="rgba(255,255,255,.6)"/>
          <ellipse cx="93" cy="76" rx="5" ry="6" fill="rgba(255,255,255,.6)"/>
          <ellipse cx="67" cy="77" rx="3" ry="3.5" fill="rgba(45,59,85,.5)"/>
          <ellipse cx="93" cy="77" rx="3" ry="3.5" fill="rgba(45,59,85,.5)"/>
          <path d="M60 68 Q67 64 74 67" stroke="rgba(255,255,255,.5)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M86 67 Q93 64 100 68" stroke="rgba(255,255,255,.5)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M80 80 Q77 88 74 90 Q80 92 86 90 Q83 88 80 80Z" fill="rgba(255,255,255,.2)"/>
          <path d="M70 98 Q80 104 90 98" stroke="rgba(255,255,255,.5)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <ellipse cx="80" cy="42" rx="42" ry="22" fill="rgba(45,59,85,.4)"/>
          <path d="M38 55 Q36 80 40 100" stroke="rgba(45,59,85,.3)" stroke-width="8" stroke-linecap="round" fill="none"/>
          <path d="M122 55 Q124 80 120 100" stroke="rgba(45,59,85,.3)" stroke-width="8" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div id="profile-preview"></div>
      <div class="profile-upload" id="upload-overlay">
        <div class="upload-circle">📷</div>
        <div class="upload-label">대표 이미지 등록</div>
      </div>
    </div>
    <input type="file" id="profile-input" accept="image/*" style="display:none" onchange="previewProfile(this)">

    <!-- REGISTRATION -->
    <div class="reg-header">
      <div class="reg-tag">REGISTRATION</div>
      <div class="reg-title">케어 플랜 설정</div>
      <div class="reg-desc">개인화된 일상 큐레이션을 통해 당신만의 아름다운 루틴을 완성하세요.</div>
    </div>

    <!-- SESSION / PERIOD -->
    <div class="input-row">
      <div class="input-card">
        <div class="input-card-icon">📅</div>
        <div class="input-card-label">SESSION</div>
        <input class="input-card-value" id="session-input" type="number" min="1" max="99" placeholder="회차수를 입력" oninput="this.classList.toggle('filled',this.value!='')">
      </div>
      <div class="input-card">
        <div class="input-card-icon">🗓</div>
        <div class="input-card-label">CARE PERIOD</div>
        <input class="input-card-value" id="period-start" type="date" placeholder="시작" oninput="this.classList.toggle('filled',this.value!='')">
        <input class="input-card-value" id="period-end" type="date" style="margin-top:4px;font-size:11px" placeholder="종료" oninput="this.classList.toggle('filled',this.value!='')">
      </div>
    </div>

    <!-- 아침 케어 -->
    <div class="care-section">
      <div class="care-section-header">
        <div class="care-section-title">아침 케어 (Morning)</div>
        <div class="care-section-right">
          <span class="product-count" id="morning-count">0 / 20</span>
          <span style="font-size:18px">☀️</span>
        </div>
      </div>

      <div class="slots-wrapper">
        <div class="product-grid" id="morning-grid">
          <div class="slot-add" onclick="openModal('morning')" id="morning-add-btn">
            <div class="slot-add-icon">＋</div>
            <div class="slot-add-label">제품 추가</div>
          </div>
        </div>
        <div class="limit-bar">
          <span id="morning-limit-text">0개 등록됨</span>
          <span id="morning-warn" style="display:none" class="warn">최대 20개</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="morning-progress" style="width:0%"></div></div>
      </div>
      <textarea class="care-textarea" id="morning-desc" placeholder="아침 케어 설명을 입력하세요" rows="3" style="margin-top:10px"></textarea>
    </div>

    <!-- 저녁 케어 -->
    <div class="care-section" style="margin-top:18px">
      <div class="care-section-header">
        <div class="care-section-title">저녁 케어 (Nightly)</div>
        <div class="care-section-right">
          <span class="product-count" id="nightly-count">0 / 20</span>
          <span style="font-size:18px">🌙</span>
        </div>
      </div>

      <div class="slots-wrapper">
        <div class="product-grid" id="nightly-grid">
          <div class="slot-add" onclick="openModal('nightly')" id="nightly-add-btn">
            <div class="slot-add-icon">＋</div>
            <div class="slot-add-label">제품 추가</div>
          </div>
        </div>
        <div class="limit-bar">
          <span id="nightly-limit-text">0개 등록됨</span>
          <span id="nightly-warn" style="display:none" class="warn">최대 20개</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="nightly-progress" style="width:0%"></div></div>
      </div>
      <textarea class="care-textarea" id="nightly-desc" placeholder="루틴 설명을 입력하세요" rows="3" style="margin-top:10px"></textarea>
    </div>

    <!-- Curator Tip -->
    <div class="curator-card">
      <div class="curator-label">✦ DAILY CURATOR TIP</div>
      <div class="curator-title">오늘의 큐레이터 팁을 등록하세요</div>
      <textarea class="curator-textarea" id="curator-tip" placeholder="전문가의 노하우가 담긴 조언을 입력해 주세요" rows="3"></textarea>
    </div>

    <!-- 하단 내비 -->
    <div class="bottom-nav">
      <div class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">홈</div></div>
      <div class="nav-item"><div class="nav-icon">📋</div><div class="nav-label">기록</div></div>
      <div class="nav-item active"><div class="nav-icon">🌸</div><div class="nav-label">케어</div></div>
      <div class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">프로필</div></div>
    </div>
  </div>
</div>

<!-- ── 제품 추가/수정 모달 ── -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">제품 추가</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-group">
      <div class="form-label">카테고리</div>
      <div class="category-grid">
        <button class="cat-btn selected" data-cat="cleanser" onclick="selectCat(this)"><span class="cat-icon">🧴</span><span class="cat-name">클렌저</span></button>
        <button class="cat-btn" data-cat="toner" onclick="selectCat(this)"><span class="cat-icon">💧</span><span class="cat-name">토너</span></button>
        <button class="cat-btn" data-cat="serum" onclick="selectCat(this)"><span class="cat-icon">🔬</span><span class="cat-name">세럼</span></button>
        <button class="cat-btn" data-cat="essence" onclick="selectCat(this)"><span class="cat-icon">✨</span><span class="cat-name">에센스</span></button>
        <button class="cat-btn" data-cat="cream" onclick="selectCat(this)"><span class="cat-icon">🫙</span><span class="cat-name">크림</span></button>
        <button class="cat-btn" data-cat="sunscreen" onclick="selectCat(this)"><span class="cat-icon">☀️</span><span class="cat-name">선크림</span></button>
        <button class="cat-btn" data-cat="mask" onclick="selectCat(this)"><span class="cat-icon">🎭</span><span class="cat-name">마스크</span></button>
        <button class="cat-btn" data-cat="oil" onclick="selectCat(this)"><span class="cat-icon">💎</span><span class="cat-name">오일</span></button>
        <button class="cat-btn" data-cat="mist" onclick="selectCat(this)"><span class="cat-icon">🌫️</span><span class="cat-name">미스트</span></button>
        <button class="cat-btn" data-cat="exfoliant" onclick="selectCat(this)"><span class="cat-icon">🔅</span><span class="cat-name">각질케어</span></button>
        <button class="cat-btn" data-cat="eyecream" onclick="selectCat(this)"><span class="cat-icon">👁️</span><span class="cat-name">아이크림</span></button>
        <button class="cat-btn" data-cat="etc" onclick="selectCat(this)"><span class="cat-icon">💊</span><span class="cat-name">기타</span></button>
      </div>
    </div>
    <div class="form-group">
      <div class="form-label">제품명 *</div>
      <input class="form-input" id="product-name" type="text" placeholder="예) 자음 세럼">
    </div>
    <div class="form-group">
      <div class="form-label">브랜드</div>
      <input class="form-input" id="product-brand" type="text" placeholder="예) Sulwhasoo">
    </div>
    <div class="modal-btn-row">
      <button class="modal-del-btn" id="modal-del-btn" onclick="deleteProduct()">삭제</button>
      <button class="modal-add-btn" id="modal-confirm-btn" onclick="confirmProduct()">추가하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_KEY = 'onstep_care_plan';
const MAX = 20;

const CAT = {
  cleanser:{icon:'🧴',label:'클렌저'}, toner:{icon:'💧',label:'토너'},
  serum:{icon:'🔬',label:'세럼'},     essence:{icon:'✨',label:'에센스'},
  cream:{icon:'🫙',label:'크림'},      sunscreen:{icon:'☀️',label:'선크림'},
  mask:{icon:'🎭',label:'마스크'},     oil:{icon:'💎',label:'오일'},
  mist:{icon:'🌫️',label:'미스트'},     exfoliant:{icon:'🔅',label:'각질케어'},
  eyecream:{icon:'👁️',label:'아이크림'}, etc:{icon:'💊',label:'기타'},
};

let state = { morning:[], nightly:[] };
let modal = { slot:null, editId:null };
let selectedCat = 'cleanser';

// ── 초기 로드 ────────────────────────────────────
window.addEventListener('load', () => {
  const raw = localStorage.getItem(DB_KEY);
  if (!raw) return;
  const saved = JSON.parse(raw);
  document.getElementById('session-input').value = saved.session || '';
  document.getElementById('period-start').value = saved.periodStart || '';
  document.getElementById('period-end').value = saved.periodEnd || '';
  document.getElementById('morning-desc').value = saved.morningDesc || '';
  document.getElementById('nightly-desc').value = saved.nightlyDesc || '';
  document.getElementById('curator-tip').value = saved.curatorTip || '';
  ['session-input','period-start','period-end'].forEach(id => {
    const el = document.getElementById(id);
    if (el.value) el.classList.add('filled');
  });
  state.morning = saved.morning || [];
  state.nightly = saved.nightly || [];
  renderAll();
});

// ── 렌더 ────────────────────────────────────────
function renderAll() {
  renderGrid('morning');
  renderGrid('nightly');
}

function renderGrid(slot) {
  const grid = document.getElementById(`${slot}-grid`);
  const addBtn = document.getElementById(`${slot}-add-btn`);
  // 기존 제품 슬롯 제거
  grid.querySelectorAll('.slot-product').forEach(el => el.remove());

  state[slot].forEach(p => {
    const div = document.createElement('div');
    div.className = 'slot-product';
    div.dataset.id = p.id;
    div.innerHTML = `
      <div class="slot-product-icon">${p.icon}</div>
      <div class="slot-product-name">${p.name}</div>
      ${p.brand ? `<div class="slot-product-brand">${p.brand}</div>` : ''}
      <button class="slot-remove" onclick="event.stopPropagation();deleteById('${slot}',${p.id})">✕</button>
      <div class="slot-edit-badge">✎</div>
    `;
    div.onclick = () => openModal(slot, p.id);
    grid.insertBefore(div, addBtn);
  });

  // MAX 도달 시 추가버튼 숨김
  const count = state[slot].length;
  addBtn.style.display = count >= MAX ? 'none' : 'flex';

  // 카운트 / 프로그레스바
  document.getElementById(`${slot}-count`).textContent = `${count} / ${MAX}`;
  document.getElementById(`${slot}-limit-text`).textContent = `${count}개 등록됨`;
  const pct = count / MAX * 100;
  const fill = document.getElementById(`${slot}-progress`);
  fill.style.width = pct + '%';
  fill.classList.toggle('warn', count >= MAX * 0.8);
  document.getElementById(`${slot}-warn`).style.display = count >= MAX ? 'inline' : 'none';
}

// ── 모달 ────────────────────────────────────────
function openModal(slot, editId = null) {
  modal.slot = slot;
  modal.editId = editId;

  if (editId !== null) {
    // 수정 모드
    const p = state[slot].find(x => x.id === editId);
    document.getElementById('modal-title').textContent = '제품 수정';
    document.getElementById('modal-confirm-btn').textContent = '수정 완료';
    document.getElementById('modal-del-btn').classList.add('show');
    document.getElementById('product-name').value = p.name;
    document.getElementById('product-brand').value = p.brand || '';
    selectCatByKey(p.category);
    // 편집 중인 슬롯 하이라이트
    document.querySelectorAll('.slot-product').forEach(el => el.classList.remove('editing'));
    document.querySelector(`.slot-product[data-id="${editId}"]`)?.classList.add('editing');
  } else {
    document.getElementById('modal-title').textContent = '제품 추가';
    document.getElementById('modal-confirm-btn').textContent = '추가하기';
    document.getElementById('modal-del-btn').classList.remove('show');
    document.getElementById('product-name').value = '';
    document.getElementById('product-brand').value = '';
    selectCatByKey('cleanser');
  }
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('product-name').focus(), 350);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.querySelectorAll('.slot-product').forEach(el => el.classList.remove('editing'));
  modal.editId = null;
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCat = btn.dataset.cat;
}
function selectCatByKey(key) {
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.cat === key);
  });
  selectedCat = key;
}

// ── 제품 추가/수정 확인 ──────────────────────────
function confirmProduct() {
  const name = document.getElementById('product-name').value.trim();
  if (!name) { showToast('제품명을 입력해주세요'); return; }
  const brand = document.getElementById('product-brand').value.trim();
  const meta = CAT[selectedCat];

  if (modal.editId !== null) {
    // 수정
    const idx = state[modal.slot].findIndex(p => p.id === modal.editId);
    if (idx !== -1) {
      state[modal.slot][idx] = { ...state[modal.slot][idx], name, brand, category: selectedCat, icon: meta.icon };
    }
    showToast(`✓ ${name} 수정됨`);
  } else {
    // 추가
    if (state[modal.slot].length >= MAX) { showToast(`최대 ${MAX}개까지 등록 가능합니다`); return; }
    state[modal.slot].push({ id: Date.now(), category: selectedCat, name, brand, icon: meta.icon });
    showToast(`${meta.icon} ${name} 추가됨`);
  }
  renderGrid(modal.slot);
  closeModal();
}

// ── 삭제 ────────────────────────────────────────
function deleteProduct() {
  if (modal.editId === null) return;
  state[modal.slot] = state[modal.slot].filter(p => p.id !== modal.editId);
  renderGrid(modal.slot);
  showToast('제품이 삭제되었습니다');
  closeModal();
}
function deleteById(slot, id) {
  state[slot] = state[slot].filter(p => p.id !== id);
  renderGrid(slot);
}

// ── 저장 ────────────────────────────────────────
function savePlan() {
  const plan = {
    session: document.getElementById('session-input').value,
    periodStart: document.getElementById('period-start').value,
    periodEnd: document.getElementById('period-end').value,
    morningDesc: document.getElementById('morning-desc').value,
    nightlyDesc: document.getElementById('nightly-desc').value,
    curatorTip: document.getElementById('curator-tip').value,
    morning: state.morning,
    nightly: state.nightly,
    savedAt: new Date().toISOString(),
  };
  localStorage.setItem(DB_KEY, JSON.stringify(plan));
  showToast('✓ 케어 플랜이 저장되었습니다');
  setTimeout(() => { window.location.href = 'skincare.html'; }, 1500);
}

// ── 프로필 ──────────────────────────────────────
function previewProfile(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const p = document.getElementById('profile-preview');
    p.style.backgroundImage = `url(${e.target.result})`;
    p.style.display = 'block';
    document.getElementById('upload-overlay').style.opacity = '0';
  };
  reader.readAsDataURL(input.files[0]);
}

// ── 토스트 ──────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Enter → 추가
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    confirmProduct();
  }
});
</script>
</body>
</html>
