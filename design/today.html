    .sort((a,b) => (a.name||'').localeCompare(b.name||'', 'ko'));
  const list = document.getElementById('motd-pick-list');
  if (!list) return;
  if (!themes.length) {
    list.innerHTML = `<div style="padding:32px 0;text-align:center;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;color:#9CA3AF">등록된 메이크업 테마가 없습니다<br><a href="setup.html" style="color:var(--ink);font-weight:600;margin-top:8px;display:inline-block">Setup에서 추가 →</a></div>`;
  } else {
    list.innerHTML = themes.map(t => {
      const img = (t.baselineImg||t.storageUrl) ? `background-image:url(${t.baselineImg||t.storageUrl});background-size:auto 100%;background-position:center;background-repeat:no-repeat` : 'background:#F3F4F6';
      return `<div onclick="selectMOTDTheme(${t.id})" style="display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid #F3F4F6;cursor:pointer">
        <div style="width:48px;height:48px;border-radius:10px;flex-shrink:0;${img};display:flex;align-items:center;justify-content:center;font-size:22px">${!(t.baselineImg||t.storageUrl)?(t.emoji||'✦'):''}</div>
        <div style="flex:1;min-width:0">
          <div style="font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:#1A1C1C">${t.name}</div>
          <div style="font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;color:#9CA3AF;margin-top:2px">${(t.products||[]).length}개 제품</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C5C6CA" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>`;
    }).join('');
  }
  document.getElementById('motd-pick-sheet')?.classList.add('open');
}
function closeMOTDPicker() {
  document.getElementById('motd-pick-sheet')?.classList.remove('open');
}
function selectMOTDTheme(themeId) {
  const today  = getTodayKey();
  const themes = JSON.parse(localStorage.getItem('onstep_makeup_contents') || '[]');
  const idx    = themes.findIndex(t => t.id === themeId);
  if (idx === -1) return;
  if (!(themes[idx].scheduledDates||[]).includes(today)) {
    themes[idx].scheduledDates = [...(themes[idx].scheduledDates||[]), today];
  }
  localStorage.setItem('onstep_makeup_contents', JSON.stringify(themes));
  localStorage.setItem('_onstep_extra_local_ts', Date.now().toString());
  if (typeof _broadcastState === 'function') _broadcastState('extra');
  // Firestore 동기화
  if (typeof fbDb !== 'undefined' && currentUser) {
    const _si=items=>items.map(t=>({...t,baselineImg:null}));
    const care      = JSON.parse(localStorage.getItem('onstep_care_themes')       || '[]');
    const looks     = JSON.parse(localStorage.getItem('onstep_look_contents')     || '[]');
    const portfolio = JSON.parse(localStorage.getItem('onstep_planned_portfolio') || '[]');
    fbDb.collection('users').doc(currentUser.uid).collection('extra').doc('data')
      .set({ careThemes: _si(care), makeupContents: _si(themes), lookContents: _si(looks), portfolio, savedAt: new Date().toISOString() }, { merge: true })
      .catch(e => console.warn('MOTD sync:', e));
  }
  closeMOTDPicker();
  renderTodayMakeup();
}

function toggleMotdDone(name) {
  const today  = getTodayKey();
  const doneKey = `onstep_motd_done_${today}`;
  const doneList = JSON.parse(localStorage.getItem(doneKey) || '[]');
  const idx = doneList.indexOf(name);
  if (idx === -1) doneList.push(name);
  else doneList.splice(idx, 1);
  localStorage.setItem(doneKey, JSON.stringify(doneList));
  renderTodayMakeup();
}

// ── OOTD ─────────────────────────────────────────────────────
function getTodaysScheduledLook() {
  const items = JSON.parse(localStorage.getItem('onstep_look_contents') || '[]');
  const today = getTodayKey();
  const matches = items.filter(t => (t.scheduledDates||[]).includes(today));
  if (!matches.length) return null;
  return matches.reduce((best, t) => {
    const tTs = t.updatedAt ? new Date(t.updatedAt).getTime() : (t.id || 0);
    const bTs = best.updatedAt ? new Date(best.updatedAt).getTime() : (best.id || 0);
    return tTs > bTs ? t : best;
  });
}

// ── Smart Guide (자동 노출) ─────────────────────────────────
const _SMART_DISMISS = 'onstep_smart_dismissed';

function _getSmartDismissed() {
  const today = getTodayKey();
  return (JSON.parse(sessionStorage.getItem(_SMART_DISMISS) || '{}')[today]) || [];
}
function _addSmartDismiss(museId) {
  const today = getTodayKey();
  const raw = JSON.parse(sessionStorage.getItem(_SMART_DISMISS) || '{}');
  if (!raw[today]) raw[today] = [];
  if (!raw[today].includes(museId)) raw[today].push(museId);
  sessionStorage.setItem(_SMART_DISMISS, JSON.stringify(raw));
}

function _getBestAutoMuse(type) {
  const key = type === 'MOTD' ? 'onstep_makeup_contents' : 'onstep_look_contents';
  const items = JSON.parse(localStorage.getItem(key) || '[]');
  const todayDow = new Date().getDay();
  const dismissed = _getSmartDismissed();
  const candidates = items.filter(m => m.autoEnabled && !dismissed.includes(m.id));
  if (!candidates.length) return null;
  return candidates.map(m => {
    const log = m.scheduleLog || [];
    const score = log.filter(e => new Date(e.date + 'T00:00:00').getDay() === todayDow).length;
    return { m, score };
  }).sort((a, b) => b.score - a.score)[0].m;
}

function renderSmartGuide() {
  _renderSmartGuideFor('MOTD', 'smart-guide-motd');
  _renderSmartGuideFor('OOTD', 'smart-guide-ootd');
}

function _getBestAutoLook() {
  const looks = JSON.parse(localStorage.getItem('onstep_looks') || '[]');
  const todayDow = new Date().getDay();
  const dismissed = _getSmartDismissed();
  const candidates = looks.filter(l =>
    l.autoEnabled && !dismissed.includes('look_' + l.date)
  );
  if (!candidates.length) return null;
  return candidates.map(l => {
    const log = l.scheduleLog || [];
    const score = log.filter(e => new Date(e.date + 'T00:00:00').getDay() === todayDow).length;
    return { l, score };
  }).sort((a, b) => b.score - a.score)[0].l;
}

function _renderSmartGuideFor(type, elId) {
  const el = document.getElementById(elId);
  if (!el) return;
  const hasToday = type === 'MOTD' ? !!getTodaysScheduledTheme(null) : !!getTodaysScheduledLook();
  if (hasToday) { el.innerHTML = ''; return; }
  const todayDow = new Date().getDay();
  const dowNames = ['일','월','화','수','목','금','토'];
  const muse = _getBestAutoMuse(type);
  const sectionId = type === 'MOTD' ? 'motd-editorial-section' : 'ootd-editorial-section';
  const parentSection = document.getElementById(sectionId);
  if (muse) {
    const log = muse.scheduleLog || [];
    const dowCount = log.filter(e => new Date(e.date + 'T00:00:00').getDay() === todayDow).length;
    const patternTxt = dowCount >= 2 ? `${dowNames[todayDow]}요일 패턴 ${dowCount}회` : `총 ${log.length}회 등록 패턴`;
    const name = (muse.note || '').slice(0, 28) || '(제목 없음)';
    el.innerHTML = `<div class="smart-guide-card">
      <div class="smart-guide-eyebrow">⚡ SMART ${type}</div>
      <div class="smart-guide-name">${name}</div>
      <div class="smart-guide-meta">${patternTxt} · ${type === 'MOTD' ? '메이크업 가이드' : '룩 가이드'}</div>
      <div class="smart-guide-btns">
        <button type="button" class="smart-guide-apply" onclick="applySmartGuide(${muse.id},'${type}','${elId}')">오늘 가이드로 적용</button>
        <button type="button" class="smart-guide-skip" onclick="skipSmartGuide(${muse.id},'${elId}')">건너뛰기</button>
      </div>
    </div>`;
    if (parentSection) parentSection.style.display = '';
    return;
  }
  if (type === 'OOTD') {
    const look = _getBestAutoLook();
    if (look) {
      const log = look.scheduleLog || [];
      const dowCount = log.filter(e => new Date(e.date + 'T00:00:00').getDay() === todayDow).length;
      const patternTxt = dowCount >= 2 ? `${dowNames[todayDow]}요일 패턴 ${dowCount}회` : `총 ${log.length}회 예약 패턴`;
      const name = (look.note || look.date || '').slice(0, 28) || '(제목 없음)';
      el.innerHTML = `<div class="smart-guide-card">
        <div class="smart-guide-eyebrow">⚡ SMART OOTD</div>
        <div class="smart-guide-name">${name}</div>
        <div class="smart-guide-meta">${patternTxt} · 룩 히스토리 기반</div>
        <div class="smart-guide-btns">
          <button type="button" class="smart-guide-apply" onclick="applySmartLook('${look.date}','${elId}')">오늘 가이드로 적용</button>
          <button type="button" class="smart-guide-skip" onclick="skipSmartLook('${look.date}','${elId}')">건너뛰기</button>
        </div>
      </div>`;
      if (parentSection) parentSection.style.display = '';
      return;
    }
  }
  el.innerHTML = '';
}

function applySmartGuide(contentId, type, elId) {
  const key = type === 'MOTD' ? 'onstep_makeup_contents' : 'onstep_look_contents';
  const items = JSON.parse(localStorage.getItem(key) || '[]');
  const idx = items.findIndex(m => m.id === contentId);
  if (idx === -1) return;
  const today = getTodayKey();
  if (!items[idx].scheduleLog) items[idx].scheduleLog = [];
  if (!items[idx].scheduleLog.find(e => e.date === today)) items[idx].scheduleLog.push({ date: today, type });
  if (!items[idx].scheduledDates) items[idx].scheduledDates = [];
  if (!items[idx].scheduledDates.includes(today)) items[idx].scheduledDates.push(today);
  items[idx].updatedAt = new Date().toISOString();
  try { localStorage.setItem(key, JSON.stringify(items)); } catch(e) { showToast('저장 공간 부족'); return; }
  // Firestore 동기화
  localStorage.setItem('_onstep_extra_local_ts', Date.now().toString());
  if (typeof _broadcastState === 'function') _broadcastState('extra');
  if (currentUser) {
    const _si=items=>items.map(t=>({...t,baselineImg:null}));
    const care      = JSON.parse(localStorage.getItem('onstep_care_themes')       || '[]');
    const makeup    = JSON.parse(localStorage.getItem('onstep_makeup_contents')   || '[]');
    const looks     = JSON.parse(localStorage.getItem('onstep_look_contents')     || '[]');
    const portfolio = JSON.parse(localStorage.getItem('onstep_planned_portfolio') || '[]');
    fbDb.collection('users').doc(currentUser.uid).collection('extra').doc('data')
      .set({ careThemes: _si(care), makeupContents: _si(makeup), lookContents: _si(looks), portfolio,
             savedAt: new Date().toISOString() }, { merge: true })
      .catch(e => console.warn('SmartGuide sync:', e));
  }
  _addSmartDismiss(contentId);
  document.getElementById(elId).innerHTML = '';
  type === 'MOTD' ? renderTodayMakeup() : renderTodayOOTD();
  showToast(`⚡ ${type} 가이드로 적용됐습니다`);
}

function skipSmartGuide(museId, elId) {
  _addSmartDismiss(museId);
  const el = document.getElementById(elId);
  if (el) el.innerHTML = '';
}

function applySmartLook(histId, elId) {
  const looks = JSON.parse(localStorage.getItem('onstep_looks') || '[]');
  const look = looks.find(l => l.date === histId);
  if (!look) return;
  const today = getTodayKey();
  if (!look.scheduleLog) look.scheduleLog = [];
  if (!look.scheduleLog.find(e => e.date === today)) look.scheduleLog.push({ date: today });
  // onstep_look_contents(현행 키)에서 테마 일정 등록
  if (look.lookThemeId) {
    const lc = JSON.parse(localStorage.getItem('onstep_look_contents') || '[]');
    const li = lc.findIndex(t => t.id === look.lookThemeId);
    if (li !== -1) {
      if (!lc[li].scheduledDates) lc[li].scheduledDates = [];
      if (!lc[li].scheduledDates.includes(today)) lc[li].scheduledDates.push(today);
      lc[li].updatedAt = new Date().toISOString();
      localStorage.setItem('onstep_look_contents', JSON.stringify(lc));
    }
  }
  const todayIdx = looks.findIndex(l => l.date === today);
  if (todayIdx === -1) {
    looks.push({ date: today, mainPhoto: look.mainPhoto || null, note: look.note, logged: false, lookThemeId: look.lookThemeId || null });
  }
  localStorage.setItem('onstep_looks', JSON.stringify(looks));
  // Firestore 동기화
  localStorage.setItem('_onstep_extra_local_ts', Date.now().toString());
  if (typeof _broadcastState === 'function') { _broadcastState('extra'); _broadcastState('looks'); }
  if (currentUser) {
    const _si=items=>items.map(t=>({...t,baselineImg:null}));
    const care      = JSON.parse(localStorage.getItem('onstep_care_themes')       || '[]');
    const makeup    = JSON.parse(localStorage.getItem('onstep_makeup_contents')   || '[]');
    const looksCont = JSON.parse(localStorage.getItem('onstep_look_contents')     || '[]');
    const portfolio = JSON.parse(localStorage.getItem('onstep_planned_portfolio') || '[]');
    const looksLog  = JSON.parse(localStorage.getItem(LOOKS_KEY) || '[]');
    fbDb.collection('users').doc(currentUser.uid).collection('extra').doc('data')
      .set({ careThemes: _si(care), makeupContents: _si(makeup), lookContents: _si(looksCont), portfolio,
             looks: looksLog.map(l => ({...l, mainPhoto: null})),
             savedAt: new Date().toISOString() }, { merge: true })
      .catch(e => console.warn('SmartLook sync:', e));
  }
  _addSmartDismiss('look_' + histId);
  const el = document.getElementById(elId);
  if (el) el.innerHTML = '';
  renderTodayOOTD();
  showToast('⚡ 룩 히스토리가 오늘 OOTD로 적용됐습니다');
}

function skipSmartLook(histId, elId) {
  _addSmartDismiss('look_' + histId);
  const el = document.getElementById(elId);
  if (el) el.innerHTML = '';
}

function renderTodayOOTD() {
  const block = document.getElementById('ootd-editorial-block');
  if (!block) return;
  const ootdSection = document.getElementById('ootd-editorial-section');
  const lookTheme = getTodaysScheduledLook();
  if (!lookTheme) {
    block.innerHTML = '';
    const todayLooks = JSON.parse(localStorage.getItem(LOOKS_KEY)||'[]');
    const todayLook  = todayLooks.find(l=>l.date===getTodayKey())||null;
    const logWrap    = document.getElementById('ootd-log-wrap');
    const smartGuide = document.getElementById('smart-guide-ootd');
    const hasSmartGuide = smartGuide && smartGuide.innerHTML.trim() !== '';
    const allLooks = JSON.parse(localStorage.getItem('onstep_look_contents') || '[]');
    if (ootdSection) ootdSection.style.display = '';
    if (todayLook?.logged) {
      renderOOTDLogCard();
    } else if (!hasSmartGuide) {
      if (logWrap) logWrap.innerHTML = '';
      block.innerHTML = allLooks.length
        ? `<div class="editorial-empty">오늘 예약된 룩 테마가 없어요<br><a href="log.html?tab=lookbook" style="color:var(--ink);font-weight:600;text-decoration:none;margin-top:4px;display:inline-block">테마 일정 추가 →</a></div>`
        : `<div class="editorial-empty">등록된 룩 테마가 없어요<br><a href="log.html?tab=lookbook" style="color:var(--ink);font-weight:600;text-decoration:none;margin-top:4px;display:inline-block">테마 추가 →</a></div>`;
    }
    return;
  }
  if (ootdSection) ootdSection.style.display = '';
  const heroImg = lookTheme.baselineImg || lookTheme.storageUrl || '';
  const items = (lookTheme.products || lookTheme.items || []).filter(p => p.type !== 'plus' && p.type !== 'desc');
  const thumbs = items.map(p => {
    const img = p.imgData || getBoxImgForProduct(p) || '';
    return `<div class="ootd-thumb-item"${img?` style="background-image:url(${img})"`:''}>
      ${!img?`<span style="font-size:22px;opacity:.25">👗</span>`:''}
    </div>`;
  }).join('');
  block.innerHTML = `
    <div class="ootd-main-photo"${heroImg?` style="background-image:url(${heroImg})"`:''} onclick="openOOTDRecord()">
      ${!heroImg?`<span style="font-size:48px;opacity:.18">👗</span>`:''}
      <div class="ootd-main-overlay">
        <div class="ootd-main-badge">TODAY'S LOOK</div>
        <div class="ootd-main-name">${lookTheme.name||''}</div>
      </div>
      <a class="editorial-gear" href="log.html?tab=lookbook&id=${lookTheme.id}" onclick="event.stopPropagation()">⚙</a>
    </div>
    ${thumbs?`<div class="ootd-thumb-row">${thumbs}</div>`:''}`;
  renderOOTDLogCard();
}

function renderOOTDLogCard() {
  const wrap = document.getElementById('ootd-log-wrap');
  if (!wrap) return;
  const looks = JSON.parse(localStorage.getItem(LOOKS_KEY)||'[]');
  const look  = looks.find(l=>l.date===getTodayKey())||null;
  if (look?.logged) {
    const thumb = (look.mainPhoto||look.storageUrl)
      ? `style="background-image:url(${look.mainPhoto||look.storageUrl});background-size:auto 100%;background-position:center;background-repeat:no-repeat"`
      : '';
    wrap.innerHTML = `<div class="record-logged-card" onclick="openOOTDRecord()">
      <div class="record-logged-thumb" ${thumb}>${!(look.mainPhoto||look.storageUrl)?'📷':''}</div>
      <div class="record-logged-info">
        <span class="record-logged-badge">Logged ✓ &nbsp;</span><span class="record-logged-name">${look.note||'오늘의 룩'}</span>
      </div>
      <button type="button" class="record-logged-del" onclick="event.stopPropagation();deleteOOTDRecord()" title="삭제">✕</button>
    </div>`;
  } else {
    wrap.innerHTML = `<div class="record-look-row" onclick="openOOTDRecord()">
      <div class="record-look-icon">📷</div>
      <div class="record-look-text">Record your final look</div>
      <div class="record-look-plus">+</div>
    </div>`;
  }
}

let _ootdRecSelectedThemeId = null;

function _selectOOTDRecTheme(id) {
  _ootdRecSelectedThemeId = id;
  document.querySelectorAll('#ootd-rec-theme-list .ootd-rec-theme-row').forEach(row => {
    row.classList.toggle('sel', Number(row.dataset.tid) === id);
  });
}

function openOOTDRecord() {
  const looks = JSON.parse(localStorage.getItem(LOOKS_KEY)||'[]');
  const look  = looks.find(l=>l.date===getTodayKey())||null;

  // theme selector
  const themes = JSON.parse(localStorage.getItem('onstep_look_contents')||'[]');
  const schedTheme = getTodaysScheduledLook();
  _ootdRecSelectedThemeId = look?.lookThemeId ?? (schedTheme?.id ?? (themes[0]?.id ?? null));
  const themeList = document.getElementById('ootd-rec-theme-list');
  if (themeList) {
    if (!themes.length) {
      themeList.innerHTML = `<div class="ootd-rec-theme-empty">등록된 룩 테마가 없습니다<br><a href="log.html?tab=lookbook" style="color:var(--ink);font-weight:700">라이브러리에서 추가 →</a></div>`;
    } else {
      themeList.innerHTML = themes.map(t => {
        const isSel = t.id === _ootdRecSelectedThemeId;
        const thumbStyle = (t.baselineImg||t.storageUrl) ? `background-image:url(${t.baselineImg||t.storageUrl})` : '';
        const icon = !(t.baselineImg||t.storageUrl) ? (t.emoji||'✦') : '';
        return `<div class="ootd-rec-theme-row${isSel?' sel':''}" data-tid="${t.id}" onclick="_selectOOTDRecTheme(${t.id})">
          <div class="ootd-rec-theme-thumb" style="${thumbStyle}">${icon}</div>
          <div class="ootd-rec-theme-name">${t.name||'Untitled'}</div>
          <div class="ootd-rec-theme-chk">✓</div>
        </div>`;
      }).join('');
    }
  }

  // photo
  const area  = document.getElementById('ootd-rec-photo-area');
  const ph    = document.getElementById('ootd-rec-photo-placeholder');
  if (area && (look?.mainPhoto||look?.storageUrl)) {
    area.style.backgroundImage = `url(${look.mainPhoto||look.storageUrl})`;
    if (ph) ph.style.display = 'none';
  } else if (area) {
    area.style.backgroundImage = '';
    if (ph) ph.style.display = 'flex';
  }
  if (area) area._pendingPhoto = null;

  const note = document.getElementById('ootd-rec-note');
  if (note) note.value = look?.note || '';

  const delBtn = document.getElementById('ootd-rec-del-btn');
  if (delBtn) delBtn.style.display = look?.logged ? '' : 'none';

  document.getElementById('ootd-rec-sheet')?.classList.add('open');
}

function closeOOTDRecord() {
  document.getElementById('ootd-rec-sheet')?.classList.remove('open');
}

function deleteOOTDRecord() {
  if (!confirm('오늘의 룩 기록을 삭제할까요?')) return;
  const looks = JSON.parse(localStorage.getItem(LOOKS_KEY)||'[]');
  const today = getTodayKey();
  const filtered = looks.filter(l => l.date !== today);
  localStorage.setItem(LOOKS_KEY, JSON.stringify(filtered));
  saveLogsToCloud();
  closeOOTDRecord();
  renderTodayOOTD();
  showToast('기록이 삭제됐습니다');
}

function _applyOOTDRecPhoto(compressed) {
  const area = document.getElementById('ootd-rec-photo-area');
  const ph   = document.getElementById('ootd-rec-photo-placeholder');
  if (area) { area.style.backgroundImage = `url(${compressed})`; area._pendingPhoto = compressed; }
  if (ph) ph.style.display = 'none';
}
function handleOOTDRecPhoto(input) {
  const file = input.files[0]; if (!file) return;
  _compressFile(file, 480, 0.68, _applyOOTDRecPhoto);
}

function saveOOTDRecord() {
  const area  = document.getElementById('ootd-rec-photo-area');
  const customNote = document.getElementById('ootd-rec-note')?.value.trim() || '';
  const photo = area?._pendingPhoto || null;
  const looks = JSON.parse(localStorage.getItem(LOOKS_KEY)||'[]');
  const today = getTodayKey();
  let look = looks.find(l=>l.date===today);
  if (!look) { look={date:today,mainPhoto:null,note:'',logged:false}; looks.push(look); }
  if (photo) look.mainPhoto = photo;
  if (_ootdRecSelectedThemeId != null) look.lookThemeId = _ootdRecSelectedThemeId;
  if (customNote) {
    look.note = customNote;
  } else if (_ootdRecSelectedThemeId != null) {
    const themes = JSON.parse(localStorage.getItem('onstep_look_contents')||'[]');
    const t = themes.find(x => x.id === _ootdRecSelectedThemeId);
    look.note = t?.name || '';
  }
  look.logged = true;
  look.loggedAt = new Date().toISOString();
  const plan = JSON.parse(localStorage.getItem(DB_KEY)||'null');
  if (plan) {
    const period = getTimePeriod();
    const slot   = period==='am'?'morning':'nightly';
    const curDay = calcCurrentDay(plan.periodStart);
    const doneKey  = `onstep_flow_done_${today}_${slot}`;
    const doneList = JSON.parse(localStorage.getItem(doneKey)||'[]');
    look.flowMeta = {
      sessionN: plan.session||1, sessionDay: curDay,
      dayInCycle: Math.floor((new Date()-new Date(plan.periodStart))/86400000)%2+1,
      step: getActiveCycleRoutine(plan[slot],plan), slot,
      products: doneList
    };
  }
  localStorage.setItem(LOOKS_KEY, JSON.stringify(looks));
  saveLogsToCloud();
  if (area) area._pendingPhoto = null;
  closeOOTDRecord();
  renderTodayOOTD();
}

function pickOOTDPhoto() {
  showImgPickSheet(compressed => {
    const looks = JSON.parse(localStorage.getItem(LOOKS_KEY)||'[]');
    const today = getTodayKey();
    let look = looks.find(l=>l.date===today);
    if (!look) { look={date:today,mainPhoto:null,note:'',logged:false}; looks.push(look); }
    look.mainPhoto = compressed;
    localStorage.setItem(LOOKS_KEY, JSON.stringify(looks));
    saveLogsToCloud();
    renderTodayOOTD();
  }, 480, 0.68);
}

function logTodayOOTD() {
  openOOTDRecord();
}

// ── MOTD Record ───────────────────────────────────────────────
async function saveMakeupLogsToCloud() {
  if (!currentUser) return;
  try {
    const nowTs = Date.now();
    localStorage.setItem('_onstep_extra_local_ts', nowTs.toString());
    const logs = JSON.parse(localStorage.getItem(MAKEUP_LOGS_KEY)||'[]');
    await fbDb.collection('users').doc(currentUser.uid).collection('extra').doc('data')
      .set({ makeupLogs: logs.map(l=>({...l,mainPhoto:null})), savedAt: new Date(nowTs).toISOString() }, { merge: true });
    if (typeof _broadcastState === 'function') _broadcastState('makeupLogs');
  } catch(e) { console.warn('Makeup logs cloud save:', e); }
}

function renderMOTDLogCard() {
  const wrap = document.getElementById('motd-log-wrap');
  if (!wrap) return;
  const logs = JSON.parse(localStorage.getItem(MAKEUP_LOGS_KEY)||'[]');
  const log  = logs.find(l=>l.date===getTodayKey())||null;
  if (log?.logged) {
    const thumb = (log.mainPhoto||log.storageUrl)
      ? `style="background-image:url(${log.mainPhoto||log.storageUrl});background-size:auto 100%;background-position:center;background-repeat:no-repeat"` : '';
    wrap.innerHTML = `<div class="record-logged-card" onclick="openMOTDRecord()">
      <div class="record-logged-thumb" ${thumb}>${!(log.mainPhoto||log.storageUrl)?'💄':''}</div>
      <div class="record-logged-info">
        <span class="record-logged-badge">Logged ✓ &nbsp;</span><span class="record-logged-name">${log.note||'오늘의 메이크업'}</span>
      </div>
      <button type="button" class="record-logged-del" onclick="event.stopPropagation();deleteMOTDRecord()" title="삭제">✕</button>
    </div>`;
  } else {
    wrap.innerHTML = `<div class="record-look-row" onclick="openMOTDRecord()">
      <div class="record-look-icon">💄</div>
      <div class="record-look-text">Record your final makeup</div>
      <div class="record-look-plus">+</div>
    </div>`;
  }
}

let _motdRecSelectedThemeId = null;

function _selectMOTDRecTheme(id) {
  _motdRecSelectedThemeId = id;
  document.querySelectorAll('#motd-rec-theme-list .ootd-rec-theme-row').forEach(row => {
    row.classList.toggle('sel', Number(row.dataset.tid) === id);
  });
}

function openMOTDRecord() {
  const logs = JSON.parse(localStorage.getItem(MAKEUP_LOGS_KEY)||'[]');
  const log  = logs.find(l=>l.date===getTodayKey())||null;
  const themes = JSON.parse(localStorage.getItem('onstep_makeup_contents')||'[]');
  const plan = JSON.parse(localStorage.getItem(DB_KEY)||'null');
  const schedTheme = getTodaysScheduledTheme(plan);
  _motdRecSelectedThemeId = log?.makeupThemeId ?? (schedTheme?.id ?? (themes[0]?.id ?? null));
  const themeList = document.getElementById('motd-rec-theme-list');
  if (themeList) {
    if (!themes.length) {
      themeList.innerHTML = `<div class="ootd-rec-theme-empty">등록된 메이크업 테마가 없습니다<br><a href="log.html?tab=makeup" style="color:var(--ink);font-weight:700">라이브러리에서 추가 →</a></div>`;
    } else {
      themeList.innerHTML = themes.map(t => {
        const isSel = t.id === _motdRecSelectedThemeId;
        const thumbStyle = (t.baselineImg||t.storageUrl) ? `background-image:url(${t.baselineImg||t.storageUrl})` : '';
        const icon = !(t.baselineImg||t.storageUrl) ? (t.emoji||'✦') : '';
        return `<div class="ootd-rec-theme-row${isSel?' sel':''}" data-tid="${t.id}" onclick="_selectMOTDRecTheme(${t.id})">
          <div class="ootd-rec-theme-thumb" style="${thumbStyle}">${icon}</div>
          <div class="ootd-rec-theme-name">${t.name||'Untitled'}</div>
          <div class="ootd-rec-theme-chk">✓</div>
        </div>`;
      }).join('');
    }
  }
  const area = document.getElementById('motd-rec-photo-area');
  const ph   = document.getElementById('motd-rec-photo-placeholder');
  if (area && (log?.mainPhoto||log?.storageUrl)) {
    area.style.backgroundImage = `url(${log.mainPhoto||log.storageUrl})`;
    if (ph) ph.style.display = 'none';
  } else if (area) {
    area.style.backgroundImage = '';
    if (ph) ph.style.display = 'flex';
  }
  if (area) area._pendingPhoto = null;
  const note = document.getElementById('motd-rec-note');
  if (note) note.value = log?.note || '';
  const delBtn = document.getElementById('motd-rec-del-btn');
  if (delBtn) delBtn.style.display = log?.logged ? '' : 'none';
  document.getElementById('motd-rec-sheet')?.classList.add('open');
}

function closeMOTDRecord() {
  document.getElementById('motd-rec-sheet')?.classList.remove('open');
}

function deleteMOTDRecord() {
  if (!confirm('오늘의 메이크업 기록을 삭제할까요?')) return;
  const logs = JSON.parse(localStorage.getItem(MAKEUP_LOGS_KEY)||'[]');
  localStorage.setItem(MAKEUP_LOGS_KEY, JSON.stringify(logs.filter(l=>l.date!==getTodayKey())));
  saveMakeupLogsToCloud();
  closeMOTDRecord();
  renderTodayMakeup();
  showToast('기록이 삭제됐습니다');
}

function _applyMOTDRecPhoto(compressed) {
  const area = document.getElementById('motd-rec-photo-area');
  const ph   = document.getElementById('motd-rec-photo-placeholder');
  if (area) { area.style.backgroundImage = `url(${compressed})`; area._pendingPhoto = compressed; }
  if (ph) ph.style.display = 'none';
}

function handleMOTDRecPhoto(input) {
  const file = input.files[0]; if (!file) return;
  _compressFile(file, 480, 0.68, _applyMOTDRecPhoto);
}

function saveMOTDRecord() {
  const area = document.getElementById('motd-rec-photo-area');
  const customNote = document.getElementById('motd-rec-note')?.value.trim() || '';
  const photo = area?._pendingPhoto || null;
  const logs = JSON.parse(localStorage.getItem(MAKEUP_LOGS_KEY)||'[]');
  const today = getTodayKey();
  let log = logs.find(l=>l.date===today);
  if (!log) { log={date:today,mainPhoto:null,note:'',logged:false}; logs.push(log); }
  if (photo) log.mainPhoto = photo;
  if (_motdRecSelectedThemeId != null) log.makeupThemeId = _motdRecSelectedThemeId;
  if (customNote) {
    log.note = customNote;
  } else if (_motdRecSelectedThemeId != null) {
    const themes = JSON.parse(localStorage.getItem('onstep_makeup_contents')||'[]');
    const t = themes.find(x=>x.id===_motdRecSelectedThemeId);
    log.note = t?.name || '';
  }
  log.logged = true;
  log.loggedAt = new Date().toISOString();
  localStorage.setItem(MAKEUP_LOGS_KEY, JSON.stringify(logs));
  saveMakeupLogsToCloud();
  if (area) area._pendingPhoto = null;
  closeMOTDRecord();
  renderTodayMakeup();
}

// ── Weather ───────────────────────────────────────────────────
const WEATHER_API_KEY  = ''; // OpenWeatherMap API 키 (https://openweathermap.org/api)
const WEATHER_CITY     = 'Seoul';
const WEATHER_CACHE_MS = 30 * 60 * 1000;

function getWeatherInfo(code) {
  const c = code || 0;
  // wttr.in 코드
  if (c === 113) return {emoji:'☀️', desc:'맑음'};
  if (c === 116) return {emoji:'🌤️', desc:'구름 조금'};
  if (c === 119) return {emoji:'☁️', desc:'구름 많음'};
  if (c === 122) return {emoji:'☁️', desc:'흐림'};
  if (c === 143 || c === 248 || c === 260) return {emoji:'🌫️', desc:'안개'};
  if (c === 176) return {emoji:'🌦️', desc:'빗방울'};
  if (c === 179 || c === 182 || c === 185) return {emoji:'🌨️', desc:'진눈깨비'};
  if (c === 200) return {emoji:'⛈️', desc:'뇌우'};
  if (c === 227 || c === 230) return {emoji:'❄️', desc:'눈보라'};
  if (c >= 263 && c <= 266) return {emoji:'🌦️', desc:'이슬비'};
  if (c >= 281 && c <= 284) return {emoji:'🌧️', desc:'어는 비'};
  if (c >= 293 && c <= 314) return {emoji:'🌧️', desc:'비'};
  if (c >= 317 && c <= 320) return {emoji:'🌧️', desc:'진눈깨비'};
  if (c >= 323 && c <= 338) return {emoji:'❄️', desc:'눈'};
  if (c === 350 || c === 374 || c === 377) return {emoji:'❄️', desc:'싸라기눈'};
  if (c >= 353 && c <= 359) return {emoji:'🌧️', desc:'소나기'};
  if (c >= 362 && c <= 365) return {emoji:'🌧️', desc:'진눈깨비'};
  if (c >= 368 && c <= 371) return {emoji:'❄️', desc:'눈 소나기'};
  if (c === 386 || c === 389) return {emoji:'⛈️', desc:'뇌우'};
  if (c === 392 || c === 395) return {emoji:'⛈️', desc:'뇌우·눈'};
  // OpenWeatherMap 코드
  if (c >= 200 && c < 300) return {emoji:'⛈️', desc:'뇌우'};
  if (c >= 300 && c < 400) return {emoji:'🌧️', desc:'이슬비'};
  if (c >= 500 && c < 600) return {emoji:'🌧️', desc:'비'};
  if (c >= 600 && c < 700) return {emoji:'❄️', desc:'눈'};
  if (c >= 700 && c < 800) return {emoji:'🌫️', desc:'안개'};
  if (c === 800) return {emoji:'☀️', desc:'맑음'};
  if (c === 801) return {emoji:'🌤️', desc:'구름 조금'};
  if (c >= 802) return {emoji:'☁️', desc:'흐림'};
  return {emoji:'🌿', desc:'맑음'};
}

async function _getCoords() {
  if (!navigator.geolocation) return null;
  try {
    return await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000, maximumAge: 300000 }));
  } catch(e) { return null; }
}

async function _getLocationName(lat, lon) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=14&accept-language=ko`,
      { headers: { 'User-Agent': 'OnStep-App/1.0' } }
    );
    if (!r.ok) throw new Error();
    const d = await r.json();
    const a = d.address || {};
    // 동(suburb/quarter) 우선 → 구(borough) → 시
    const district = a.suburb || a.quarter || a.borough || a.city_district || a.county || '';
    const city = (a.city || a.town || a.village || a.state || '')
      .replace(/(특별시|광역시|특별자치시|특별자치도)$/, '').trim();
    if (district && city && district !== city) return `${district} · ${city}`;
    return district || city || '';
  } catch(e) { return ''; }
}

async function initWeather() {
  let cached;
  try { const d = JSON.parse(localStorage.getItem('onstep_weather_v4')||''); if (Date.now() - d.ts < WEATHER_CACHE_MS) cached = d; } catch(e) {}
  if (cached) { renderWeather(cached); return; }

  const pos = await _getCoords();
  const lat  = pos?.coords.latitude  ?? null;
  const lon  = pos?.coords.longitude ?? null;

  // 위치명: geolocation 성공 시 Nominatim 역지오코딩
  let location = '';
  if (lat && lon) location = await _getLocationName(lat, lon);

  if (!WEATHER_API_KEY) {
    const query = (lat && lon) ? `${lat},${lon}` : WEATHER_CITY;
    try {
      const res = await fetch(`https://wttr.in/${query}?format=j1`);
      if (!res.ok) throw new Error();
      const d = await res.json();
      const cur = d.current_condition[0];
      if (!location) {
        const area = d.nearest_area?.[0];
        location = [area?.areaName?.[0]?.value, area?.region?.[0]?.value].filter(Boolean).join(' · ');
      }
      const w = { ts: Date.now(), temp: Math.round(cur.temp_C), feels: Math.round(cur.FeelsLikeC),
        humidity: cur.humidity, desc: cur.lang_ko?.[0]?.value || cur.weatherDesc[0]?.value || '맑음',
        code: parseInt(cur.weatherCode), location };
      localStorage.setItem('onstep_weather_v4', JSON.stringify(w));
      renderWeather(w);
    } catch(e) { renderWeatherFallback(); }
    return;
  }

  try {
    const query = (lat && lon) ? `lat=${lat}&lon=${lon}` : `q=${WEATHER_CITY}`;
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?${query}&appid=${WEATHER_API_KEY}&units=metric&lang=kr`);
    if (!res.ok) throw new Error();
    const d = await res.json();
    if (!location) location = d.name || '';
    const w = { ts: Date.now(), temp: Math.round(d.main.temp), feels: Math.round(d.main.feels_like),
      humidity: d.main.humidity, desc: d.weather[0]?.description || '맑음',
      code: d.weather[0]?.id || 800, location };
    localStorage.setItem('onstep_weather_v4', JSON.stringify(w));
    renderWeather(w);
  } catch(e) { renderWeatherFallback(); }
}

function renderWeather(w) {
  const mascot = document.getElementById('weather-mascot');
  const mainEl = document.getElementById('weather-main-text');
  const locWrap = document.getElementById('weather-location');
  const locText = document.getElementById('weather-location-text');
  const info = getWeatherInfo(w.code);
  if (mascot) mascot.textContent = info.emoji;
  if (mainEl) mainEl.textContent = `${info.desc}  ${w.temp}° · 습도 ${w.humidity}%`;
  if (locText && w.location) { locText.textContent = w.location; locWrap.style.display = 'flex'; }
  const ootdEl = document.getElementById('ootd-weather');
  if (ootdEl) ootdEl.textContent = `${info.emoji} ${w.temp}° · 습도 ${w.humidity}%`;
}

function renderWeatherFallback() {
  const mascot = document.getElementById('weather-mascot');
  const mainEl = document.getElementById('weather-main-text');
  if (mascot) mascot.textContent = '🌿';
  if (mainEl) mainEl.textContent = `--° · 습도 --%`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Load plan ─────────────────────────────────────────────────
function loadPlan(plan) {
  if (!plan) { renderFlowSession(plan); renderFlowHeroStep(plan); return; }
  const today = getTodayKey();
  // state.session 기간이 오늘을 포함하면 그대로 사용
  const mainActive = isSessionActive(plan);
  if (mainActive.active) {
    renderFlowSession(plan);
    renderFlowHeroStep(plan);
    return;
  }
  // state.session 비활성 → history에서 오늘 포함하는 세션 탐색
  const histActive = (plan.history || []).find(h => {
    if (!h.periodStart) return false;
    return today >= h.periodStart && today <= (h.periodEnd || h.periodStart);
  });
  if (histActive) {
    const effectivePlan = { ...plan, ...histActive };
    renderFlowSession(effectivePlan);
    renderFlowHeroStep(effectivePlan);
  } else {
    renderFlowSession(plan);
    renderFlowHeroStep(plan);
  }
}

window.addEventListener('load', () => {
  initSampleData();
  const plan = JSON.parse(localStorage.getItem(DB_KEY)||'null');
  loadPlan(plan);
  renderCareToday();
