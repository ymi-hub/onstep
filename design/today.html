<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>OnStep · Today</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OnStep">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFFFFF">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Gaegu:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F9F9FF; --surface:#F8FAFC; --surface-low:#F1F5F9;
  --surface-mid:#E2E8F0; --surface-high:#CBD5E1; --surface-inv:#18181B;
  --ink:#18181B; --sub:#5B5F5E; --mist:#94A3B8;
  --lime:#C6F432; --lime-dark:#A8DB00; --lime-fg:#18181B; --lime-border:#506600;
  --border:#F1F5F9; --border-md:rgba(24,24,27,.15);
  --shadow:0px 1px 2px rgba(0,0,0,.05);
  --gutter:16px; --margin:16px;
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-full:9999px;
  --green:#2d6a4f; --amber:#b45309; --error:#ba1a1a;
  --xs:4px; --sm:8px; --md:16px; --lg:24px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#DDDDE8;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px 16px 48px;font-family:'Plus Jakarta Sans','Inter',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.phone{width:390px;background:var(--bg);border-radius:48px;box-shadow:0 0 0 1px rgba(255,255,255,.6) inset,0 40px 100px rgba(0,0,0,.22);overflow:hidden;position:relative}
.notch{height:44px;background:var(--bg);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px}
.notch-bar{width:126px;height:5px;background:var(--ink);border-radius:3px;opacity:.1}
.scroll{height:844px;overflow-y:auto;scrollbar-width:none;background:var(--bg)}
.scroll::-webkit-scrollbar{display:none}

/* Appbar */
.appbar{padding:0 16px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(249,249,255,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(241,245,249,1)}
.appbar-menu{width:22px;display:flex;flex-direction:column;gap:5px;cursor:pointer}
.appbar-menu span{height:1.5px;background:var(--ink);border-radius:2px}
.appbar-menu span:nth-child(2){width:68%}
.appbar-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:15px;font-weight:700;letter-spacing:.01em;color:var(--ink);display:flex;align-items:center;gap:8px}
.appbar-logo{width:24px;height:24px;border-radius:var(--r-sm);object-fit:cover;filter:grayscale(100%)}
#auth-avatar{width:32px;height:32px;border-radius:9999px;background:var(--surface-mid);border:1.5px solid var(--border-md);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Page title */
.page-title-wrap{padding:24px 16px 4px}
.page-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:50px;font-weight:800;color:var(--ink);line-height:.9;letter-spacing:-.06em}
.page-title::after{display:none}

/* ── Weather Row ── */
.weather-row{display:flex;align-items:center;gap:10px;padding:14px 16px 8px}
.mascot-card{width:96px;height:96px;background:var(--lime);border-radius:20px;border:2px solid var(--lime-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:44px;line-height:1}
.weather-card{flex:1;height:89px;background:#FFFFFF;border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow);padding:12px 14px;display:flex;flex-direction:column;justify-content:center;gap:4px;position:relative;overflow:hidden}
.weather-label{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mist)}
.weather-main-text{font-family:'Gaegu','Inter',sans-serif;font-size:22px;color:var(--ink);line-height:1.25}
.weather-arrow{position:absolute;right:10px;bottom:10px;width:24px;height:24px;opacity:.15;font-size:18px;display:flex;align-items:center;justify-content:center}

/* ── Session Hero ── */
.session-hero{padding:12px 16px 4px}
.session-hero-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:18px;font-weight:800;color:var(--ink);letter-spacing:.02em;text-transform:uppercase;line-height:1.2}
.session-hero-date{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--mist);margin-top:3px;margin-bottom:10px}
.session-hero-dots{display:flex;gap:5px;align-items:center}
.session-sdot{width:10px;height:10px;border-radius:var(--r-full);background:var(--surface-mid);flex-shrink:0}
.session-sdot.filled{background:var(--lime)}
.session-sdot.today{width:20px;border-radius:var(--r-full);background:var(--lime)}

/* Hash section header */
.hash-row{display:flex;align-items:baseline;justify-content:space-between;padding:16px 16px 8px}
.hash-label{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--ink)}
.hash-sub{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mist)}
.hash-edit{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mist);text-decoration:none;padding-bottom:3px}
.hash-edit:hover{color:var(--ink)}

/* Flow session block */
.flow-session{padding:0 16px 0}
.flow-session-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);margin-bottom:2px}
.flow-session-period{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--mist);margin-bottom:12px}

/* Session progress card — 이미지 기준 제거 (session-hero로 대체) */
.flow-progress-card{display:none}
.flow-progress-row{display:flex;align-items:center;justify-content:space-between}
.flow-progress-label{font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink)}
.flow-progress-day{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;color:var(--mist)}
.flow-dots{display:flex;align-items:center;justify-content:space-between}
.flow-dot{width:10px;height:10px;border-radius:var(--r-full);background:var(--surface-mid);border:none;flex-shrink:0;transition:all .3s;position:relative}
.flow-dot.filled{background:var(--lime)}
.flow-dot.today{width:20px;height:10px;background:var(--lime);border-radius:var(--r-full);box-shadow:0 0 0 2px rgba(198,244,50,.35)}

/* Flow step section */
.flow-step-card{margin:0 16px;background:#FFFFFF;border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--r-xl);overflow:hidden}
.flow-step-hd{display:none} /* 이미지 기준: 헤더 없음, 이미지가 먼저 */

/* Horizontal product carousel — peek 효과 */
.flow-prod-strip{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:16px 32px 0 16px}
.flow-prod-strip::-webkit-scrollbar{display:none}
.flow-prod-item{flex-shrink:0;width:calc(100% - 32px);scroll-snap-align:start;cursor:pointer;-webkit-tap-highlight-color:transparent;margin-right:10px}
.flow-prod-img{width:100%;aspect-ratio:3/4;background:var(--surface-mid);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border-radius:16px}
.flow-prod-emoji{font-size:72px;opacity:.3;pointer-events:none}
.flow-prod-check{position:absolute;inset:0;background:rgba(12,16,20,.75);display:flex;align-items:center;justify-content:center;color:#fff;font-size:56px;opacity:0;transition:opacity .2s;pointer-events:none;border-radius:16px}
.flow-prod-item.done .flow-prod-check{opacity:1}
/* 모닝/나이트 구분 아이콘 — 이미지 좌상단 */
.flow-slot-badge{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;font-size:14px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:2;pointer-events:none}
.flow-slot-badge.morning{background:rgba(255,255,255,.85);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.flow-slot-badge.night{background:rgba(24,24,27,.7);box-shadow:0 1px 4px rgba(0,0,0,.18)}
.flow-prod-info{padding:10px 0 0}
.flow-prod-name{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--ink);line-height:1.2}
.flow-prod-brand{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mist);margin-top:3px}
/* scroll dots */
.flow-prod-dots{display:flex;justify-content:center;gap:6px;padding:10px 0 4px}
.flow-prod-dot{width:6px;height:6px;border-radius:var(--r-full);background:var(--surface-high);transition:background .2s,width .2s;flex-shrink:0}
.flow-prod-dot.active{background:var(--lime);width:16px;border-radius:var(--r-full)}

/* Step info row — 이미지 기준: 도트 아래에 Step1 + 카운트 */
.flow-step-info{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 4px}
.flow-step-label{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:6px}
.flow-step-label-icon{width:16px;height:16px;border-radius:var(--r-full);border:1.5px solid var(--ink);display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--ink)}
.flow-step-count{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--mist)}

.flow-step-body{padding:4px 16px 20px;display:flex;flex-direction:column;gap:12px}
.flow-step-tag{display:none}
.flow-expert-tip{background:#F7FDE8;border-left:3px solid var(--lime);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:12px 14px;display:flex;flex-direction:column;gap:4px}
.flow-tip-header{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);display:flex;align-items:center;gap:6px}
.flow-tip-text{font-family:'Inter',sans-serif;font-size:13px;color:var(--sub);line-height:1.6}
.flow-edit-link{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--mist);text-decoration:none;align-self:flex-start}
.flow-edit-link:hover{color:var(--ink)}

/* CTA button */
.flow-cta-wrap{padding:14px 16px 0}
.flow-cta-btn{width:100%;background:var(--ink);color:#ffffff;border:none;padding:20px 0;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:15px;font-weight:700;letter-spacing:.02em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:background .28s,transform .15s;border-radius:var(--r-lg)}
.flow-cta-btn:active{transform:scale(.98)}
.flow-cta-btn.done{background:var(--lime);color:var(--ink)}
.flow-cta-arrow{font-size:15px;color:#fff}
@keyframes btn-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.flow-cta-btn.shake{animation:btn-shake .35s ease}

/* Routine Tracker section */
.allday-section{padding:28px 16px 0;display:flex;flex-direction:column;gap:8px}
.allday-section-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.allday-hd-left{display:flex;flex-direction:column;gap:2px}
.allday-top-label{font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mist)}
.allday-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;color:var(--ink)}
.allday-top-edit{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--mist);text-decoration:none;padding-top:2px}
.allday-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#FFFFFF;border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;transition:opacity .2s;box-shadow:var(--shadow)}
.allday-item.done{opacity:.5}
.allday-item-left{display:flex;align-items:center;gap:12px}
.allday-dot{width:22px;height:22px;border-radius:var(--r-full);border:2px solid var(--border-md);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative}
.allday-dot-inner{width:10px;height:10px;background:var(--lime);border-radius:var(--r-full);opacity:0;transition:opacity .2s}
.allday-item.done .allday-dot{border-color:var(--lime);background:var(--lime)}
.allday-item.done .allday-dot-inner{opacity:1;background:#0A0A0A}
.allday-item-name{font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--ink)}
.allday-item.done .allday-item-name{color:var(--mist)}
.allday-item-meta{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--mist)}
.allday-empty{padding:16px 0;font-family:'Inter',sans-serif;font-size:13px;color:var(--mist)}
.allday-item-right{display:flex;align-items:center;gap:6px}
.allday-item-time{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--mist);letter-spacing:.04em}
.allday-alarm-icon{font-size:13px;opacity:.4;line-height:1}
.allday-alarm-icon.ringing{opacity:1;animation:alarmring .4s ease infinite alternate}
@keyframes alarmring{0%{transform:rotate(-12deg)}100%{transform:rotate(12deg)}}

/* Legacy allday-card (unused, kept for compat) */
.allday-card{display:none}

/* MOTD section */
.motd-section{padding:28px 16px 0;display:flex;flex-direction:column;gap:16px}
.motd-section-hd{display:flex;align-items:center;justify-content:space-between}
.motd-section-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;color:var(--ink)}
.motd-section-link{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--mist);text-decoration:none}
/* Left text + right image strip */
.motd-body{position:relative;height:186px;overflow:hidden}
.motd-text-col{position:absolute;left:0;top:0;bottom:0;width:218px;display:flex;flex-direction:column;justify-content:flex-start;padding-right:62px;gap:8px}
.motd-theme-name{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1}
.motd-theme-desc{font-family:'Inter',sans-serif;font-size:14px;color:#44474a;line-height:1.5}
.motd-img-strip{position:absolute;left:235px;top:0;bottom:0;display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding-right:4px}
.motd-img-strip::-webkit-scrollbar{display:none}
.motd-img-card{flex-shrink:0;width:140px;height:186px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:8px;cursor:pointer;transition:opacity .2s;box-shadow:var(--shadow)}
.motd-img-card.checked{opacity:.45}
.motd-img-photo{width:100%;height:168px;background:var(--surface-mid);background-size:cover;background-position:center;border-radius:var(--r-md)}
/* Bottom chip row */
.motd-chips-row{display:flex;gap:16px;overflow-x:auto;scrollbar-width:none;padding:8px 0}
.motd-chips-row::-webkit-scrollbar{display:none}
.motd-chip-card{flex-shrink:0;width:140px;height:192px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:8px;cursor:pointer;display:flex;flex-direction:column;gap:0;transition:opacity .2s;box-shadow:var(--shadow)}
.motd-chip-card.checked{opacity:.45}
.motd-chip-img{width:100%;height:122px;background:var(--surface-mid);background-size:cover;background-position:center;border-radius:var(--r-md)}
.motd-chip-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--ink);padding:8px 0 0;line-height:1.25}
.motd-chip-note{font-family:'Inter',sans-serif;font-size:12px;color:var(--mist);line-height:1.5}

/* MOTD new theme header */
.motd-theme-hd-row{display:flex;align-items:flex-start;gap:12px;padding:0 0 14px}
.motd-theme-emoji-lg{font-size:28px;line-height:1;flex-shrink:0;padding-top:2px}
.motd-theme-name-lg{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;color:var(--ink);line-height:1.1;margin-bottom:4px}
.motd-theme-desc-sm{font-family:'Inter',sans-serif;font-size:11px;color:var(--mist);line-height:1.5}

/* OOTD section */
.ootd-section{padding:0 16px}
.ootd-section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ootd-section-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;color:var(--ink)}
.ootd-section-link{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--mist);text-decoration:none}
.ootd-photo-card{border-radius:var(--r-xl);overflow:hidden;cursor:pointer;position:relative;height:256px;background:var(--surface-mid);background-size:cover;background-position:center}
.ootd-photo-img{width:100%;height:100%;background:var(--surface-mid);background-size:cover;background-position:center;position:relative;display:flex;align-items:center;justify-content:center}
.ootd-placeholder-icon{font-size:40px;opacity:.3}
.ootd-check-btn{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:0;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;cursor:pointer;z-index:2;transition:background .2s}
.ootd-check-btn.logged{background:rgba(0,0,0,.6)}
.ootd-overlay{position:absolute;bottom:0;left:0;right:0;padding:60px 16px 16px;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 50%,transparent 100%);pointer-events:none}
.ootd-weather{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;color:rgba(255,255,255,.8);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.ootd-caption-text{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;line-height:1.25}

/* OOTD Log card */
.ootd-log-section{padding:16px 16px 20px}
.ootd-log-card{background:var(--surface);border:2px dashed var(--border-md);border-radius:var(--r-lg);padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:background .2s}
.ootd-log-card:active{background:var(--surface-low)}
.ootd-log-icon{width:33px;height:30px;opacity:.25;display:flex;align-items:center;justify-content:center;font-size:24px}
.ootd-log-text{font-family:'Inter',sans-serif;font-size:14px;color:var(--mist)}

/* OOTD Record Sheet */
.ootd-rec-sheet{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
.ootd-rec-sheet.open{opacity:1;pointer-events:auto}
.ootd-rec-inner{background:#fff;border-radius:24px 24px 0 0;width:100%;padding:24px 20px 36px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.ootd-rec-sheet.open .ootd-rec-inner{transform:translateY(0)}
.ootd-rec-handle{width:32px;height:4px;background:var(--border-md);border-radius:var(--r-full);margin:0 auto 20px}
.ootd-rec-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;color:#0C1014;margin-bottom:16px}
.ootd-rec-photo-area{width:100%;height:180px;background:var(--surface-low);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:16px;overflow:hidden;background-size:cover;background-position:center;position:relative}
.ootd-rec-photo-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.ootd-rec-photo-icon{font-size:32px;opacity:.35}
.ootd-rec-photo-hint{font-family:'Inter',sans-serif;font-size:12px;color:var(--mist)}

.ootd-rec-note::placeholder{color:#bbb}
.ootd-rec-save{width:100%;height:52px;background:#0A0A0A;color:#fff;border:none;border-radius:var(--r-md);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.02em}

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBdKnyU8t0XrQsT_EhKS2nk9zOKwjxoquk",
  authDomain:"onstep-lifeos.firebaseapp.com",
  projectId:"onstep-lifeos",
  storageBucket:"onstep-lifeos.firebasestorage.app",
  messagingSenderId:"333501649998",
  appId:"1:333501649998:web:4eebd8b84a32ea8a581f1f"
});
const fbAuth = firebase.auth();
const fbDb   = firebase.firestore();
let currentUser = null, unsubscribe = null;

firebase.auth().onAuthStateChanged(user => {
  currentUser = user;
  updateAuthAvatar(user);
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  if (user) {
    loadExtraFromCloud(user.uid);
    unsubscribe = fbDb.collection('users').doc(user.uid)
      .collection('careplan').doc('data')
      .onSnapshot(snap => {
        if (!snap.exists) return;
        const data = snap.data();
        // 로컬 데이터가 더 최신이면 덮어쓰지 않음 (save 직후 navigate 케이스 대비)
        const local = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
        const localTs = local.savedAt ? new Date(local.savedAt).getTime() : 0;
        const cloudTs = data.savedAt ? new Date(data.savedAt).getTime() : 0;
        if (cloudTs >= localTs) {
          localStorage.setItem(DB_KEY, JSON.stringify(data));
          loadPlan(data);
        }
      }, e => console.warn(e));
  }
});

function updateAuthAvatar(user) {
  const el = document.getElementById('auth-avatar');
  if (!el) return;
  if (user) {
    el.innerHTML = user.photoURL
      ? `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover">`
      : `<span style="font-size:11px;color:#fff;font-weight:700">${(user.displayName||user.email||'?')[0].toUpperCase()}</span>`;
    el.style.background = '#1A1C1C'; el.style.borderColor = '#1A1C1C';
  } else {
    el.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="opacity:.5"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/></svg>';
    el.style.background = ''; el.style.borderColor = '';
  }
}

function handleAuthClick() {
  if (currentUser) {
    if (confirm(`${currentUser.displayName||currentUser.email}\n로그아웃할까요?`)) fbAuth.signOut();
  } else {
    fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert(e.message));
  }
}

const DB_KEY    = 'onstep_care_plan';
const LOOKS_KEY = 'onstep_looks';
const MAKEUP_KEY= 'onstep_makeup';

async function saveLogsToCloud() {
  if (!currentUser) return;
  try {
    const looks = JSON.parse(localStorage.getItem(LOOKS_KEY)||'[]');
    await fbDb.collection('users').doc(currentUser.uid).collection('extra').doc('data')
      .set({ looks, savedAt: new Date().toISOString() }, { merge: true });
  } catch(e) { console.warn('Looks cloud save:', e); }
}
async function loadExtraFromCloud(uid) {
  try {
    const snap = await fbDb.collection('users').doc(uid).collection('extra').doc('data').get();
    if (!snap.exists) return;
    const d = snap.data();
    if (d.looks) { localStorage.setItem(LOOKS_KEY, JSON.stringify(d.looks)); renderTodayOOTD(); }
  } catch(e) { console.warn('Extra cloud load:', e); }
}

// ── BOX 연동 헬퍼 ──────────────────────────────────────────────
function getBoxAssets() { return JSON.parse(localStorage.getItem('onstep_box_assets') || '[]'); }

function getBoxImgForProduct(p) {
  const assets = getBoxAssets();
  if (p.assetId) {
    const a = assets.find(a => a.id === p.assetId);
    if (a?.imgData) return a.imgData;
  }
  const a = assets.find(a => a.domain === 'beauty' && (
    a.name?.toLowerCase() === p.name?.toLowerCase() ||
    (p.brand && a.brand?.toLowerCase() === p.brand?.toLowerCase() && a.name?.toLowerCase() === p.name?.toLowerCase())
  ));
  return a?.imgData || p.imgData || null;
}

function recordBoxUsage(products) {
  const today  = getTodayKey();
  const assets = getBoxAssets();
  let changed  = false;
  products.forEach(p => {
    if (!p.assetId) return;
    const idx = assets.findIndex(a => a.id === p.assetId);
    if (idx === -1) return;
    if (!assets[idx].useCount) assets[idx].useCount = 0;
    assets[idx].useCount++;
    assets[idx].lastUsed = today;
    changed = true;

function getTimePeriod() {
  const h = new Date().getHours();
  if (h>=5&&h<12) return 'am';
  if (h>=12&&h<17) return 'pm';
  if (h>=17&&h<21) return 'eve';
  return 'night';
}

function calcCurrentDay(s)  { return s ? Math.max(1,Math.floor((new Date()-new Date(s))/86400000)+1) : 1; }
function calcTotalDays(s,e) { return (s&&e) ? Math.floor((new Date(e)-new Date(s))/86400000)+1 : 10; }
function getSuffix(n)       { const a=['th','st','nd','rd'],v=n%100; return a[(v-20)%10]||a[v]||a[0]; }

function getActiveCycleRoutine(slotData, plan) {
  if (!slotData?.routines) return 1;
  const r2 = slotData.routines.find(r=>r.id===2);
  if (!r2?.products?.length) return 1;
  if (!plan?.periodStart) return 1;
  const diff = Math.floor((new Date() - new Date(plan.periodStart)) / 86400000);
  return diff % 2 === 0 ? 1 : 2;
}

// ── Session header ───────────────────────────────────────────
function renderFlowSession(plan) {
  const period = getTimePeriod();
  const slotLbl = document.getElementById('flow-slot-label');
  if (slotLbl) slotLbl.textContent = period==='am'?'MORNING RITUAL':'NIGHT RITUAL';

  if (!plan) { buildHeroDots(1,10); return; }
  const n   = Number(plan.session||1);
  const cur = calcCurrentDay(plan.periodStart);
  const total = calcTotalDays(plan.periodStart, plan.periodEnd);

  // Session hero title: "12TH SESSION"
  const titleEl = document.getElementById('session-hero-title');
  if (titleEl) titleEl.textContent = `${n}${getSuffix(n).toUpperCase()} SESSION`;

  // Session hero date: "2026.4.10-4.20"
  const dateEl = document.getElementById('session-hero-date');
  if (dateEl && plan.periodStart) {
    const fmt = d => d.replace(/-0?/g, '.').replace(/^\./, '');
    dateEl.textContent = `${fmt(plan.periodStart)} – ${fmt(plan.periodEnd||'')}`;
  }

  // Session dots
  buildHeroDots(cur, total);
}

function buildHeroDots(cur, total) {
  const row = document.getElementById('session-hero-dots');
  if (!row) return;
  const n = Math.min(total, 14);
  row.innerHTML = Array.from({length:n},(_,i) => {
    const d = i+1;
    const cls = d < cur ? 'session-sdot filled' : d === cur ? 'session-sdot today' : 'session-sdot';
    return `<div class="${cls}"></div>`;
  }).join('');

  // keep legacy compat elements updated
  const legacyDots = document.getElementById('flow-dots');
  if (legacyDots) {
    legacyDots.innerHTML = Array.from({length:n},(_,i)=>{
      const d=i+1; const c=d<cur?'flow-dot filled':d===cur?'flow-dot today':'flow-dot';
      return `<div class="${c}"></div>`;
    }).join('');
  }
}

// ── Flow hero step ────────────────────────────────────────────
function renderFlowHeroStep(plan) {
  const period   = getTimePeriod();
  const slot     = (period==='am') ? 'morning' : 'nightly';
  const slotData = plan?.[slot];
  const activeId = getActiveCycleRoutine(slotData, plan);
  const routine  = slotData?.routines?.find(r=>r.id===activeId);
  const products = routine?.products || [];
  const tip      = routine?.tip || '';

  const today    = getTodayKey();
  const doneKey  = `onstep_flow_done_${today}_${slot}`;
  const doneSet  = new Set(JSON.parse(localStorage.getItem(doneKey)||'[]'));

  // Step info row (이미지 기준: "Step1" + "1 / N")
  const badgeEl  = document.getElementById('flow-step-badge-icon');
  const countEl  = document.getElementById('flow-step-count');
  if (badgeEl) badgeEl.textContent = `Step${activeId}`;
  if (countEl) countEl.textContent = products.length ? `1 / ${products.length}` : '';

  // Product carousel
  const strip    = document.getElementById('flow-prod-strip');
  const dotsEl   = document.getElementById('flow-prod-dots');
  if (strip) {
    if (!products.length) {
      strip.innerHTML = `<div style="padding:16px;font-family:'Inter',sans-serif;font-size:14px;color:var(--mist)">루틴을 설정해주세요</div>`;
      if (dotsEl) dotsEl.innerHTML = '';
    } else {
      strip.innerHTML = products.map(p => {
        const isDone = doneSet.has(p.name);
        const imgSrc = getBoxImgForProduct(p);
        const slotIcon = slot === 'morning'
          ? `<div class="flow-slot-badge morning">☀️</div>`
          : `<div class="flow-slot-badge night">🌙</div>`;
        return `
          <div class="flow-prod-item${isDone?' done':''}" onclick="toggleProdDone(${JSON.stringify(p.name)},'${slot}')">
            <div class="flow-prod-img"${imgSrc?` style="background-image:url(${imgSrc})"`:''}>
              ${slotIcon}
              ${!imgSrc ? `<span class="flow-prod-emoji">${p.icon||'✨'}</span>` : ''}
              <div class="flow-prod-check">✓</div>
            </div>
            <div class="flow-prod-info">
              <div class="flow-prod-name">${p.name}</div>
              ${p.brand ? `<div class="flow-prod-brand">${p.brand}</div>` : ''}
            </div>
          </div>`;
      }).join('');

      // Dots
      if (dotsEl) {
        dotsEl.innerHTML = products.map((_,i) =>
          `<div class="flow-prod-dot${i===0?' active':''}"></div>`
        ).join('');
      }

      // Update dots on scroll
      strip.onscroll = () => {
        const itemW = strip.firstElementChild?.offsetWidth || strip.offsetWidth;
        const idx = Math.round(strip.scrollLeft / itemW);
        dotsEl?.querySelectorAll('.flow-prod-dot').forEach((d,i) =>
          d.classList.toggle('active', i===idx)
        );
        if (countEl) countEl.textContent = `${idx+1} / ${products.length}`;
      };
    }
  }

  // Expert tip
  const tipArea = document.getElementById('flow-expert-tip');
  const tipText = document.getElementById('flow-tip-text');
  if (tipArea && tipText) {
    if (tip) { tipText.textContent = tip; tipArea.style.display = ''; }
    else tipArea.style.display = 'none';
  }

  updateCTABtn(doneSet.size, products.length);
}

function toggleProdDone(name, slot) {
  const today    = getTodayKey();
  const doneKey  = `onstep_flow_done_${today}_${slot}`;
  const doneList = JSON.parse(localStorage.getItem(doneKey)||'[]');
  const adding   = doneList.indexOf(name) === -1;
  if (adding) doneList.push(name);
  else doneList.splice(doneList.indexOf(name), 1);
  localStorage.setItem(doneKey, JSON.stringify(doneList));
  // 체크 시 BOX useCount +1
  if (adding) {
    const plan = JSON.parse(localStorage.getItem(DB_KEY)||'null');
    const slotData = plan?.[slot];
    const activeId = getActiveCycleRoutine(slotData, plan);
    const prod = slotData?.routines?.find(r=>r.id===activeId)?.products?.find(p=>p.name===name);
    if (prod) recordBoxUsage([prod]);
  }
  const plan = JSON.parse(localStorage.getItem(DB_KEY)||'null');
  renderFlowHeroStep(plan);
}

function updateCTABtn(done, total) {
  const btn    = document.getElementById('main-check-btn');
  const label  = document.getElementById('cta-label');
  const arrow  = document.getElementById('cta-arrow');
  if (!btn) return;
  const arrowSvg = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
  if (total===0)            { label.textContent='CHECK ROUTINE'; if(arrow)arrow.innerHTML=arrowSvg; btn.classList.remove('done'); }
  else if (done>=total)     { label.textContent='Log It — Complete ✓'; if(arrow)arrow.innerHTML=''; btn.classList.add('done'); }
  else if (done>0)          { label.textContent=`${done}/${total} · CHECK ROUTINE`; if(arrow)arrow.innerHTML=arrowSvg; btn.classList.remove('done'); }
  else                      { label.textContent='CHECK ROUTINE'; if(arrow)arrow.innerHTML=arrowSvg; btn.classList.remove('done'); }
}

function handleMainRoutineBtn() {
  const plan = JSON.parse(localStorage.getItem(DB_KEY)||'null');
  if (!plan) return;
  const period   = getTimePeriod();
  const slot     = period==='am' ? 'morning' : 'nightly';
  const slotData = plan[slot];
  const activeId = getActiveCycleRoutine(slotData, plan);
  const products = slotData?.routines?.find(r=>r.id===activeId)?.products||[];
  if (!products.length) return;

  const today   = getTodayKey();
  const doneKey = `onstep_flow_done_${today}_${slot}`;
  const doneList= JSON.parse(localStorage.getItem(doneKey)||'[]');
  if (doneList.length >= products.length) return;

  // Mark all remaining products done at once
  products.forEach(p => { if (!doneList.includes(p.name)) doneList.push(p.name); });
  localStorage.setItem(doneKey, JSON.stringify(doneList));
  recordBoxUsage(products);
  renderFlowHeroStep(plan);
}

function renderAllDay() {
  const plan     = JSON.parse(localStorage.getItem(DB_KEY)||'{}');

  const checksKey= `onstep_ex_checks_${getTodayKey()}`;
  const checks   = JSON.parse(localStorage.getItem(checksKey)||'{}');

  if (!listEl) return;

  if (!items.length) {
    listEl.innerHTML = '<div class="allday-empty">"Setup에서 데일리 루틴을 등록하세요."</div>';
    return;
  }
  listEl.innerHTML = items.map(it => {
    const done = !!checks[it.id];
    const timeDisp = it.time ? fmtAllDayTime(it.time) : '';
    const chipContent = timeDisp || (it.alarm ? '🔔' : '');
    return `<div class="allday-item${done?' done':''}" onclick="toggleAllDay('${it.id}')">
      <div class="allday-item-left">
        <div class="allday-dot"><div class="allday-dot-inner"></div></div>
        <div class="allday-item-name">${it.name}</div>
      </div>
      ${chipContent ? `<div class="allday-item-chip" id="allday-chip-${it.id}">${it.alarm?`<span id="allday-alarm-${it.id}">${timeDisp||'🔔'}</span>`:timeDisp}</div>` : ''}
    </div>`;
  }).join('');
}

function toggleAllDay(id) {
  const k = `onstep_ex_checks_${getTodayKey()}`;
  const c = JSON.parse(localStorage.getItem(k)||'{}');
  c[id] = !c[id];
  localStorage.setItem(k, JSON.stringify(c));
  renderAllDay();
}

function fmtAllDayTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const ap = h >= 12 ? 'PM' : 'AM';
  const h12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
  return `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ap}`;
}

// ── Tracker Alarms ────────────────────────────────────────────
function checkTrackerAlarms() {
  const plan  = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
  const items = plan.exercise?.items || [];
  if (!items.some(it => it.alarm)) return;

  const now  = new Date();
  const hh   = String(now.getHours()).padStart(2,'0');
  const mm   = String(now.getMinutes()).padStart(2,'0');
  const cur  = `${hh}:${mm}`;

  items.forEach(it => {
    if (!it.alarm || it.time !== cur) return;
    const nKey = `onstep_alarm_fired_${it.id}_${cur}_${getTodayKey()}`;
    if (localStorage.getItem(nKey)) return;
    localStorage.setItem(nKey, '1');

    // Ring animation
    const iconEl = document.getElementById(`allday-alarm-${it.id}`);
    if (iconEl) { iconEl.classList.add('ringing'); setTimeout(() => iconEl.classList.remove('ringing'), 5000); }

    // Web Notification
    if ('Notification' in window && Notification.permission === 'granted') {
      try {
        new Notification(`⏰ ${it.name}`, { body: `OnStep · ${fmtAllDayTime(it.time)} 알림`, icon: 'favicon.png' });
      } catch(e) {}
    }
  });
}

// Request notification permission once and start alarm interval
(function initAlarms() {
  if ('Notification' in window && Notification.permission === 'default') {
    const plan = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
    if ((plan.exercise?.items || []).some(it => it.alarm)) {
      Notification.requestPermission();
    }
  }
  setInterval(checkTrackerAlarms, 30000);
  checkTrackerAlarms(); // run immediately on load
})();

function renderTodayOOTD() {
  const block = document.getElementById('ootd-editorial-block');
  const hdSub = document.getElementById('ootd-hd-sub');
  if (!block) return;
  const lookTheme = getTodaysScheduledLook();
  if (hdSub) hdSub.textContent = lookTheme ? (lookTheme.name || 'Edit →') : 'Edit →';
  const heroImg = lookTheme?.baselineImg || '';
  const items = lookTheme?.products || lookTheme?.items || [];
  const grid = items.slice(0,4).map(p => {
    const img = p.imgData || getBoxImgForProduct(p) || '';
    return `<div class="ed-prod-card">
      <div class="ed-prod-img"${img?` style="background-image:url(${img})"`:''}>
        ${!img?`<span style="font-size:28px;opacity:.25">👗</span>`:''}
      </div>
      <div class="ed-prod-cat">${(p.category||p.step||'').toUpperCase()}</div>
      <div class="ed-prod-name">${p.name||''}</div>
      ${p.brand?`<div class="ed-prod-brand">${p.brand}</div>`:''}
    </div>`;
  }).join('');
  block.innerHTML = `
    <div class="editorial-hero"${heroImg?` style="background-image:url(${heroImg})"`:''}>
      ${!heroImg?`<span style="font-size:44px;opacity:.2">👗</span>`:''}
      <div class="editorial-badge">EDITORIAL CHOICE</div>
      <a class="editorial-gear" href="log.html?tab=library" onclick="event.stopPropagation()">⚙</a>
    </div>
    ${grid?`<div class="editorial-prod-grid">${grid}</div>`:''}`;
  renderOOTDLogCard();
}

function renderOOTDLogCard() {
  const wrap = document.getElementById('ootd-log-wrap');
  if (!wrap) return;
  const looks = JSON.parse(localStorage.getItem(LOOKS_KEY)||'[]');
  const look  = looks.find(l=>l.date===getTodayKey())||null;
  if (look?.logged) {
    const thumb = look.mainPhoto
      ? `style="background-image:url(${look.mainPhoto});background-size:cover;background-position:center"`
      : '';
    wrap.innerHTML = `<div class="record-logged-card" onclick="openOOTDRecord()">
      <div class="record-logged-thumb" ${thumb}>${!look.mainPhoto?'📷':''}</div>
      <div class="record-logged-info">
        <div class="record-logged-name">"${look.note||'오늘의 룩'}"</div>
        <div class="record-logged-badge">Logged ✓</div>
      </div>
    </div>`;
  } else {
    wrap.innerHTML = `<div class="record-look-row" onclick="openOOTDRecord()">
      <div class="record-look-icon">📷</div>
      <div class="record-look-text">Record your final look</div>
      <div class="record-look-plus">+</div>
    </div>`;
  }
}

function openOOTDRecord() {
  const looks = JSON.parse(localStorage.getItem(LOOKS_KEY)||'[]');
  const look  = looks.find(l=>l.date===getTodayKey())||null;
  const area  = document.getElementById('ootd-rec-photo-area');
  const ph    = document.getElementById('ootd-rec-photo-placeholder');
  const note  = document.getElementById('ootd-rec-note');
  if (area && look?.mainPhoto) {
    area.style.backgroundImage = `url(${look.mainPhoto})`;
    if (ph) ph.style.display = 'none';
  } else if (area) {
    area.style.backgroundImage = '';
    if (ph) ph.style.display = 'flex';
  }
  if (note) note.value = look?.note || '';
  document.getElementById('ootd-rec-sheet')?.classList.add('open');
}

function closeOOTDRecord() {
  document.getElementById('ootd-rec-sheet')?.classList.remove('open');
}

function handleOOTDRecPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const area = document.getElementById('ootd-rec-photo-area');
    const ph   = document.getElementById('ootd-rec-photo-placeholder');
    if (area) { area.style.backgroundImage = `url(${ev.target.result})`; area._pendingPhoto = ev.target.result; }
    if (ph) ph.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function saveOOTDRecord() {
  const area  = document.getElementById('ootd-rec-photo-area');
  const note  = document.getElementById('ootd-rec-note')?.value.trim() || '';
  const photo = area?._pendingPhoto || null;
  const looks = JSON.parse(localStorage.getItem(LOOKS_KEY)||'[]');
  const today = getTodayKey();
  let look = looks.find(l=>l.date===today);
  if (!look) { look={date:today,mainPhoto:null,note:'',logged:false}; looks.push(look); }
  if (photo) look.mainPhoto = photo;
  look.note = note;
  look.logged = true;
  look.loggedAt = new Date().toISOString();
  const plan = JSON.parse(localStorage.getItem(DB_KEY)||'null');
  if (plan) {
    const period = getTimePeriod();
    const slot   = period==='am'?'morning':'nightly';
    const curDay = calcCurrentDay(plan.periodStart);
    const doneKey  = `onstep_flow_done_${today}_${slot}`;
    const doneList = JSON.parse(localStorage.getItem(doneKey)||'[]');
    look.flowMeta = {
      sessionN: plan.session||1, sessionDay: curDay,
      dayInCycle: Math.floor((new Date()-new Date(plan.periodStart))/86400000)%2+1,
      step: getActiveCycleRoutine(plan[slot],plan), slot,
      products: doneList
    };
  }
  localStorage.setItem(LOOKS_KEY, JSON.stringify(looks));
  saveLogsToCloud();
  if (area) area._pendingPhoto = null;
  closeOOTDRecord();
  renderTodayOOTD();
}

function pickOOTDPhoto() {
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const looks = JSON.parse(localStorage.getItem(LOOKS_KEY)||'[]');
      const today = getTodayKey();
      let look = looks.find(l=>l.date===today);
      if (!look) { look={date:today,mainPhoto:null,note:'',logged:false}; looks.push(look); }
      look.mainPhoto = ev.target.result;
      localStorage.setItem(LOOKS_KEY, JSON.stringify(looks));
      saveLogsToCloud();
      renderTodayOOTD();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function logTodayOOTD() {
  openOOTDRecord();
}

// ── Weather ───────────────────────────────────────────────────
const WEATHER_API_KEY = ''; // OpenWeatherMap API 키 입력 (https://openweathermap.org/api)
const WEATHER_CITY    = 'Seoul';
const WEATHER_CACHE_MS = 30 * 60 * 1000; // 30분 캐시

function getWeatherMascot(code) {
  if (!code) return '🌿';
  if (code >= 200 && code < 300) return '⛈️';
  if (code >= 300 && code < 400) return '🌧️';
  if (code >= 500 && code < 600) return '🌧️';
  if (code >= 600 && code < 700) return '❄️';
  if (code >= 700 && code < 800) return '🌫️';
  if (code === 800) return '☀️';
  if (code === 801) return '🌤️';
  if (code >= 802) return '☁️';
  return '🌿';
}

async function initWeather() {
  let cached;
  try { const d = JSON.parse(localStorage.getItem('onstep_weather_v2')||''); if (Date.now() - d.ts < WEATHER_CACHE_MS) cached = d; } catch(e) {}

  if (cached) {
    renderWeather(cached); return;
  }

  if (!WEATHER_API_KEY) {
    // fallback: wttr.in (no key needed)
    try {
      const res = await fetch(`https://wttr.in/${WEATHER_CITY}?format=j1`);
      if (!res.ok) throw new Error('wttr fail');
      const d = await res.json();
      const cur = d.current_condition[0];
      const w = {
        ts: Date.now(),
        temp: Math.round(cur.temp_C),
        feels: Math.round(cur.FeelsLikeC),
        humidity: cur.humidity,
        desc: cur.lang_ko?.[0]?.value || cur.weatherDesc[0]?.value || '맑음',
        code: parseInt(cur.weatherCode),
      };
      localStorage.setItem('onstep_weather_v2', JSON.stringify(w));
      renderWeather(w);
    } catch(e) {
      renderWeatherFallback();
    }
    return;
  }

  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${WEATHER_CITY}&appid=${WEATHER_API_KEY}&units=metric&lang=kr`);
    if (!res.ok) throw new Error('OWM fail');
    const d = await res.json();
    const w = {
      ts: Date.now(),
      temp: Math.round(d.main.temp),
      feels: Math.round(d.main.feels_like),
      humidity: d.main.humidity,
      desc: d.weather[0]?.description || '맑음',
      code: d.weather[0]?.id || 800,
    };
    localStorage.setItem('onstep_weather_v2', JSON.stringify(w));
    renderWeather(w);
  } catch(e) {
    renderWeatherFallback();
  }
}

function renderWeather(w) {
  const mascot  = document.getElementById('weather-mascot');
  const mainEl  = document.getElementById('weather-main-text');
  const h = new Date().getHours();
  const period = h < 12 ? '아침' : h < 18 ? '오후' : '저녁';
  if (mascot) mascot.textContent = getWeatherMascot(w.code);
  if (mainEl) mainEl.textContent = `${period} ${w.temp}° 습도 ${w.humidity}%`;
  const ootdEl = document.getElementById('ootd-weather');
  if (ootdEl) ootdEl.textContent = `${getWeatherMascot(w.code)} ${w.temp}° · 습도 ${w.humidity}%`;
}

function renderWeatherFallback() {
  const mascot = document.getElementById('weather-mascot');
  const mainEl = document.getElementById('weather-main-text');
  const h = new Date().getHours();
  const period = h < 12 ? '아침' : h < 18 ? '오후' : '저녁';
  if (mascot) mascot.textContent = '🌿';
  if (mainEl) mainEl.textContent = `${period} --° 습도 --%`;
}

// ── Load plan ─────────────────────────────────────────────────
function loadPlan(plan) {
  renderFlowSession(plan);
  renderFlowHeroStep(plan);
}

window.addEventListener('load', () => {
  initSampleData();
  const plan = JSON.parse(localStorage.getItem(DB_KEY)||'null');
  loadPlan(plan);
  renderAllDay();
  renderTodayOOTD();
  renderTodayMakeup();
  initWeather();
});
