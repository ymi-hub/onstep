<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>OnStep · Today</title>
<link rel="icon" type="image/png" href="logo-v2.png">
<link rel="apple-touch-icon" href="logo-v2.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OnStep">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFFFFF">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<link rel="stylesheet" href="shared.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Gaegu:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAFAF8; --surface:#F4F4F0; --surface-low:#EEEDE9;
  --surface-mid:#E4E2DC; --surface-high:#D8D6CF; --surface-inv:#0C0C0A;
  --ink:#0C0C0A; --sub:#4A4846; --mist:#9A9490;
  --lime:#C5FF00; --lime-dark:#A6D900; --lime-fg:#0C0C0A; --lime-border:#84B000;
  --border:rgba(12,12,10,.07); --border-md:rgba(12,12,10,.14);
  --shadow:0 1px 2px rgba(0,0,0,.04),0 0 0 1px rgba(0,0,0,.03);
  --gutter:16px; --margin:16px;
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-full:9999px;
  --green:#1E6B4A; --amber:#B45309; --error:#D93025;
  --xs:4px; --sm:8px; --md:16px; --lg:24px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#E8E6E0;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px 16px 48px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.phone{width:390px;height:888px;background:var(--bg);border-radius:48px;box-shadow:0 0 0 1px rgba(255,255,255,.6) inset,0 40px 100px rgba(0,0,0,.22);overflow:hidden;position:relative;transform:translate(0,0);display:flex;flex-direction:column;}
.notch{height:44px;flex-shrink:0;background:var(--bg);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px}
.notch-bar{width:126px;height:5px;background:var(--ink);border-radius:3px;opacity:.1}
.scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;background:var(--bg);overscroll-behavior:contain}
.scroll::-webkit-scrollbar{display:none}

/* Appbar */
.appbar{padding:0 16px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(250,250,248,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(241,245,249,1)}
.appbar-menu{width:22px;display:flex;flex-direction:column;gap:5px;cursor:pointer}
.appbar-menu span{height:1.5px;background:var(--ink);border-radius:2px}
.appbar-menu span:nth-child(2){width:68%}
.appbar-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:15px;font-weight:700;letter-spacing:.01em;color:var(--ink);display:flex;align-items:center;gap:8px}
.appbar-logo{width:24px;height:24px;border-radius:var(--r-sm);object-fit:cover;filter:grayscale(100%)}
#auth-avatar{width:32px;height:32px;border-radius:9999px;background:var(--surface-mid);border:1.5px solid var(--border-md);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Page title */
.page-title-wrap{padding:24px 16px 4px}
.page-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:60px;font-weight:900;color:var(--ink);line-height:.9;letter-spacing:-.06em}
.page-title::after{display:none}

/* ── Weather Row ── */
.weather-row{display:flex;align-items:center;gap:10px;padding:14px 16px 8px}
.mascot-card{width:46px;height:46px;background:#c5ff00;border-radius:10px;border:2px solid #91c000;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;line-height:1}
.weather-info{display:flex;flex-direction:column;gap:3px}
.weather-location{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--mist);letter-spacing:.04em;line-height:1;display:flex;align-items:center;gap:4px}
.weather-location svg{flex-shrink:0}
.weather-main-text{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;font-weight:500;color:var(--ink);line-height:1}

/* ── Session Hero ── */
.session-hero{padding:12px 16px 4px}
.session-hero-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:18px;font-weight:800;color:var(--ink);letter-spacing:.02em;text-transform:uppercase;line-height:1.2}
.session-hero-date{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;font-weight:500;color:var(--mist);margin-top:3px;margin-bottom:10px}
.session-hero-dots{display:flex;gap:5px;align-items:center}
.session-sdot{width:10px;height:10px;border-radius:var(--r-full);background:var(--surface-mid);flex-shrink:0}
.session-sdot.filled{background:var(--lime)}
.session-sdot.today{width:20px;border-radius:var(--r-full);background:var(--lime)}

/* Hash section header */
.hash-row{display:flex;align-items:baseline;justify-content:space-between;padding:16px 16px 8px}
.hash-label{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--ink)}
.hash-sub{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--mist)}
.hash-edit{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--mist);text-decoration:none;padding-bottom:3px}
.hash-edit:hover{color:var(--ink)}

/* Flow session block */
.flow-session{padding:0 16px 0}
.flow-session-name{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.flow-session-period{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:400;color:var(--mist);margin-bottom:12px}

/* Session progress card — 이미지 기준 제거 (session-hero로 대체) */
.flow-progress-card{display:none}
.flow-progress-row{display:flex;align-items:center;justify-content:space-between}
.flow-progress-label{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--ink)}
.flow-progress-day{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:400;color:var(--mist)}
.flow-dots{display:flex;align-items:center;justify-content:space-between}
.flow-dot{width:10px;height:10px;border-radius:var(--r-full);background:var(--surface-mid);border:none;flex-shrink:0;transition:all .3s;position:relative}
.flow-dot.filled{background:var(--lime)}
.flow-dot.today{width:20px;height:10px;background:var(--lime);border-radius:var(--r-full);box-shadow:0 0 0 2px rgba(198,244,50,.35)}

/* Flow step section */
.flow-step-card{margin:0 16px;background:#FFFFFF;border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--r-xl);overflow:hidden;-webkit-transform:translateZ(0);transform:translateZ(0)}
.flow-step-hd{display:none} /* 이미지 기준: 헤더 없음, 이미지가 먼저 */

/* Compact multi-card routine strip — 5.5개 노출 */
.flow-prod-strip{display:flex;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding:20px 20px 20px;gap:6px}
.flow-prod-strip::-webkit-scrollbar{display:none;width:0;height:0}
.flow-prod-item{flex-shrink:0;width:130px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.flow-prod-img{width:100%;aspect-ratio:1/1;background:#f0efec;background-size:100% auto;background-position:top center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border-radius:10px}
.flow-prod-emoji{font-size:28px;opacity:.3;pointer-events:none}
.flow-prod-check{position:absolute;inset:0;background:rgb(12 16 20 / 30%);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;opacity:0;transition:opacity .2s;pointer-events:none;border-radius:10px}
.flow-prod-item.done .flow-prod-check{opacity:1}
/* 모닝/나이트 구분 아이콘 — 이미지 좌상단 */
.flow-slot-badge{position:absolute;top:4px;left:4px;width:16px;height:16px;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;font-size:10px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:2;pointer-events:none}
.flow-slot-badge.morning{background:rgba(255,255,255,.85);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.flow-slot-badge.night{background:rgba(24,24,27,.7);box-shadow:0 1px 4px rgba(0,0,0,.18)}
.flow-prod-info{padding:4px 0 0}
.flow-prod-name{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;font-weight:400;color:var(--ink);line-height:1.3;padding-left:0;text-align:center;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.flow-prod-brand{display:none}
/* scroll dots — 숨김 (다중 카드 노출로 불필요) */
.flow-prod-dots{display:none}
.flow-prod-dot{display:none}

/* Step info row — 이미지 기준: 도트 아래에 Day1 + 카운트 */
.flow-step-info{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 4px;border-top:1px solid var(--border)}
.flow-step-label{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:6px}
.flow-step-label-icon{width:16px;height:16px;border-radius:var(--r-full);border:1.5px solid var(--ink);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink)}
.flow-step-count{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:400;color:var(--mist)}

.flow-step-body{padding:4px 16px 20px;display:flex;flex-direction:column;gap:12px}
.flow-step-tag{display:none}
.flow-expert-tip{display:flex;flex-direction:column;align-items:flex-start;padding:16px;gap:10px;margin:0 16px;background:#F5FDD4;border:1px solid rgba(198,244,50,.5);border-radius:var(--r-lg)}
.flow-expert-tip.no-tip{background:none;border:none;border-top:3px solid #c5ff00;border-radius:0;padding:0;margin:0 16px;gap:0}
.flow-expert-tip.no-tip *{display:none}
.flow-tip-header{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px}
.flow-tip-text{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;color:var(--sub);line-height:1.6}
.flow-edit-link{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--mist);text-decoration:none;align-self:flex-end}
.flow-edit-link:hover{color:var(--ink)}

/* CTA button */
.flow-cta-wrap{padding:8px 16px 16px}
.flow-cta-btn{width:100%;background:var(--ink);color:#ffffff;border:none;min-height:40px;padding:0 16px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .28s,transform .15s;border-radius:var(--r-full)}
.flow-cta-btn:active{transform:scale(.98)}
.flow-cta-btn.done{background:var(--lime);color:var(--ink);border:2px solid var(--lime-border)}
.flow-cta-arrow{font-size:15px;color:#fff}
@keyframes btn-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.flow-cta-btn.shake{animation:btn-shake .35s ease}

/* Routine Tracker section */
.allday-section{padding:28px 16px 0;display:flex;flex-direction:column;gap:8px}
.allday-section-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.allday-hd-left{display:flex;flex-direction:column;gap:2px}
.allday-top-label{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--mist)}
.allday-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--ink)}
.allday-top-edit{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--mist);text-decoration:none;padding-top:2px}
.allday-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#FFFFFF;border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;transition:opacity .2s;box-shadow:var(--shadow)}
.allday-item.done{opacity:.5}
.allday-item-left{display:flex;align-items:center;gap:12px}
.allday-dot{width:32px;height:32px;border-radius:var(--r-full);border:2px solid var(--border-md);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative}
.allday-dot-inner{width:14px;height:14px;background:var(--lime);border-radius:var(--r-full);opacity:0;transition:opacity .2s}
.allday-item.done .allday-dot{border-color:var(--lime);background:var(--lime)}
.allday-item.done .allday-dot-inner{opacity:1;background:#0A0A0A}
.allday-item-name{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:15px;font-weight:400;color:var(--ink)}
.allday-item.done .allday-item-name{color:var(--mist)}
.allday-item-meta{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:400;color:var(--mist)}
.allday-empty{padding:28px 20px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;color:var(--mist);text-align:center;border:1.5px dashed var(--border-md);border-radius:var(--r-lg);background:var(--surface-low);line-height:1.6}
.allday-item-right{display:flex;align-items:center;gap:6px}
.allday-item-time{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--mist)}
.allday-alarm-icon{font-size:13px;opacity:.4;line-height:1}
.allday-alarm-icon.ringing{opacity:1;animation:alarmring .4s ease infinite alternate}
@keyframes alarmring{0%{transform:rotate(-12deg)}100%{transform:rotate(12deg)}}

/* Legacy allday-card (unused, kept for compat) */
.allday-card{display:none}

/* Special Care Today — OOTD editorial 구조와 동일 */

/* MOTD section */
.motd-section{padding:28px 16px 0;display:flex;flex-direction:column;gap:16px}
.motd-section-hd{display:flex;align-items:center;justify-content:space-between}
.motd-section-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--ink)}
.motd-section-link{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--mist);text-decoration:none}
/* Left text + right image strip */
.motd-body{position:relative;height:186px;overflow:hidden}
.motd-text-col{position:absolute;left:0;top:0;bottom:0;width:218px;display:flex;flex-direction:column;justify-content:flex-start;padding-right:62px;gap:8px}
.motd-theme-name{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1}
.motd-theme-desc{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;color:#44474a;line-height:1.5}
.motd-img-strip{position:absolute;left:235px;top:0;bottom:0;display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding-right:4px}
.motd-img-strip::-webkit-scrollbar{display:none}
.motd-img-card{flex-shrink:0;width:140px;height:186px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:8px;cursor:pointer;transition:opacity .2s;box-shadow:var(--shadow)}
.motd-img-card.checked{opacity:.45}
.motd-img-photo{width:100%;height:168px;background:var(--surface-mid);background-size:auto 100%;background-position:center;background-repeat:no-repeat;border-radius:var(--r-md)}
/* Bottom chip row */
.motd-chips-row{display:flex;gap:16px;overflow-x:auto;scrollbar-width:none;padding:8px 0}
.motd-chips-row::-webkit-scrollbar{display:none}
.motd-chip-card{flex-shrink:0;width:140px;height:192px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:8px;cursor:pointer;display:flex;flex-direction:column;gap:0;transition:opacity .2s;box-shadow:var(--shadow)}
.motd-chip-card.checked{opacity:.45}
.motd-chip-img{width:100%;height:122px;background:var(--surface-mid);background-size:auto 100%;background-position:center;background-repeat:no-repeat;border-radius:var(--r-md)}
.motd-chip-name{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--ink);padding:8px 0 0;line-height:1.25}
.motd-chip-note{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;color:var(--mist);line-height:1.5}

/* MOTD new theme header */
.motd-theme-hd-row{display:flex;align-items:flex-start;gap:12px;padding:0 0 14px}
.motd-theme-emoji-lg{font-size:28px;line-height:1;flex-shrink:0;padding-top:2px}
.motd-theme-name-lg{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:20px;font-weight:800;color:var(--ink);line-height:1.1;margin-bottom:4px}
.motd-theme-desc-sm{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;color:var(--mist);line-height:1.5}

/* OOTD section */
.ootd-section{padding:0 16px}
.ootd-section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ootd-section-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--ink)}
.ootd-section-link{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--mist);text-decoration:none}
.ootd-photo-card{border-radius:var(--r-xl);overflow:hidden;cursor:pointer;position:relative;height:256px;background:var(--surface-mid);background-size:auto 100%;background-position:center;background-repeat:no-repeat}
.ootd-photo-img{width:100%;height:100%;background:var(--surface-mid);background-size:auto 100%;background-position:center;background-repeat:no-repeat;position:relative;display:flex;align-items:center;justify-content:center}
.ootd-placeholder-icon{font-size:40px;opacity:.3}
.ootd-check-btn{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:0;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;cursor:pointer;z-index:2;transition:background .2s}
.ootd-check-btn.logged{background:rgba(0,0,0,.6)}
.ootd-overlay{position:absolute;bottom:0;left:0;right:0;padding:60px 16px 16px;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 50%,transparent 100%);pointer-events:none}
.ootd-weather{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:400;color:rgba(255,255,255,.8);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.ootd-caption-text{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;line-height:1.25}

/* OOTD Log card */
.ootd-log-section{padding:16px 16px 20px}
.ootd-log-card{background:var(--surface);border:2px dashed var(--border-md);border-radius:var(--r-lg);padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:background .2s}
.ootd-log-card:active{background:var(--surface-low)}
.ootd-log-icon{width:33px;height:30px;opacity:.25;display:flex;align-items:center;justify-content:center;font-size:24px}
.ootd-log-text{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;color:var(--mist)}

/* OOTD Record Sheet */
.ootd-rec-sheet{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
.ootd-rec-sheet.open{opacity:1;pointer-events:auto}
.ootd-rec-inner{background:#fff;border-radius:24px 24px 0 0;width:100%;padding:24px 20px 36px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;max-height:88vh;overscroll-behavior:contain}
.ootd-rec-sheet.open .ootd-rec-inner{transform:translateY(0)}
.ootd-rec-handle{width:32px;height:4px;background:var(--border-md);border-radius:var(--r-full);margin:0 auto 20px}
.ootd-rec-title{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:#0C1014;margin-bottom:16px}
.ootd-rec-sec-label{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--mist);margin-bottom:8px}
.ootd-rec-sec-label span{font-weight:500;letter-spacing:0;text-transform:none;font-size:11px;margin-left:4px;opacity:.7}
.ootd-rec-theme-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;max-height:180px;overflow-y:auto}
.ootd-rec-theme-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1.5px solid var(--border-md);border-radius:var(--r-md);cursor:pointer;transition:background .15s,border-color .15s;flex-shrink:0}
.ootd-rec-theme-row.sel{border-color:#0A0A0A;background:var(--surface)}
.ootd-rec-theme-thumb{width:34px;height:34px;border-radius:var(--r-sm);background:var(--surface-mid);background-size:auto 100%;background-position:center;background-repeat:no-repeat;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:.8}
.ootd-rec-theme-name{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ootd-rec-theme-chk{font-size:13px;color:#0A0A0A;opacity:0;flex-shrink:0}
.ootd-rec-theme-row.sel .ootd-rec-theme-chk{opacity:1}
.ootd-rec-photo-area{width:100%;height:120px;background:var(--surface-low);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:12px;overflow:hidden;background-size:auto 100%;background-position:center;background-repeat:no-repeat;position:relative}
.ootd-rec-photo-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.ootd-rec-photo-icon{font-size:26px;opacity:.3}
.ootd-rec-photo-hint{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;color:var(--mist)}
.ootd-rec-note{width:100%;border:1.5px solid var(--border-md);border-radius:var(--r-md);padding:11px 14px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;color:#0C1014;resize:none;height:64px;outline:none;box-sizing:border-box;margin-bottom:16px}
.ootd-rec-theme-empty{padding:20px 0;text-align:center;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;color:var(--mist)}
.ootd-rec-note:focus{border-color:#0C1014}
.ootd-rec-note::placeholder{color:#bbb}
.ootd-rec-btns{display:flex;gap:8px}
.ootd-rec-cancel{flex:1;height:52px;background:var(--surface-low);color:var(--ink);border:1.5px solid var(--border-md);border-radius:var(--r-md);font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer}
.ootd-rec-cancel:active{opacity:.8}
.ootd-rec-save{flex:2;height:52px;background:#0A0A0A;color:#fff;border:none;border-radius:var(--r-md);font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.ootd-rec-save:active{opacity:.8}
/* OOTD log card — logged state */
.ootd-log-card-logged{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;transition:background .2s;box-shadow:var(--shadow)}
.ootd-log-card-logged:active{background:var(--surface-low)}
.ootd-log-thumb{width:56px;height:56px;border-radius:var(--r-md);background:var(--surface-mid);background-size:auto 100%;background-position:center;background-repeat:no-repeat;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.4}
.ootd-log-info{flex:1;min-width:0}
.ootd-log-note-txt{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.ootd-log-badge{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;font-weight:600;color:#4caf78;margin-top:3px}

/* FAB */
.fab{position:absolute;right:16px;bottom:90px;width:52px;height:52px;border-radius:var(--r-full);background:var(--lime);border:2px solid var(--lime-border);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(198,244,50,.45);z-index:50;transition:transform .15s}
.fab:active{transform:scale(.93)}
.fab svg{width:22px;height:22px;color:var(--lime-border)}

/* Bottom nav */
.bottom-nav{background:#FFFFFF;display:flex;border-top:1px solid rgba(0,0,0,.06);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;padding:12px 6px 20px;text-decoration:none;border-radius:20px 20px 0 0;}
.nav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:#AAAAAA;}
.nav-label{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#AAAAAA;}
.nav-item.active{background:#0A0A0A;}
.nav-item.active .nav-icon{color:#FFFFFF;}
.nav-item.active .nav-label{color:#FFFFFF;}

.toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;padding:10px 20px;font-size:13px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-weight:600;border-radius:var(--r-full);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:430px){
  body{background:var(--bg);padding:0;align-items:stretch;height:100dvh;overflow:hidden;}
  .phone{width:100%;border-radius:0;box-shadow:none;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
  .notch{flex-shrink:0;height:calc(env(safe-area-inset-top,0px) + 10px);padding-top:env(safe-area-inset-top,0px);padding-bottom:0}
  .notch-bar{display:none}
  .scroll{flex:1;min-height:0;height:auto;}
  .app-nav{flex-shrink:0;}
  .bottom-nav{border-top:1px solid rgba(0,0,0,.06);}
  .nav-item{padding-bottom:calc(env(safe-area-inset-bottom,0px) + 14px);}
}

/* page-session-row → display:none (session-hero로 대체) */
.page-session-row{display:none}
/* Editorial sections */
.editorial-section{padding:32px 16px 0}
.editorial-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.editorial-hd-tag{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--ink)}
.editorial-hd-sub{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:400;color:var(--mist);text-decoration:none}
.editorial-hero{position:relative;width:100%;aspect-ratio:1/1;background:var(--surface-mid);border-radius:var(--r-xl);overflow:hidden;cursor:pointer;background-size:auto 100%;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center}
.editorial-badge{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.65);color:#fff;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:5px 10px;border-radius:var(--r-sm)}
.editorial-gear{position:absolute;top:12px;right:12px;width:30px;height:30px;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;text-decoration:none}
.editorial-prod-grid{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;gap:8px;margin-top:10px;padding:0 10px 2px 20px}
.editorial-prod-grid::-webkit-scrollbar{display:none}
.ed-prod-card{flex-shrink:0;width:calc((100% - 32px) / 5.2);scroll-snap-align:start;cursor:pointer;transition:opacity .2s}
.ed-prod-card.done{opacity:.45}
.ed-prod-plus{display:flex;align-items:center;justify-content:center;width:28px!important;flex-shrink:0}
.ed-prod-plus-sym{font-size:18px;color:var(--mist);font-weight:300;line-height:1}
.ed-prod-desc{width:calc((100% - 16px) / 2.2)!important;cursor:default}
.ed-prod-desc-txt{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;color:var(--sub);line-height:1.4;padding:6px 0;word-break:keep-all}
/* ── 집중케어 카드 디자인 ── */
#care-today-wrap{display:flex;flex-direction:column;gap:20px}
#care-today-section{padding-bottom:16px}
.care-block{display:flex;flex-direction:column}
.care-card{background:#fff;border-radius:var(--r-xl);overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04)}
/* 히어로 이미지 영역 */
.care-hero{position:relative;width:100%;aspect-ratio:4/3;background:var(--surface-mid);border-radius:0;overflow:hidden;background-size:cover;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;cursor:pointer}
.care-block-multi .care-hero{aspect-ratio:5/2}
/* 히어로 그라디언트 오버레이 + 이름 */
.care-hero-overlay{position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(to top,rgba(0,0,0,.72) 0%,transparent 100%);pointer-events:none}
.care-hero-emoji-float{position:absolute;top:50%;left:50%;transform:translate(-50%,-70%);font-size:52px;line-height:1;pointer-events:none}
.care-hero-name{position:absolute;bottom:14px;left:16px;right:16px;color:#fff;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1.1;z-index:1}
.care-block-multi .care-hero-name{font-size:17px;bottom:10px}
/* 제품 그리드 — 1열 5개 좌우 스크롤 */
.care-prod-row{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scroll-padding-left:16px;scrollbar-width:none;gap:10px;padding:20px 0;border-top:1px solid rgba(0,0,0,.06)}
.care-prod-row::-webkit-scrollbar{display:none}
.care-prod-row::before{content:'';flex-shrink:0;width:16px}
.care-prod-row::after{content:'';flex-shrink:0;width:16px}
.care-prod-item{flex-shrink:0;width:130px;scroll-snap-align:start;display:flex;flex-direction:column;align-items:center;gap:7px}
.care-prod-thumb{width:100%;aspect-ratio:1/1;background:#EDECE9;border-radius:14px;border:1px solid rgba(0,0,0,.06);box-shadow:0 1px 2px rgba(0,0,0,.05);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;overflow:hidden}
.care-prod-thumb span{font-size:32px;line-height:1}
.care-prod-label{font-size:14px;font-weight:400;color:var(--ink);text-align:center;letter-spacing:-.01em;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* + 와 설명 — 같은 열 인라인 */
.care-item-plus{width:28px!important;justify-content:center;flex-shrink:0}
.care-plus-circle{width:28px;height:28px;background:none;border:none;box-shadow:none;border-radius:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:300;color:var(--mist)}
.care-item-desc{display:flex;width:auto!important;flex-shrink:0;justify-content:center;align-self:center}
.care-desc-text{display:block;padding:6px 12px;background:#2185fd;border-radius:20px;border:1px solid rgba(0,0,0,.06);font-size:12px;font-weight:400;color:#ffffff;white-space:nowrap;line-height:1}
/* flow strip 태그 (care-tag-*) — 인라인 칩 */
.care-tag-plus{flex-shrink:0;display:flex;align-items:center;justify-content:center;width:20px;font-size:14px;font-weight:300;color:var(--mist);align-self:center}
.care-tag-desc{flex-shrink:0;align-self:center;padding:5px 10px;background:#2185fd;border-radius:16px;border:1px solid rgba(0,0,0,.06);font-size:12px;font-weight:400;color:#fff;white-space:nowrap;line-height:1}

/* OOTD — portrait hero + thumb row + more row */
.ootd-main-photo{position:relative;width:100%;aspect-ratio:3/4;background:var(--surface-mid);border-radius:var(--r-xl);overflow:hidden;cursor:pointer;background-size:cover;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center}
.ootd-main-overlay{position:absolute;bottom:0;left:0;right:0;padding:60px 16px 18px;background:linear-gradient(to top,rgba(0,0,0,.56) 0%,transparent 55%);pointer-events:none}
.ootd-main-badge{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:5px}
.ootd-main-name{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:#fff;line-height:1.25}
.ootd-thumb-row{display:flex;overflow-x:auto;scrollbar-width:none;gap:6px;padding:10px 0 6px;scroll-snap-type:x mandatory}
.ootd-thumb-row::-webkit-scrollbar{display:none}
.ootd-thumb-item{flex-shrink:0;width:96px;height:96px;border-radius:14px;background:#141414;background-size:contain;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;overflow:hidden;scroll-snap-align:start;cursor:pointer}
.ootd-more-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-top:1px solid var(--border);cursor:pointer;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--ink);letter-spacing:.01em}
.ootd-more-chev{font-size:17px;font-weight:300;color:var(--sub);line-height:1}
.ed-prod-img{width:100%;aspect-ratio:1/1;background:var(--surface-mid);border-radius:var(--r-lg);background-size:100% auto;background-position:top center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.ed-prod-check{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;opacity:0;transition:opacity .2s;border-radius:var(--r-lg)}
.ed-prod-card.done .ed-prod-check{opacity:1}
.ed-prod-cat{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mist);margin-top:8px}
.ed-prod-name{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--ink);line-height:1.2;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ed-prod-brand{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;color:var(--mist);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ed-prod-loc{display:inline-flex;align-items:center;gap:3px;margin-top:4px;padding:2px 6px;background:var(--surface);border:1px solid var(--border);border-radius:9999px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;font-weight:600;color:var(--sub);letter-spacing:.02em;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ed-prod-expiry{display:inline-block;margin-left:4px;padding:1px 5px;background:#FEF3C7;border:1px solid #F59E0B;border-radius:9999px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#B45309;letter-spacing:.03em;vertical-align:middle}
.ed-prod-expiry.expired{background:#FEE2E2;border-color:#EF4444;color:#DC2626}
.editorial-empty{padding:28px 20px;text-align:center;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;color:var(--mist);border:1.5px dashed var(--border-md);border-radius:var(--r-xl);line-height:1.6}
/* Smart Guide 카드 */
.smart-guide-card{background:var(--surface);border:1.5px solid var(--lime);border-radius:var(--r-xl);padding:16px;margin-bottom:12px;}
.smart-guide-eyebrow{display:inline-flex;align-items:center;gap:5px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--lime-fg);background:var(--lime);padding:3px 10px;border-radius:var(--r-full);margin-bottom:10px;}
.smart-guide-name{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.smart-guide-meta{font-size:12px;color:var(--mist);margin-bottom:12px;}
.smart-guide-btns{display:flex;gap:8px;}
.smart-guide-apply{flex:2;height:42px;background:var(--ink);color:#fff;border:none;border-radius:var(--r-md);font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s;}
.smart-guide-apply:active{opacity:.8;}
.smart-guide-skip{flex:1;height:42px;background:none;border:1.5px solid var(--border-md);border-radius:var(--r-md);font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--mist);cursor:pointer;}
.smart-guide-skip:active{opacity:.8;}
/* Record look row */
.record-look-row{margin-top:14px;margin-bottom:20px;border:1.5px dashed var(--border-md);border-radius:var(--r-full);min-height:52px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;background:#fff;transition:background .2s}
.record-look-row:active{background:var(--surface-low)}
.record-look-icon{width:36px;height:36px;background:var(--surface-mid);border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.record-look-text{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--mist);flex:1}
.record-look-plus{width:30px;height:30px;background:var(--lime);border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;font-size:20px;line-height:1;color:var(--ink);flex-shrink:0;font-weight:300}
.record-logged-card{margin-top:14px;margin-bottom:20px;border:1.5px solid #4caf78;border-radius:var(--r-full);min-height:52px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;background:#fff;transition:background .2s}
.record-logged-card:active{background:var(--surface-low)}
.record-logged-thumb{width:36px;height:36px;border-radius:var(--r-full);background:var(--surface-mid);background-size:auto 100%;background-position:center;background-repeat:no-repeat;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:.4}
.record-logged-info{flex:1;min-width:0;display:flex;align-items:center;white-space:nowrap;overflow:hidden}
.record-logged-name{font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;flex-shrink:1}
.record-logged-badge{font-size:11px;font-weight:700;color:#4caf78}
.record-logged-del{width:28px;height:28px;border-radius:var(--r-full);border:none;background:var(--surface-low);color:var(--mist);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.record-logged-del:active{background:#fee2e2;color:#ef4444}
.ootd-rec-del{width:100%;height:44px;background:none;border:1.5px solid #fee2e2;color:#ef4444;border-radius:var(--r-md);font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px;letter-spacing:.02em}
.ootd-rec-del:active{background:#fee2e2}
/* Allday redesign */
.allday-top-label{display:none}
.allday-section{padding:28px 0 0;display:flex;flex-direction:column;gap:0}
.allday-section-hd{padding:0 16px;margin-bottom:12px;gap:0}

.allday-top-edit{font-size:11px;font-weight:700;letter-spacing:.04em}
#allday-items{background:#FFFFFF;border-radius:var(--r-xl);overflow:hidden;margin:0 16px;box-shadow:0 2px 12px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04)}
.allday-item{border-radius:0;border:none;border-bottom:1px solid var(--border);box-shadow:none;padding:13px 16px;background:#FFFFFF;transition:background .18s;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.allday-item:first-of-type{border-top:none}
.allday-item:last-of-type{border-bottom:none}
.allday-item.done{background:var(--surface-low)}
.allday-item-left{display:flex;align-items:center;gap:10px}
/* Checkbox — colorful per item */
.allday-cb{width:16px;height:16px;border-radius:4px;border:2px solid var(--border-md);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:#fff}
.allday-cb.cb-blue  {border-color:#3478F6}
.allday-cb.cb-green {border-color:#34A853}
.allday-cb.cb-amber {border-color:#F5A01E}
.allday-cb.cb-red   {border-color:#E53935}
.allday-cb.cb-purple{border-color:#9B59B6}
.allday-item.done .allday-cb.cb-blue  {background:#3478F6;border-color:#3478F6}
.allday-item.done .allday-cb.cb-green {background:#34A853;border-color:#34A853}
.allday-item.done .allday-cb.cb-amber {background:#F5A01E;border-color:#F5A01E}
.allday-item.done .allday-cb.cb-red   {background:#E53935;border-color:#E53935}

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCwi1Lh0yD2kCpAYl--1UDkyjs5TVRfqGM",
  authDomain: "onstep-lifeos-v2-adee2.firebaseapp.com",
  projectId: "onstep-lifeos-v2",
  storageBucket: "onstep-lifeos-v2.firebasestorage.app",
  messagingSenderId: "996802662742",
  appId: "1:996802662742:web:1d957ab5e6d8b54134c6f7"
});
const fbAuth = firebase.auth();
const fbDb   = firebase.firestore();
let currentUser = null, unsubscribe = null, _unsubExtra = null, _unsubBox = null, _unsubSettings = null;

firebase.auth().onAuthStateChanged(user => {
  currentUser = user;
  _updateAuthAvatar(user);
  if (unsubscribe)    { unsubscribe();    unsubscribe    = null; }
  if (_unsubExtra)    { _unsubExtra();    _unsubExtra    = null; }
  if (_unsubBox)      { _unsubBox();      _unsubBox      = null; }
  if (_unsubSettings) { _unsubSettings(); _unsubSettings = null; }
  if (user) {
    loadExtraFromCloud(user.uid);
    // careplan 실시간 동기화 — _mergePlan으로 session 번호 높은 쪽 우선
    unsubscribe = fbDb.collection('users').doc(user.uid)
      .collection('careplan').doc('data')
      .onSnapshot(snap => {
        if (!snap.exists) {
          const local = JSON.parse(localStorage.getItem(DB_KEY) || 'null');
          if (local && local.savedAt && currentUser) {
            fbDb.collection('users').doc(currentUser.uid)
              .collection('careplan').doc('data').set(local).catch(() => {});
          }
          return;
        }
        const data   = snap.data();
        const local  = JSON.parse(localStorage.getItem(DB_KEY) || 'null');
        const merged = _mergePlan(local, data);
        localStorage.setItem(DB_KEY, JSON.stringify(merged));
        loadPlan(merged);
        // merged가 cloud보다 session 수 많으면 cloud에도 업데이트
        const cloudTotal  = (data.session||0) + (data.history||[]).length;
        const mergedTotal = (merged.session||0) + (merged.history||[]).length;
        if (mergedTotal > cloudTotal && currentUser) {
          fbDb.collection('users').doc(currentUser.uid)
            .collection('careplan').doc('data').set(merged).catch(() => {});
        }
      }, e => console.warn(e));
    // extra/data(테마·룩) 실시간 동기화
    _unsubExtra = fbDb.collection('users').doc(user.uid)
      .collection('extra').doc('data')
      .onSnapshot(snap => {
        if (!snap.exists) return;
        const d = snap.data();
        const localTs = parseInt(localStorage.getItem('_onstep_extra_local_ts') || '0');
        const cloudTs = d.savedAt ? new Date(d.savedAt).getTime() : 0;
        if (cloudTs >= localTs - 3000) {
          const _mi=(key,arr)=>{const loc=JSON.parse(localStorage.getItem(key)||'[]');return arr.map(ct=>{const lc=loc.find(t=>t.id===ct.id);return{...ct,baselineImg:lc?.baselineImg||null,storageUrl:ct.storageUrl||lc?.storageUrl||null};});};
          if (d.careThemes)      localStorage.setItem('onstep_care_themes',       JSON.stringify(_mi('onstep_care_themes',d.careThemes)));
          if (d.makeupContents)  localStorage.setItem('onstep_makeup_contents',   JSON.stringify(_mi('onstep_makeup_contents',d.makeupContents)));
          if (d.lookContents)    localStorage.setItem('onstep_look_contents',     JSON.stringify(_mi('onstep_look_contents',d.lookContents)));
          if (d.portfolio)       localStorage.setItem('onstep_planned_portfolio', JSON.stringify(d.portfolio));
          if (d.looks) {
            const ll = JSON.parse(localStorage.getItem(LOOKS_KEY) || '[]');
            localStorage.setItem(LOOKS_KEY, JSON.stringify(d.looks.map(cl => {
              const loc = ll.find(l => l.date === cl.date);
              return { ...cl, mainPhoto: loc?.mainPhoto || null };
            })));
          }
          if (d.makeupLogs) {
            const ll = JSON.parse(localStorage.getItem(MAKEUP_LOGS_KEY) || '[]');
            localStorage.setItem(MAKEUP_LOGS_KEY, JSON.stringify(d.makeupLogs.map(cl => {
              const lc = ll.find(l => l.date === cl.date);
              return { ...cl, mainPhoto: lc?.mainPhoto || null };
            })));
          }
        }
        renderTodayMakeup();
        renderTodayOOTD();
        renderCareToday();
        renderSmartGuide();
      }, e => console.warn('extra onSnapshot:', e));
    // box/data(자산·위치) 크로스디바이스 동기화
    _unsubBox = fbDb.collection('users').doc(user.uid)
      .collection('box').doc('data')
      .onSnapshot(snap => {
        if (!snap.exists) return;
        const d = snap.data();
        const localTs = parseInt(localStorage.getItem('_onstep_box_local_ts') || '0');
        const cloudTs = d.savedAt ? new Date(d.savedAt).getTime() : 0;
        if (cloudTs >= localTs - 3000) {
          if (d.assets) {
            const localAssets=JSON.parse(localStorage.getItem('onstep_box_assets')||'[]');
            localStorage.setItem('onstep_box_assets', JSON.stringify(d.assets.map(ca=>{const la=localAssets.find(a=>a.id===ca.id);return{...ca,imgData:la?.imgData||null,storageImgData:la?.storageImgData||null};})));
          }
          if (d.locations) {
            const localLocs=JSON.parse(localStorage.getItem('onstep_box_locations')||'[]');
            localStorage.setItem('onstep_box_locations', JSON.stringify(d.locations.map(cl=>{const ll=localLocs.find(l=>l.id===cl.id);return{...cl,imgData:ll?.imgData||null};})));
          }
        }
        renderCareToday();
        renderTodayMakeup();
        renderTodayOOTD();
      }, e => console.warn('box onSnapshot:', e));
    // settings/data — trackerItems + trackerChecks 실시간 동기화
    _unsubSettings = fbDb.collection('users').doc(user.uid)
      .collection('settings').doc('data')
      .onSnapshot(snap => {
        if (!snap.exists) return;
        const d = snap.data();
        if (d.trackerItems) localStorage.setItem(TRACKER_KEY, JSON.stringify(d.trackerItems));
        if (d.trackerChecks && typeof d.trackerChecks === 'object') {
          const todayKey = getTodayKey();
          // 오늘 날짜 체크 상태만 처리 (cloud 우선)
          if (d.trackerChecks[todayKey]) {
            const cloudChecks = d.trackerChecks[todayKey];
            const k = `onstep_ex_checks_${todayKey}`;
            const local = JSON.parse(localStorage.getItem(k) || '{}');
            // cloud 값 우선, local에만 있는 항목도 보존
            localStorage.setItem(k, JSON.stringify({ ...local, ...cloudChecks }));
          }
        }
        renderAllDay();
      }, e => console.warn('settings onSnapshot:', e));
  }
});

  initNav('today');

  // Setup 변경 시 Today 즉시 업데이트 (BroadcastChannel)

    _onStateChange('makeupLogs', () => { renderTodayMakeup(); });

      const plan = JSON.parse(localStorage.getItem(DB_KEY) || 'null');
      if (plan) loadPlan(plan);
      renderTodayMakeup(); renderTodayOOTD(); renderSmartGuide();
    });
    _onStateChange('looks',      () => { renderTodayOOTD(); renderSmartGuide(); });
    _onStateChange('extra',      () => { renderTodayMakeup(); renderTodayOOTD(); renderCareToday(); renderSmartGuide(); });
    _onStateChange('tracker',    () => { renderAllDay(); });
    _onStateChange('box_assets', () => { renderTodayMakeup(); renderTodayOOTD(); renderCareToday(); });
  }
});

let _lastSyncTs = 0;
let _currentDateKey = getTodayKey();

// 자정 초기화 — 날짜가 바뀌면 Today 화면 갱신
function _scheduleMidnightReset() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setDate(midnight.getDate() + 1);
  midnight.setHours(0, 0, 0, 200); // 자정 +200ms
  setTimeout(() => {
    _currentDateKey = getTodayKey();
    renderTodayOOTD();
    renderTodayMakeup();
    _scheduleMidnightReset();
  }, midnight - now);
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState !== 'visible') return;
  // 날짜 변경 감지 — 자정을 넘긴 채 앱으로 돌아온 경우 즉시 갱신
  const newKey = getTodayKey();
  if (newKey !== _currentDateKey) {
    _currentDateKey = newKey;
    renderTodayOOTD();
    renderTodayMakeup();
  }
  if (!currentUser) return;
  const now = Date.now();
  if (now - _lastSyncTs < 60000) return;
  _lastSyncTs = now;
  try {
    const snap = await fbDb.collection('users').doc(currentUser.uid).collection('careplan').doc('data').get();
    if (snap.exists) {
      const data   = snap.data();
      const local  = JSON.parse(localStorage.getItem(DB_KEY) || 'null');
      const merged = _mergePlan(local, data);
      localStorage.setItem(DB_KEY, JSON.stringify(merged));
      loadPlan(merged);
      const cloudTotal  = (data.session||0) + (data.history||[]).length;
      const mergedTotal = (merged.session||0) + (merged.history||[]).length;
      if (mergedTotal > cloudTotal && currentUser) {
        fbDb.collection('users').doc(currentUser.uid)
          .collection('careplan').doc('data').set(merged).catch(() => {});
      }
    }
  } catch(e) {}
  loadExtraFromCloud(currentUser.uid);
});

// careplan 병합 — session 번호 높은 쪽 우선 (타임스탬프만으로 결정하면 낮은 번호가 덮어쓰는 버그 발생)
function _mergePlan(local, cloud) {
  if (!local || !local.savedAt) return cloud || {};
  if (!cloud || !cloud.savedAt) return local;
  const localSession = parseInt(local.session) || 0;
  const cloudSession = parseInt(cloud.session) || 0;
  const localTs = new Date(local.savedAt).getTime();
  const cloudTs = new Date(cloud.savedAt).getTime();
  const cloudWins = cloudSession > localSession ||
                    (cloudSession === localSession && cloudTs >= localTs);
  const base  = cloudWins ? cloud : local;
  const other = cloudWins ? local  : cloud;
  const map = new Map();
  (cloud.history||[]).forEach(s => { if (s.session) map.set(Number(s.session), s); });
  (local.history||[]).forEach(s => { if (s.session) map.set(Number(s.session), s); });
  if (other.session && other.session !== base.session) {
    const n = Number(other.session);
    if (!map.has(n)) map.set(n, { session:other.session, periodStart:other.periodStart, periodEnd:other.periodEnd, morning:other.morning, nightly:other.nightly });
  }
  return { ...base, history: Array.from(map.values()) };
}

function getBoxAssets() { return JSON.parse(localStorage.getItem('onstep_box_assets') || '[]'); }

function getBoxImgForProduct(p) {
  const assets = getBoxAssets();
  const assetId = p.assetId ?? p.id;
  if (assetId != null) {
    const a = assets.find(a => a.id === assetId);
    if (a?.imgData || a?.storageUrl) return a.imgData || a.storageUrl;
  }
  const a = assets.find(a =>
    a.name?.toLowerCase() === p.name?.toLowerCase() &&
    (!p.brand || a.brand?.toLowerCase() === p.brand?.toLowerCase())
  );
  return a?.imgData || a?.storageUrl || p.imgData || p.storageUrl || null;
}

function recordBoxUsage(products) {
  const today  = getTodayKey();
  const assets = getBoxAssets();
  let changed  = false;
  products.forEach(p => {
    const assetId = p.assetId ?? p.id;
    if (assetId == null) return;
    const idx = assets.findIndex(a => a.id === assetId);
    if (idx === -1) return;
    if (!assets[idx].useCount) assets[idx].useCount = 0;
    assets[idx].useCount++;
    assets[idx].lastUsed = today;
    changed = true;
  });
  if (!changed) return;
  localStorage.setItem('onstep_box_assets', JSON.stringify(assets));
  // useCount를 Firestore에도 동기화 (크로스 디바이스 보존)
  if (currentUser) {
    fbDb.collection('users').doc(currentUser.uid).collection('box').doc('data')
      .set({ assets, savedAt: new Date().toISOString() }, { merge: true })
      .catch(e => console.warn('Box usage sync:', e));
  }
}

function getTimePeriod() {
  return new Date().getHours() < 18 ? 'am' : 'pm';
}
function getTodayKey()      { return new Date().toISOString().slice(0,10); }
function calcCurrentDay(s)  { return s ? Math.max(1,Math.floor((new Date()-new Date(s))/86400000)+1) : 1; }
function calcTotalDays(s,e) { return (s&&e) ? Math.floor((new Date(e)-new Date(s))/86400000)+1 : 10; }
function getSuffix(n)       { const a=['th','st','nd','rd'],v=n%100; return a[(v-20)%10]||a[v]||a[0]; }

function isSessionActive(plan) {
  if (!plan?.periodStart) return { active: true, status: 'active', daysUntil: 0 };
  const today = getTodayKey();
  const start = plan.periodStart;
  const end   = plan.periodEnd || start;
  if (today < start) {
    const daysUntil = Math.ceil((new Date(start) - new Date(today)) / 86400000);
    return { active: false, status: 'before', daysUntil };
  }
  if (today > end) return { active: false, status: 'ended', daysUntil: 0 };
  return { active: true, status: 'active', daysUntil: 0 };
}

function getActiveCycleRoutine(slotData, plan) {
  if (!slotData?.routines) return 1;
  const r2 = slotData.routines.find(r=>r.id===2);
  if (!r2?.products?.length) return 1;
  if (!plan?.periodStart) return 1;
  const diff = Math.floor((new Date() - new Date(plan.periodStart)) / 86400000);
  return diff % 2 === 0 ? 1 : 2;
}

// ── Session header ───────────────────────────────────────────
function renderFlowSession(plan) {
  const period = getTimePeriod();
  const slotLbl = document.getElementById('flow-slot-label');
  if (slotLbl) slotLbl.textContent = period==='am' ? '☀ MORNING  ·  ~18:00' : '🌙 NIGHT  ·  18:00~';

  if (!plan) { buildHeroDots(1,10); return; }
  const n   = Number(plan.session||1);
  const cur = calcCurrentDay(plan.periodStart);
  const total = calcTotalDays(plan.periodStart, plan.periodEnd);

  // Session hero title: "12TH SESSION"
  const titleEl = document.getElementById('session-hero-title');
  if (titleEl) titleEl.textContent = `No.${n} SESSION`;

  // Session hero date: "2026.4.10-4.20"
  const dateEl = document.getElementById('session-hero-date');
  if (dateEl && plan.periodStart) {
    const fmt = d => (d||'').replace(/-/g,'.');
    const sess = isSessionActive(plan);
    const statusLabel = sess.status === 'before' ? ` · ${sess.daysUntil}일 후 시작`
                      : sess.status === 'ended'  ? ' · 세션 종료'
                      : '';
    dateEl.textContent = `${fmt(plan.periodStart)} – ${fmt(plan.periodEnd||'')}${statusLabel}`;
  }

  // Session dots
  buildHeroDots(cur, total);
}

function buildHeroDots(cur, total) {
  const row = document.getElementById('session-hero-dots');
  if (!row) return;
  const n = Math.min(total, 14);
  row.innerHTML = Array.from({length:n},(_,i) => {
    const d = i+1;
    const cls = d < cur ? 'session-sdot filled' : d === cur ? 'session-sdot today' : 'session-sdot';
    return `<div class="${cls}"></div>`;
  }).join('');

  // keep legacy compat elements updated
  const legacyDots = document.getElementById('flow-dots');
  if (legacyDots) {
    legacyDots.innerHTML = Array.from({length:n},(_,i)=>{
      const d=i+1; const c=d<cur?'flow-dot filled':d===cur?'flow-dot today':'flow-dot';
      return `<div class="${c}"></div>`;
    }).join('');
  }
}

// ── Flow hero step ────────────────────────────────────────────
function renderFlowHeroStep(plan) {
  const sess = isSessionActive(plan);
  if (plan && !sess.active) {
    const strip   = document.getElementById('flow-prod-strip');
    const dotsEl  = document.getElementById('flow-prod-dots');
    const tipArea = document.getElementById('flow-expert-tip');
    const badgeEl = document.getElementById('flow-step-badge-icon');
    const countEl = document.getElementById('flow-step-count');
    if (badgeEl) badgeEl.textContent = '';
    if (countEl) countEl.textContent = '';
    if (dotsEl)  dotsEl.innerHTML = '';
    if (tipArea) tipArea.style.display = 'none';
    if (strip) strip.innerHTML = sess.status === 'before'
      ? `<div style="padding:24px 16px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;color:var(--sub);line-height:1.6"><strong>${sess.daysUntil}일 후 시작 예정</strong><br><span style="font-size:11px;color:var(--mist)">${(plan.periodStart||'').replace(/-/g,'.')} 시작</span></div>`
      : `<div style="padding:24px 16px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;color:var(--sub);line-height:1.6"><strong>세션이 종료됐습니다</strong><br><a href="setup.html" style="font-size:11px;color:var(--ink);font-weight:600;text-decoration:underline;text-underline-offset:3px">새 세션 시작 →</a></div>`;
    updateCTABtn(0, 0);
    return;
  }
  const period   = getTimePeriod();
  const slot     = (period==='am') ? 'morning' : 'nightly';
  const slotData = plan?.[slot];
  const activeId = getActiveCycleRoutine(slotData, plan);
  const routine  = slotData?.routines?.find(r=>r.id===activeId);
  const products = routine?.products || [];
  const tip      = routine?.tip || '';

  const today    = getTodayKey();
  const doneKey  = `onstep_flow_done_${today}_${slot}`;
  const doneSet  = new Set(JSON.parse(localStorage.getItem(doneKey)||'[]'));

  // Step info row (이미지 기준: "Step1" + "1 / N")
  const prodItems = products.filter(p => (p.type||'product') === 'product');
  const badgeEl  = document.getElementById('flow-step-badge-icon');
  const countEl  = document.getElementById('flow-step-count');
  if (badgeEl) badgeEl.textContent = `Day${activeId}`;
  if (countEl) countEl.textContent = prodItems.length ? `${prodItems.length} STEPS` : '';

  // Product carousel (compact multi-card) — supports typed items (product / desc / plus)
  const strip    = document.getElementById('flow-prod-strip');
  if (strip) {
    if (!products.length) {
      strip.innerHTML = `<div style="padding:20px 16px;font-family:'Plus Jakarta Sans','Space Grotesk',sans-serif;font-size:13px;color:var(--mist);line-height:1.6">루틴 제품이 없습니다<br><a href="setup.html" style="font-size:11px;font-weight:700;color:var(--ink);text-decoration:none;letter-spacing:.06em;text-transform:uppercase">SET UP ROUTINE →</a></div>`;
    } else {
      strip.innerHTML = products.map(p => {
        const t = p.type || 'product';
        if (t === 'plus') return `<div class="care-tag-plus">+</div>`;
        if (t === 'desc') return `<div class="care-tag-desc">${p.text||''}</div>`;
        const isDone = doneSet.has(p.name);
        const imgSrc = getBoxImgForProduct(p);
        return `
          <div class="flow-prod-item${isDone?' done':''}" onclick="toggleProdDone(${JSON.stringify(p.name)},'${slot}')">
            <div class="flow-prod-img"${imgSrc?` style="background-image:url(${imgSrc})"`:''}>
              ${!imgSrc ? `<span class="flow-prod-emoji">${p.icon||'✨'}</span>` : ''}
              <div class="flow-prod-check">✓</div>
            </div>
            <div class="flow-prod-info">
              <div class="flow-prod-name">${p.name}</div>
            </div>
          </div>`;
      }).join('');
      strip.onscroll = null;
    }
  }

  // Expert tip — 내용 있으면 카드, 없으면 2px 라인
  const tipArea = document.getElementById('flow-expert-tip');
  const tipText = document.getElementById('flow-tip-text');
  if (tipArea && tipText) {
    tipText.textContent = tip || '';
    tipArea.style.display = '';
    if (tip) tipArea.classList.remove('no-tip');
    else tipArea.classList.add('no-tip');
  }

  updateCTABtn(doneSet.size, prodItems.length);
}

function toggleProdDone(name, slot) {
  const today    = getTodayKey();
  const doneKey  = `onstep_flow_done_${today}_${slot}`;
  const doneList = JSON.parse(localStorage.getItem(doneKey)||'[]');
  const adding   = doneList.indexOf(name) === -1;
  if (adding) doneList.push(name);
  else doneList.splice(doneList.indexOf(name), 1);
  localStorage.setItem(doneKey, JSON.stringify(doneList));
  // 체크 시 BOX useCount +1
  if (adding) {
    const plan = JSON.parse(localStorage.getItem(DB_KEY)||'null');
    const slotData = plan?.[slot];
    const activeId = getActiveCycleRoutine(slotData, plan);
    const prod = slotData?.routines?.find(r=>r.id===activeId)?.products?.find(p=>p.name===name);
    if (prod) recordBoxUsage([prod]);
  }
  const plan = JSON.parse(localStorage.getItem(DB_KEY)||'null');
  renderFlowHeroStep(plan);
}

function updateCTABtn(done, total) {
  const btn    = document.getElementById('main-check-btn');
  const label  = document.getElementById('cta-label');
  const arrow  = document.getElementById('cta-arrow');
  if (!btn) return;
  const arrowSvg = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
  if (total===0)            { label.textContent='CHECK ROUTINE'; if(arrow)arrow.innerHTML=arrowSvg; btn.classList.remove('done'); }
  else if (done>=total)     { label.textContent='Log It — Complete ✓'; if(arrow)arrow.innerHTML=''; btn.classList.add('done'); }
  else if (done>0)          { label.textContent=`${done}/${total} · CHECK ROUTINE`; if(arrow)arrow.innerHTML=arrowSvg; btn.classList.remove('done'); }
  else                      { label.textContent='CHECK ROUTINE'; if(arrow)arrow.innerHTML=arrowSvg; btn.classList.remove('done'); }
}

function handleMainRoutineBtn() {
  const plan = JSON.parse(localStorage.getItem(DB_KEY)||'null');
  if (!plan) return;
  const period   = getTimePeriod();
  const slot     = period==='am' ? 'morning' : 'nightly';
  const slotData = plan[slot];
  const activeId = getActiveCycleRoutine(slotData, plan);
  const products = slotData?.routines?.find(r=>r.id===activeId)?.products||[];
  if (!products.length) return;

  const realProducts = products.filter(p => (p.type||'product') === 'product');
  const today   = getTodayKey();
  const doneKey = `onstep_flow_done_${today}_${slot}`;
  const doneList= JSON.parse(localStorage.getItem(doneKey)||'[]');
  if (doneList.length >= realProducts.length) {
    // 완료 상태 → 취소 (undo)
    localStorage.removeItem(doneKey);
    showToast('루틴 완료가 취소됐습니다');
    renderFlowHeroStep(plan);
    return;
  }

  // 미완료 → 전체 완료 처리
  realProducts.forEach(p => { if (!doneList.includes(p.name)) doneList.push(p.name); });
  localStorage.setItem(doneKey, JSON.stringify(doneList));
  recordBoxUsage(realProducts);
  renderFlowHeroStep(plan);
  showToast('루틴 완료! ✓');
}

function fmtAllDayTime(t) {
  if (!t) return '';

  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ── Tracker Alarms ────────────────────────────────────────────
function checkTrackerAlarms() {
  const items = JSON.parse(localStorage.getItem(TRACKER_KEY) || '[]');
  if (!items.length) return;
  const checksKey = `onstep_ex_checks_${getTodayKey()}`;
  const checks    = JSON.parse(localStorage.getItem(checksKey) || '{}');
  const now       = new Date();
  const nowMins   = now.getHours() * 60 + now.getMinutes();

  items.forEach(it => {
    if (!it.alarm || !it.time) return;
    if (checks[it.id]) return; // 이미 완료
    const [h, m]    = it.time.split(':').map(Number);
    const habitMins = h * 60 + m;
    const diff      = habitMins - nowMins;

    if (diff === 10) {
      const k = `onstep_alarm_10_${it.id}_${getTodayKey()}`;
      if (localStorage.getItem(k)) return;
      localStorage.setItem(k, '1');
      showAlarmPopup(it, 10);
    }
    if (diff === 0) {
      const k = `onstep_alarm_0_${it.id}_${getTodayKey()}`;
      if (localStorage.getItem(k)) return;
      localStorage.setItem(k, '1');
      showAlarmPopup(it, 0);
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification(`⏰ ${it.name}`, { body: `OnStep · ${fmtAllDayTime(it.time)}`, icon: 'logo-v2.png' }); } catch(e) {}
      }
    }
  });
}

function showAlarmPopup(habit, minsBefore) {
  const popup = document.getElementById('alarm-popup');
  if (!popup) return;
  const icon = getHabitIcon(habit.icon, habit.name);
  document.getElementById('alarm-pop-badge').textContent =
    minsBefore > 0 ? `⏰ ${minsBefore}분 전 알람` : '⏰ 지금 시작!';
  document.getElementById('alarm-pop-icon').textContent  = icon;
  document.getElementById('alarm-pop-name').textContent  = habit.name;
  document.getElementById('alarm-pop-time').textContent  = fmtAllDayTime(habit.time);
  popup.classList.add('open');
  clearTimeout(window._alarmTimer);
  window._alarmTimer = setTimeout(closeAlarmPopup, 30000);
}

function closeAlarmPopup() {
  const popup = document.getElementById('alarm-popup');
  if (popup) popup.classList.remove('open');
  clearTimeout(window._alarmTimer);
}

(function initAlarms() {
  if ('Notification' in window && Notification.permission === 'default') {
    if (JSON.parse(localStorage.getItem(TRACKER_KEY) || '[]').some(it => it.alarm)) {
      Notification.requestPermission();
    }
  }
  setInterval(checkTrackerAlarms, 30000);
  checkTrackerAlarms();
})();

function getTodaysScheduledTheme(plan) {
  const items = JSON.parse(localStorage.getItem('onstep_makeup_contents') || '[]');
  if (!items.length) return null;
  const today = getTodayKey();
  const matches = items.filter(t => (t.scheduledDates||[]).includes(today));
  if (!matches.length) return null;
  return matches.reduce((best, t) => {
    const tTs = t.updatedAt ? new Date(t.updatedAt).getTime() : (t.id || 0);
    const bTs = best.updatedAt ? new Date(best.updatedAt).getTime() : (best.id || 0);
    return tTs > bTs ? t : best;
  });
}
